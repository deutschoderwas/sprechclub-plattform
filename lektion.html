<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lektion · deutschoderwas Sprechclub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#FDF6EC;--cream-warm:#FBEDD8;--paper:#FFFFFF;--ink:#262019;--ink-soft:#5C4E3E;--ink-mute:#A8957D;
  --red:#E8302A;--red-soft:#FCE5E3;--teal:#0FB5A6;--teal-soft:#D7F0EC;--yellow:#FFD24A;--yellow-soft:#FFF1C2;--sand:#F0E2C8;
  --radius:18px;--shadow:0 10px 30px rgba(38,32,25,.08);--font-head:'Fraunces',Georgia,serif;--font-body:'Outfit','Segoe UI',system-ui,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:linear-gradient(180deg,#FDE6E0 0%,var(--cream) 14%,var(--cream) 100%);color:var(--ink);font-family:var(--font-body);line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased;}
.wrapper{max-width:840px;margin:0 auto;padding:2.4rem 1.4rem 4.5rem;}
.eyebrow{text-align:center;font-size:.78rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,#E8302A);margin-bottom:.9rem;}
h1.title{font-family:var(--font-head);font-weight:600;font-size:clamp(2rem,5vw,3.4rem);line-height:1.06;text-align:center;}
.title-wrap{text-align:center;margin-bottom:1rem;}
.badge{display:inline-block;background:var(--accent,#0FB5A6);color:#fff;font-weight:700;font-size:.8rem;padding:5px 14px;border-radius:999px;margin-top:.9rem;}
.subtitle{text-align:center;max-width:600px;margin:1rem auto 0;color:var(--ink-soft);font-size:1.06rem;}
nav.tabs{position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;padding:.7rem .5rem;margin:1.5rem 0 2rem;background:rgba(253,246,236,.9);backdrop-filter:blur(8px);border:1px solid var(--sand);border-radius:999px;}
nav.tabs a{font-size:.82rem;font-weight:600;color:var(--ink-soft);text-decoration:none;padding:.4rem .8rem;border-radius:999px;}
nav.tabs a:hover{background:var(--cream-warm);}
section.block{background:var(--paper);border:1px solid var(--sand);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.4rem;box-shadow:var(--shadow);scroll-margin-top:5rem;}
.block.alt{background:var(--cream-warm);}
.block-head{font-family:var(--font-head);font-weight:600;font-size:clamp(1.25rem,3vw,1.7rem);margin-bottom:.4rem;}
.block-head .hl{color:var(--accent,#E8302A);font-style:italic;}
.block-intro{color:var(--ink-soft);margin-bottom:1rem;}
.tip{background:var(--yellow-soft);border-left:4px solid var(--yellow);border-radius:14px;padding:1rem 1.1rem;}
.tip b{display:block;font-family:var(--font-head);font-size:1.05rem;margin-bottom:.3rem;color:var(--ink);}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.8rem;}
.fcard{height:150px;cursor:pointer;perspective:1000px;}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.fcard.flip .fc-inner{transform:rotateY(180deg);}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--sand);border-radius:14px;padding:.9rem;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.fc-front{background:var(--cream);}
.fc-back{background:var(--teal-soft);transform:rotateY(180deg);font-style:italic;color:#063b35;font-size:.95rem;line-height:1.45;}
.fc-front b{font-size:1.12rem;}
.fc-hint{font-size:.7rem;color:var(--ink-mute);margin-top:.4rem;}
.speak{text-align:center;}
.speak .card{background:var(--cream);border:1px solid var(--sand);border-radius:16px;padding:1.6rem 1.2rem;min-height:120px;display:flex;align-items:center;justify-content:center;font-size:1.18rem;font-weight:600;font-family:var(--font-head);}
.speak .card .ph{color:var(--ink-mute);font-family:var(--font-body);font-weight:400;}
.speak ul{list-style:none;margin:1rem 0 0;display:flex;flex-direction:column;gap:.5rem;}
.speak li{background:var(--cream);border:1px solid var(--sand);border-radius:12px;padding:.7rem .9rem;text-align:left;color:var(--ink-soft);}
.btn{display:inline-block;background:var(--ink);color:var(--cream);font-weight:700;border:none;border-radius:999px;padding:.6rem 1.4rem;cursor:pointer;font-family:var(--font-body);font-size:1rem;margin-top:1rem;}
.steps{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.4rem;}
.step{background:var(--cream);border:1px solid var(--sand);border-radius:12px;padding:.8rem 1rem;flex:1 1 200px;}
.step .n{font-family:var(--font-head);font-weight:700;color:var(--accent,#E8302A);font-size:1.1rem;}
section.mission{background:var(--ink);color:var(--cream);border-radius:var(--radius);padding:1.4rem 1.5rem;}
section.mission p,.mission .block-head{color:var(--cream);}
.center{text-align:center;}
.loading,.error{text-align:center;color:var(--ink-soft);padding:4rem 1rem;font-size:1.1rem;}
.error a{color:var(--red);font-weight:700;}
footer{text-align:center;color:var(--ink-mute);font-size:.84rem;margin-top:1.8rem;}
footer .mark{font-family:var(--font-head);font-weight:600;color:var(--ink);}
footer .mark .t{color:var(--teal);}
</style>
</head>
<body>
<div class="wrapper" id="app"><div class="loading">Lektion wird geladen …</div></div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
const CLUB = {
  sprechclub:{c:'#0FB5A6',n:'Sprechclub'}, grammatikclub:{c:'#E8302A',n:'Grammatikclub'},
  wortschatzclub:{c:'#F5B301',n:'Wortschatzclub'}, ausspracheclub:{c:'#2F6BFF',n:'Ausspracheclub'}
};
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function qid(){ const u=new URLSearchParams(location.search); return u.get('id'); }

async function run(){
  const app=document.getElementById('app');
  const id=qid();
  if(!id){ app.innerHTML='<div class="error">Keine Lektion angegeben.</div>'; return; }
  const sb=supabase.createClient(CFG.SUPABASE_URL,CFG.SUPABASE_ANON_KEY);
  const { data:cls } = await sb.from('classes').select('title,level,topic,club,starts_at').eq('id',id).maybeSingle();
  if(!cls){ app.innerHTML='<div class="error">Lektion nicht gefunden.</div>'; return; }
  const { data:cm } = await sb.from('class_materials').select('content').eq('class_id',id).maybeSingle();
  const m = cm && cm.content ? cm.content : null;
  const club = CLUB[cls.club] || {c:'#0FB5A6',n:cls.club||''};
  document.documentElement.style.setProperty('--accent', club.c);
  const cat = (cls.club==='sprechclub' && cls.title && cls.title!==cls.topic) ? cls.title : club.n;
  document.title = (cls.topic||cls.title||'Lektion')+' · deutschoderwas';

  if(!m){
    app.innerHTML = `<div class="title-wrap"><div class="eyebrow">${esc(club.n)} · ${esc(cat)}</div>
      <h1 class="title">${esc(cls.topic||cls.title)}</h1><span class="badge">${esc(cls.level)}</span></div>
      <div class="error">Für diese Stunde liegt das Material gerade noch nicht vor, oder du hast keinen aktiven Zugang. <br><a href="live.html#pakete">Stundenpaket ansehen →</a></div>`;
    return;
  }

  let html = `<div class="title-wrap">
    <div class="eyebrow">${esc(club.n)} · ${esc(cat)}</div>
    <h1 class="title">${esc(cls.topic||cls.title)}</h1>
    <span class="badge">${esc(cls.level)}</span>
    ${m.intro?`<p class="subtitle">${esc(m.intro)}</p>`:''}
  </div>
  <nav class="tabs">
    ${m.grammar_tip?'<a href="#tipp">📌 Tipp</a>':''}
    ${(m.vocab&&m.vocab.length)?'<a href="#wortschatz">🃏 Wortschatz</a>':''}
    ${(m.speak_prompts&&m.speak_prompts.length)?'<a href="#sprechen">🗣️ Sprechen</a>':''}
    <a href="#mission">🎯 Los geht’s</a>
  </nav>`;

  if(m.grammar_tip){
    html += `<section class="block" id="tipp"><h2 class="block-head">Sprach-<span class="hl">Tipp</span></h2>
      <div class="tip"><b>📌 ${esc(m.grammar_tip.title||'Tipp')}</b>${esc(m.grammar_tip.text||'')}</div></section>`;
  }

  if(m.vocab&&m.vocab.length){
    html += `<section class="block alt" id="wortschatz"><h2 class="block-head">Wort<span class="hl">schatz</span></h2>
      <p class="block-intro">Tippe auf eine Karte – vorne das Wort, hinten Bedeutung &amp; Beispiel.</p><div class="cards">`+
      m.vocab.map(v=>`<div class="fcard" onclick="this.classList.toggle('flip')"><div class="fc-inner">
        <div class="fc-front"><b>${esc(v.de)}</b><span class="fc-hint">umdrehen →</span></div>
        <div class="fc-back">${esc(v.info||v.en||'')}</div></div></div>`).join('')+`</div></section>`;
  }

  if(m.speak_prompts&&m.speak_prompts.length){
    html += `<section class="block" id="sprechen"><h2 class="block-head">Jetzt <span class="hl">sprechen</span></h2>
      <p class="block-intro">Das übt ihr heute live im Unterricht – zieh eine Karte oder geh die Impulse der Reihe nach durch.</p>
      <div class="speak"><div class="card" id="speakCard"><span class="ph">Tippe auf „Neue Karte" …</span></div>
      <button class="btn" id="drawBtn">🎲 Neue Karte</button>
      <ul>${m.speak_prompts.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div></section>`;
  }

  // Mission aus erster Schreibaufgabe oder generisch
  let mission='Sprich heute so viel wie möglich – trau dich, Fehler sind erlaubt!';
  try{ const w=((m.post&&m.post.exercises)||[]).concat((m.pre&&m.pre.exercises)||[]).find(e=>e.type==='write'); if(w&&w.prompt) mission=w.prompt; }catch(e){}
  html += `<section class="block mission" id="mission"><h2 class="block-head">🎯 Deine Mission</h2>
    <p>${esc(mission)}</p></section>
    <footer><div class="mark">deutsch<span class="t">oderwas</span></div><p>${esc(club.n)} · ${esc(cls.topic||'')} · ${esc(cls.level)}</p></footer>`;

  app.innerHTML = html;

  const cards = (m.speak_prompts||[]);
  const card=document.getElementById('speakCard'), btn=document.getElementById('drawBtn');
  if(btn) btn.addEventListener('click',()=>{ if(cards.length) card.textContent=cards[Math.floor(Math.random()*cards.length)]; });
}
run().catch(e=>{ document.getElementById('app').innerHTML='<div class="error">Es ist ein Fehler aufgetreten. Lade die Seite neu.</div>'; });
</script>
</body>
</html>
