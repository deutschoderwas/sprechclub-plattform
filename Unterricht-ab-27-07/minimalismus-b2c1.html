<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>deutschoderwas · Beim Arzt & Apotheke (A2/B1) – Live-Sprechtraining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --red:#DD0000;--red2:#E4482F;--gold:#FFCE00;--gold2:#EBA417;
  --teal:#12A594;--teal2:#2DD4BF;--teal-dk:#0a7d72;--teal-soft:#E3F3F1;
  --pink:#FA95AE;--pink-soft:#FDE7EC;
  --ink:#1c2124;--grey:#6a7178;--soft:#9aa1a6;
  --cream:#FDF7EC;--cream2:#F7ECD8;--paper:#ffffff;--line:#ece4d6;--mist:#F5F1E8;
  --mark:#FFDD66;--markt:#9FE7DD;
  --head:'Poppins',system-ui,sans-serif;--body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
html,body{height:100%;font-family:var(--body);color:var(--ink);overflow:hidden;
  background:radial-gradient(120% 120% at 50% 0%,#FFF6E3 0%,#FBEFDC 55%,#F3E4CD 100%);}
#app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#stage{position:relative;width:1280px;height:720px;transform-origin:center center;border-radius:22px;overflow:hidden;
  box-shadow:0 24px 70px rgba(80,50,15,.24),0 4px 14px rgba(80,50,15,.12);background:#fff;cursor:pointer;}
.slide{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity .35s ease;}
.slide.active{opacity:1;visibility:visible;}
.pad{position:absolute;inset:0;padding:38px 60px;display:flex;flex-direction:column;justify-content:center;overflow:hidden;}
.mark{background:linear-gradient(180deg,transparent 60%,var(--mark) 60%);padding:0 .12em;font-weight:700;border-radius:3px;}
.mark.t{background:linear-gradient(180deg,transparent 60%,var(--markt) 60%);}
.kick,.seckick{font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--red2);font-family:var(--head);}
.sechead{font-family:var(--head);font-size:38px;font-weight:600;color:var(--ink);letter-spacing:.1px;margin-top:2px;line-height:1.02;}
.sechead.sm{font-size:31px;}
.sechead .hl{color:var(--red2);}.sechead .hlt{color:var(--teal-dk);}
.secsub{font-size:16px;color:var(--grey);margin-top:5px;max-width:920px;line-height:1.4;}
.logo{position:absolute;top:28px;right:38px;width:88px;height:88px;border-radius:50%;overflow:hidden;
  box-shadow:0 8px 22px rgba(80,50,15,.22);border:4px solid #fff;background:#fff;z-index:5;}
.logo img{width:100%;height:100%;object-fit:cover;display:block;}
.badge-lvl{display:inline-block;background:var(--teal);color:#fff;font-weight:700;font-size:15px;padding:7px 17px;border-radius:999px;font-family:var(--head);}
.flagbar{display:flex;height:9px;width:180px;border-radius:6px;overflow:hidden;}
.flagbar i{flex:1;display:block;}
.imgpanel{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.imgpanel .fb{font-size:120px;position:absolute;z-index:0;filter:drop-shadow(0 6px 16px rgba(0,0,0,.2));}
.imgpanel img{position:relative;z-index:1;width:100%;height:100%;object-fit:cover;display:block;}
.hilfe{margin-top:16px;background:#fff;border:2px dashed var(--teal);border-radius:16px;padding:12px 18px;box-shadow:0 5px 14px rgba(80,50,15,.05);}
.hilfe .hh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal-dk);margin-bottom:8px;display:flex;align-items:center;gap:7px;font-family:var(--head);}
.hchips{display:flex;flex-wrap:wrap;gap:8px;}
.hchips span{background:var(--teal-soft);color:var(--teal-dk);border-radius:999px;padding:7px 14px;font-size:14.5px;font-weight:700;}

/* cover */
.cover{position:absolute;inset:0;display:grid;grid-template-columns:1fr 452px;}
.cover .left{padding:50px 56px;display:flex;flex-direction:column;justify-content:center;background:radial-gradient(130% 130% at 12% 8%,#ffffff 0%,#FFF7E8 45%,#FCEFD8 100%);}
.cover h1{font-family:var(--head);font-size:58px;line-height:1;font-weight:600;color:var(--ink);margin-top:8px;}
.cover h1 .hl{color:var(--red2);}
.cover .sub{font-size:18px;color:var(--grey);margin-top:12px;line-height:1.45;max-width:560px;}
.cover .infos{display:flex;gap:11px;margin-top:22px;flex-wrap:wrap;}
.iBox{background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 15px;box-shadow:0 6px 16px rgba(80,50,15,.07);}
.iBox h4{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--head);}
.iBox p{font-size:13px;color:var(--grey);margin-top:1px;}
.cover .imgpanel{background:linear-gradient(150deg,var(--teal2),var(--teal-dk));}

.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:16px;}
.qcell{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:15px;padding:15px 18px;box-shadow:0 6px 16px rgba(80,50,15,.06);}
.qcell .qe{font-size:28px;flex:0 0 auto;}
.qcell h4{font-size:18px;font-weight:700;color:var(--ink);font-family:var(--head);}
.qcell p{font-size:14px;color:var(--grey);margin-top:2px;line-height:1.35;}

.bild{position:absolute;inset:0;display:grid;grid-template-columns:480px 1fr;}
.bild .imgpanel{background:linear-gradient(135deg,#2DD4BF,#12A594 55%,#3A6E8F);}
.bild-tag{position:absolute;top:20px;left:20px;background:rgba(255,255,255,.92);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;color:var(--ink);z-index:3;font-family:var(--head);}
.bild-right{padding:36px 44px;display:flex;flex-direction:column;background:#fff;}
.promptlist{list-style:none;margin:12px 0 0;display:flex;flex-direction:column;gap:9px;}
.promptlist li{position:relative;padding-left:30px;font-size:18px;line-height:1.35;color:var(--ink);font-weight:500;}
.promptlist li:before{content:'💬';position:absolute;left:0;top:0;}
.thumbs{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:4;}
.thumb{width:56px;height:56px;border-radius:12px;border:3px solid rgba(255,255,255,.9);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.28);background:linear-gradient(150deg,#2DD4BF,#12A594);padding:0;}
.thumb.on{box-shadow:0 0 0 3px var(--teal),0 4px 12px rgba(0,0,0,.28);border-color:#fff;}
.thumb .tfb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;z-index:0;}
.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
.grouptask{margin-top:14px;background:#FFF3CC;border:1px solid #F1E2B0;border-radius:14px;padding:12px 16px;font-size:15px;color:var(--ink);line-height:1.4;}
.grouptask b{color:var(--red2);}

.wtwo{display:grid;grid-template-columns:1fr 1fr;gap:11px 22px;margin-top:14px;}
.wnum{display:flex;gap:12px;align-items:flex-start;opacity:0;transform:translateY(8px);transition:.3s;}
.wnum.shown{opacity:1;transform:none;}
.wnum .n{flex:0 0 auto;width:32px;height:32px;border-radius:10px;background:var(--teal);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:var(--head);}
.wnum .t{font-weight:700;font-size:17px;color:var(--ink);}
.wnum .d{font-size:13.5px;color:var(--grey);margin-top:0;line-height:1.3;}

.wimg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:14px;}
.wcard{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 16px rgba(80,50,15,.07);opacity:0;transform:translateY(9px);transition:.3s;}
.wcard.shown{opacity:1;transform:none;}
.wcard .ph{height:118px;background:linear-gradient(150deg,var(--teal2),var(--teal-dk));position:relative;display:flex;align-items:center;justify-content:center;}
.wcard .ph .fb{font-size:46px;position:absolute;z-index:0;}
.wcard .ph img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1;}
.wcard .tx{padding:10px 14px 13px;}
.wcard h4{font-size:15px;font-weight:700;color:var(--ink);font-family:var(--head);}
.wcard p{font-size:12.5px;color:var(--grey);margin-top:2px;line-height:1.3;}
.extra{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.extra span{background:var(--mist);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:14.5px;font-weight:700;color:var(--ink);}

.arrows{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
.arrows .a{display:flex;gap:13px;align-items:flex-start;background:var(--mist);border-radius:13px;padding:12px 17px;}
.arrows .a .ar{color:var(--red2);font-size:20px;font-weight:800;flex:0 0 auto;line-height:1.1;}
.arrows .a h4{font-size:17px;font-weight:700;color:var(--ink);font-family:var(--head);}
.arrows .a p{font-size:13.5px;color:var(--grey);margin-top:1px;line-height:1.3;}

.matchwrap{display:grid;grid-template-columns:1fr 1fr;gap:12px 34px;margin-top:14px;}
.mcol{display:flex;flex-direction:column;gap:9px;}
.mcol .mlabel{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--soft);font-family:var(--head);}
.mitem{background:#fff;border:2px solid var(--line);border-radius:13px;padding:11px 16px;font-size:16.5px;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s;box-shadow:0 4px 10px rgba(80,50,15,.05);}
.mitem.term{font-weight:800;}
.mitem:hover{border-color:var(--teal);}
.mitem.sel{border-color:var(--teal);background:#eafaf7;}
.mitem.done{background:#d8f3ee;border-color:var(--teal);color:var(--teal-dk);cursor:default;pointer-events:none;}
.mitem.miss{border-color:var(--red2);background:#fde3e1;animation:shake .3s;}
.matchprog{margin-top:12px;font-size:15px;font-weight:700;color:var(--teal-dk);font-family:var(--head);}

.gcols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px;}
.gcol{border-radius:16px;padding:15px 18px;}
.gcol.pink{background:var(--pink-soft);}
.gcol.teal{background:var(--teal-soft);}
.gcol h4{font-family:var(--head);font-size:18px;font-weight:600;margin-bottom:5px;}
.gcol p{font-size:13.5px;color:var(--grey);margin-bottom:7px;line-height:1.35;}
.gcol ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
.gcol li{font-size:15.5px;color:var(--ink);padding-left:15px;position:relative;}
.gcol li:before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--red2);}
.miniquiz{display:flex;gap:11px;margin-top:12px;flex-wrap:wrap;}
.qcard2{flex:1;min-width:0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 14px;box-shadow:0 5px 14px rgba(80,50,15,.05);}
.qq{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:7px;}
.qopts{display:flex;gap:7px;flex-wrap:wrap;}
.qopt{background:var(--mist);border:2px solid var(--line);border-radius:10px;padding:6px 14px;font-size:14.5px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;font-family:var(--body);}
.qopt:hover{border-color:var(--teal);}
.qopt.ok{background:#d8f3ee;border-color:var(--teal);color:var(--teal-dk);}
.qopt.no{background:#fde3e1;border-color:var(--red2);color:var(--red2);}

.quotes{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px;}
.qbox{background:#fff;border:1px solid var(--line);border-left:5px solid var(--gold);border-radius:12px;padding:13px 17px;font-size:17px;color:var(--ink);line-height:1.35;box-shadow:0 5px 14px rgba(80,50,15,.05);}
.qbox.tealb{border-left-color:var(--teal);}
.qbox .cat{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal-dk);margin-bottom:4px;font-family:var(--head);}
.okhint{margin-top:12px;background:var(--teal-soft);border-radius:12px;padding:11px 17px;font-size:14.5px;color:var(--teal-dk);font-weight:700;}

.bubbles{display:flex;flex-direction:column;gap:9px;margin-top:12px;height:372px;overflow-y:auto;padding-right:6px;scroll-behavior:smooth;}
.bub{display:flex;gap:11px;align-items:flex-start;max-width:80%;}
.bub.reveal:not(.shown){display:none;}
.bub.shown{animation:bubin .28s ease;}
@keyframes bubin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.bub.b{align-self:flex-end;flex-direction:row-reverse;}
.bub .who{flex:0 0 auto;width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;font-family:var(--head);}
.bub.a .who{background:var(--ink);}.bub.b .who{background:var(--teal-dk);}
.bub .txt{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:17px;line-height:1.35;color:var(--ink);box-shadow:0 5px 14px rgba(80,50,15,.05);}
.bub.b .txt{background:var(--teal-soft);border-color:#cfeae7;}

.gapintro{display:flex;align-items:center;gap:9px;margin-top:12px;background:#FFF7D6;border-radius:12px;padding:10px 17px;font-size:14.5px;color:var(--ink);}
.gaps{margin-top:14px;display:flex;flex-direction:column;gap:11px;}
.gline{font-size:20px;color:var(--ink);line-height:1.45;}
.gap{display:inline-block;min-width:118px;padding:2px 10px;margin:0 3px;border-bottom:3px solid var(--teal);text-align:center;font-weight:800;color:var(--soft);cursor:default;transition:.2s;background:var(--mist);border-radius:7px 7px 0 0;}
.gap.filled{color:var(--teal-dk);background:#d8f3ee;border-color:var(--teal);}
.gap.wrong{color:var(--red2);background:#fde3e1;border-color:var(--red2);animation:shake .3s;}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.bank{display:flex;gap:9px;flex-wrap:wrap;margin-top:20px;}
.wchip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:9px 17px;font-size:17px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;font-family:var(--body);box-shadow:0 4px 10px rgba(80,50,15,.06);}
.wchip:hover{border-color:var(--teal);}
.wchip.sel{background:var(--teal);color:#fff;border-color:var(--teal);}
.wchip.used{opacity:.35;pointer-events:none;text-decoration:line-through;}

.timerwrap{display:flex;align-items:center;gap:22px;margin-top:14px;}
.timer{font-family:var(--head);font-weight:700;font-size:72px;line-height:1;color:var(--teal-dk);min-width:150px;text-align:center;font-variant-numeric:tabular-nums;}
.timer.run{color:var(--teal);}.timer.low{color:var(--red2);}.timer.done{color:var(--gold2);}
.timerbtns{display:flex;flex-direction:column;gap:8px;}
.tbtn{border:none;border-radius:13px;padding:11px 20px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--head);transition:.15s;}
.tbtn.start{background:var(--teal);color:#fff;box-shadow:0 8px 20px rgba(18,165,148,.3);}
.tbtn.start:hover{background:var(--teal-dk);}
.tbtn.reset{background:var(--mist);color:var(--ink);}
.topics{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;}
.topicchip{background:#fff;border:2px solid var(--line);border-radius:13px;padding:10px 16px;font-size:16px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;font-family:var(--body);box-shadow:0 4px 10px rgba(80,50,15,.05);}
.topicchip:hover{border-color:var(--teal);}
.topicchip.sel{background:var(--teal);color:#fff;border-color:var(--teal);}

.brk{display:flex;flex-direction:column;gap:12px;margin-top:14px;}
.brkbanner{display:flex;align-items:center;gap:12px;background:linear-gradient(120deg,var(--teal),var(--teal-dk));color:#fff;border-radius:16px;padding:13px 20px;}
.brkbanner .be{font-size:30px;}
.brkbanner b{font-family:var(--head);font-size:18px;}
.brkbanner p{font-size:14px;opacity:.95;}
.brkcards{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.brkcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 18px;box-shadow:0 6px 16px rgba(80,50,15,.06);}
.brkcard .bh{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.brkcard .bn{width:30px;height:30px;border-radius:9px;background:var(--red2);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:15px;}
.brkcard h4{font-family:var(--head);font-size:17px;font-weight:600;color:var(--ink);}
.brkcard ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
.brkcard li{font-size:14.5px;color:var(--ink);padding-left:18px;position:relative;line-height:1.35;}
.brkcard li:before{content:'→';position:absolute;left:0;color:var(--teal);font-weight:800;}
.plenum{display:flex;flex-direction:column;gap:11px;margin-top:14px;}
.plstep{display:flex;gap:13px;align-items:flex-start;background:var(--mist);border-radius:14px;padding:13px 18px;}
.plstep .pn{flex:0 0 auto;width:34px;height:34px;border-radius:10px;background:var(--gold2);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--head);}
.plstep h4{font-family:var(--head);font-size:17px;font-weight:600;color:var(--ink);}
.plstep p{font-size:14.5px;color:var(--grey);margin-top:1px;line-height:1.35;}

.rollen{position:absolute;inset:0;display:grid;grid-template-columns:380px 1fr;}
.skarten{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.skarte{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 18px;display:flex;gap:13px;align-items:flex-start;box-shadow:0 6px 16px rgba(80,50,15,.06);cursor:pointer;transition:.15s;}
.skarte:hover{border-color:var(--teal);transform:translateY(-2px);}
.skarte.flip{background:var(--teal-soft);border-color:var(--teal);}
.skarte .se{font-size:28px;flex:0 0 auto;}
.skarte .sh{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--teal-dk);font-family:var(--head);}
.skarte h4{font-size:16px;font-weight:600;color:var(--ink);margin-top:1px;line-height:1.3;font-family:var(--head);}

.eowrap{display:flex;flex-direction:column;gap:11px;margin-top:14px;}
.eo{display:flex;align-items:center;gap:13px;}
.eoside{flex:1;background:#fff;border:2px solid var(--line);border-radius:15px;padding:14px 20px;font-size:19px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;font-family:var(--body);box-shadow:0 5px 14px rgba(80,50,15,.05);text-align:center;}
.eoside:hover{border-color:var(--teal);}
.eoside.pick{background:#d8f3ee;border-color:var(--teal);color:var(--teal-dk);}
.eoside.dim{opacity:.5;}
.eovs{flex:0 0 auto;font-family:var(--head);font-size:17px;color:var(--soft);}

.mission{position:absolute;inset:0;display:grid;grid-template-columns:1fr 410px;}
.mission .left{padding:44px 52px;display:flex;flex-direction:column;justify-content:center;background:radial-gradient(130% 130% at 15% 12%,#ffffff,#FFF7E8 50%,#FCEFD8);}
.mission .imgpanel{background:linear-gradient(150deg,var(--gold),#E4482F);}
.msteps{display:flex;flex-direction:column;gap:9px;margin-top:14px;}
.mstep{display:flex;gap:12px;align-items:flex-start;}
.mstep .mn{flex:0 0 auto;width:32px;height:32px;border-radius:10px;background:var(--teal);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px;font-family:var(--head);}
.mstep h4{font-size:16px;font-weight:700;color:var(--ink);font-family:var(--head);}
.mstep p{font-size:13.5px;color:var(--grey);margin-top:0;line-height:1.3;}
.msuccess{margin-top:14px;background:var(--teal);color:#fff;border-radius:12px;padding:11px 17px;font-size:14.5px;font-weight:700;}

#bar{position:fixed;top:0;left:0;height:5px;width:0;background:linear-gradient(90deg,var(--red),var(--gold),var(--teal));z-index:30;transition:width .35s ease;}
#ctrl{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;z-index:30;
  background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:8px 14px;border-radius:999px;color:var(--ink);font-size:13px;user-select:none;
  box-shadow:0 8px 24px rgba(80,50,15,.16);border:1px solid rgba(255,255,255,.7);}
#ctrl button{background:var(--mist);border:none;color:var(--ink);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;transition:.15s;}

const stage=document.getElementById('stage'),bar=document.getElementById('bar'),counter=document.getElementById('counter');
let idx=0,step=0,revealEls=[];
function scale(){const pad=52;const s=Math.min((window.innerWidth-pad)/1280,(window.innerHeight-pad)/720);stage.style.transform='scale('+s+')';}
window.addEventListener('resize',scale);
function render(fromBack){
  stage.innerHTML=SLIDES[idx].html;
  const slide=stage.querySelector('.slide');slide.classList.add('active');
  revealEls=[...slide.querySelectorAll('.reveal')];
  step=fromBack?revealEls.length:0;
  revealEls.forEach((el,i)=>{if(i<step)el.classList.add('shown');});
  bar.style.width=((idx+1)/SLIDES.length*100)+'%';counter.textContent=(idx+1)+' / '+SLIDES.length;
  wire(slide);scale();
}
function wire(slide){
  if(window.__t){clearInterval(window.__t);window.__t=null;}
  slide.querySelectorAll('.qcard2').forEach(q=>{const ok=QUIZ[+q.dataset.q].ok;
    q.querySelectorAll('.qopt').forEach(o=>o.addEventListener('click',e=>{e.stopPropagation();if(q.dataset.done)return;q.dataset.done='1';
      if(+o.dataset.i===ok)o.classList.add('ok');else{o.classList.add('no');q.querySelector('.qopt[data-i="'+ok+'"]').classList.add('ok');}}));});
  let sel=null;const chips=slide.querySelectorAll('.wchip');
  chips.forEach(c=>c.addEventListener('click',e=>{e.stopPropagation();if(c.classList.contains('used'))return;
    if(sel===c){c.classList.remove('sel');sel=null;return;}chips.forEach(x=>x.classList.remove('sel'));c.classList.add('sel');sel=c;}));
  slide.querySelectorAll('.gap').forEach(g=>g.addEventListener('click',e=>{e.stopPropagation();if(g.classList.contains('filled')||!sel)return;
    if(sel.dataset.w===g.dataset.answer){g.textContent=g.dataset.answer;g.classList.add('filled');sel.classList.add('used');sel.classList.remove('sel');sel=null;}
    else{g.classList.add('wrong');setTimeout(()=>g.classList.remove('wrong'),350);}}));
  const prog=slide.querySelector('#matchProg');
  if(prog){let selM=null,done=0;const total=MATCH.pairs.length;
    slide.querySelectorAll('.mitem').forEach(mi=>mi.addEventListener('click',e=>{e.stopPropagation();if(mi.classList.contains('done'))return;
      if(!selM){selM=mi;mi.classList.add('sel');return;}if(selM===mi){mi.classList.remove('sel');selM=null;return;}
      if(selM.dataset.side===mi.dataset.side){selM.classList.remove('sel');selM=mi;mi.classList.add('sel');return;}
      if(selM.dataset.id===mi.dataset.id){selM.classList.remove('sel');selM.classList.add('done');mi.classList.add('done');selM=null;done++;prog.textContent=done+' / '+total+' richtig';if(done===total)prog.textContent='🎉 Alles richtig! Super gemacht.';}
      else{const a=selM,bb=mi;a.classList.add('miss');bb.classList.add('miss');setTimeout(()=>{a.classList.remove('miss','sel');bb.classList.remove('miss');},350);selM=null;}}));}
  const timer=slide.querySelector('#timer');
  if(timer){const secs=60;let left=secs;const setT=v=>timer.textContent=v;
    slide.querySelector('#tStart').addEventListener('click',e=>{e.stopPropagation();if(window.__t)clearInterval(window.__t);left=secs;setT(left);timer.className='timer run';
      window.__t=setInterval(()=>{left--;setT(left>0?left:'Fertig! 🎉');if(left<=10&&left>0)timer.classList.add('low');if(left<=0){clearInterval(window.__t);window.__t=null;timer.className='timer done';}},1000);});
    slide.querySelector('#tReset').addEventListener('click',e=>{e.stopPropagation();if(window.__t){clearInterval(window.__t);window.__t=null;}left=secs;timer.className='timer';setT(secs);});
    slide.querySelectorAll('.topicchip').forEach(c=>c.addEventListener('click',e=>{e.stopPropagation();slide.querySelectorAll('.topicchip').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');}));}
  slide.querySelectorAll('.skarte').forEach(k=>k.addEventListener('click',e=>{e.stopPropagation();k.classList.toggle('flip');}));
  const bimg=slide.querySelector('#bildImg');
  if(bimg){slide.querySelectorAll('.thumb').forEach(t=>t.addEventListener('click',e=>{e.stopPropagation();
    slide.querySelectorAll('.thumb').forEach(x=>x.classList.remove('on'));t.classList.add('on');
    const img=bimg.querySelector('img'),fb=bimg.querySelector('.fb');
    if(fb)fb.textContent=t.dataset.fb;if(img){img.style.display='';img.src=t.dataset.u;}}));}
  slide.querySelectorAll('.eo').forEach(row=>{const sides=row.querySelectorAll('.eoside');
    sides.forEach(s=>s.addEventListener('click',e=>{e.stopPropagation();sides.forEach(x=>x.classList.remove('pick','dim'));s.classList.add('pick');sides.forEach(x=>{if(x!==s)x.classList.add('dim');});}));});
}
function forward(){if(step<revealEls.length){const el=revealEls[step];el.classList.add('shown');step++;const sc=el.closest('.bubbles');if(sc)sc.scrollTop=sc.scrollHeight;}else if(idx<SLIDES.length-1){idx++;render(false);}}
function backward(){if(step>0){step--;revealEls[step].classList.remove('shown');}else if(idx>0){idx--;render(true);}}
document.getElementById('next').addEventListener('click',e=>{e.stopPropagation();forward();});
document.getElementById('prev').addEventListener('click',e=>{e.stopPropagation();backward();});
document.getElementById('fs').addEventListener('click',e=>{e.stopPropagation();toggleFS();});
stage.addEventListener('click',e=>{if(e.target.closest('button')||e.target.closest('.gap')||e.target.closest('.skarte')||e.target.closest('.qopt')||e.target.closest('.wchip')||e.target.closest('.mitem'))return;forward();});
function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}}
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();forward();}else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();backward();}else if(e.key==='f'||e.key==='F'){toggleFS();}});
render(false);
</script>
</body>
</html>
