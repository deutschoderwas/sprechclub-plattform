<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — deutschoderwas club</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#DD0000;--primary-dark:#B30000;--secondary:#161616;--accent:#FFCE00;
  --turq:#2DD4BF;--turq-dark:#14B8A6;--cream:#FFFCF5;--bg:#FFF8E0;
  --text:#161616;--soft:#6B7280;--border:#ECE3D4;
  --side:#161616;--side-2:#1F1F1F;--side-hover:#2A2A2A;--side-text:#C9C6C0;--side-muted:#8A8781;
  --ink:#06403A;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.5;overflow:hidden}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:50px;text-decoration:none;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-turq{background:var(--turq);color:#053b34}.btn-turq:hover{background:var(--turq-dark);color:#fff}
.btn-ghost{background:#fff;color:var(--secondary);border:2px solid var(--border)}
.btn-sm{padding:8px 14px;font-size:13px}

/* ---------- App shell ---------- */
.app{display:flex;height:100vh;width:100%}
.side{width:270px;flex:0 0 270px;background:var(--side);color:var(--side-text);display:flex;flex-direction:column;min-height:0}
.side-head{padding:18px 18px 14px;border-bottom:1px solid #2b2b2b;display:flex;align-items:center;gap:11px}
.side-head img{width:40px;height:40px;border-radius:12px;object-fit:cover}
.side-head .t{font-family:'Space Grotesk';font-weight:700;font-size:16px;color:#fff;line-height:1.15}
.side-head .t .club{color:var(--turq)}
.side-head .t small{display:block;font-family:'Inter';font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--side-muted);margin-top:2px}
.side-scroll{flex:1;overflow-y:auto;padding:14px 10px 18px}
.side-scroll::-webkit-scrollbar{width:8px}.side-scroll::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:8px}
.side h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--side-muted);margin:6px 8px 8px;font-weight:800}
.chan{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;font-weight:600;font-size:14.5px;color:var(--side-text);margin-bottom:2px;transition:background .12s,color .12s;position:relative}
.chan:hover{background:var(--side-hover);color:#fff}
.chan.active{background:var(--turq);color:#053b34;font-weight:800}
.chan .em{width:22px;text-align:center;font-size:16px;flex:0 0 22px}
.chan .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chan.unread .nm{color:#fff;font-weight:800}
.chan.active.unread .nm{color:#053b34}
.chan .dot{position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:20px;border-radius:0 4px 4px 0;background:#fff;display:none}
.chan.unread:not(.active) .dot{display:block}
.badge{min-width:20px;height:20px;padding:0 6px;border-radius:20px;background:var(--primary);color:#fff;font-size:11.5px;font-weight:800;display:none;align-items:center;justify-content:center;flex:0 0 auto}
.chan.unread .badge{display:inline-flex}
.chan.active .badge{background:#053b34;color:#fff}
.side-foot{padding:12px 14px;border-top:1px solid #2b2b2b}
.side-foot a{color:var(--side-text);text-decoration:none;font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.side-foot a:hover{color:#fff}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--cream)}
.mhead{flex:0 0 auto;padding:15px 26px;border-bottom:1px solid var(--border);background:rgba(255,252,245,.9);backdrop-filter:blur(8px);display:flex;align-items:center;gap:12px}
.mhead .burger{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--secondary)}
.mhead .hemo{font-size:24px}
.mhead h2{font-size:20px}
.mhead p{color:var(--soft);font-size:13px;margin-top:1px}
.feed{flex:1;overflow-y:auto;padding:22px 26px 10px;scroll-behavior:smooth}
.feed::-webkit-scrollbar{width:10px}.feed::-webkit-scrollbar-thumb{background:#e4d9c6;border-radius:10px}
.feedwrap{max-width:900px;margin:0 auto}

/* message rows (chat-like) */
.msg{display:flex;gap:13px;padding:12px 12px;border-radius:16px;transition:background .12s}
.msg:hover{background:#fff}
.av{flex:0 0 44px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;font-family:'Space Grotesk';box-shadow:0 3px 8px rgba(0,0,0,.10)}
.msg .bd{flex:1;min-width:0}
.msg .top{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.msg .who{font-weight:800;color:var(--secondary);font-size:15px}
.msg .tag{font-size:10px;font-weight:800;background:var(--primary);color:#fff;border-radius:30px;padding:2px 8px;text-transform:uppercase;letter-spacing:.03em}
.msg .tag.team{background:var(--ink)}
.msg .time{font-size:12px;color:var(--soft)}
.msg .txt{font-size:15.5px;white-space:pre-wrap;word-break:break-word;margin-top:3px;color:#242424}
.msg .acts{display:flex;gap:16px;margin-top:8px;font-size:13px}
.msg .acts a{color:var(--soft);text-decoration:none;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.msg .acts a:hover{color:var(--primary)}
.replies{margin-top:11px;padding-left:14px;border-left:2px solid var(--border);display:none}
.replies.open{display:block}
.reply{display:flex;gap:10px;padding:8px 0}
.reply .av{flex:0 0 32px;width:32px;height:32px;font-size:13px}
.reply .who{font-weight:700;font-size:13.5px;color:var(--secondary)}
.reply .time{font-size:11.5px;color:var(--soft)}
.reply .txt{font-size:14px;margin-top:1px}
.replybox{display:flex;gap:8px;margin:8px 0 4px;padding-left:42px}
.replybox input{flex:1;padding:10px 13px;border:1.5px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px;outline:none;background:#fff}
.replybox input:focus{border-color:var(--turq)}
.day{text-align:center;margin:16px 0;position:relative}
.day span{background:var(--cream);position:relative;padding:0 12px;color:var(--soft);font-size:12px;font-weight:700}
.day::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.empty{padding:60px 20px;text-align:center;color:var(--soft)}
.empty .em{font-size:52px;display:block;margin-bottom:10px}

/* composer */
.composer{flex:0 0 auto;padding:12px 26px 16px;border-top:1px solid var(--border);background:var(--cream)}
.composer .inner{max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:#fff;border:1.5px solid var(--border);border-radius:18px;padding:8px 8px 8px 16px}
.composer .inner:focus-within{border-color:var(--turq);box-shadow:0 0 0 3px rgba(45,212,191,.14)}
.composer textarea{flex:1;border:0;resize:none;max-height:140px;min-height:26px;font-family:inherit;font-size:15px;outline:none;background:none;line-height:1.5;padding:6px 0}
.composer .send{flex:0 0 auto;width:44px;height:44px;border-radius:14px;border:none;background:var(--turq);color:#053b34;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.composer .send:hover{background:var(--turq-dark);color:#fff}
.composer .note{max-width:900px;margin:0 auto;color:var(--soft);font-size:13px;text-align:center;padding:10px}

/* gate / loading */
.gate{max-width:460px;margin:9vh auto;text-align:center;background:#fff;border:1px solid var(--border);border-radius:22px;padding:42px 30px;box-shadow:0 20px 50px rgba(0,0,0,.08)}
.gate .em{font-size:54px}
.center{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--soft)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--secondary);color:#fff;padding:14px 24px;border-radius:50px;font-weight:600;font-size:14px;z-index:400;display:none}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90}

@media(max-width:860px){
  .side{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .22s ease;box-shadow:10px 0 40px rgba(0,0,0,.3)}
  .side.open{transform:translateX(0)}
  .scrim.open{display:block}
  .mhead .burger{display:block}
  .feed{padding:16px 14px 8px}
  .composer{padding:10px 14px 14px}
  .msg:hover{background:transparent}
}
</style>
<link rel="stylesheet" href="club-theme.css">
</head>
<body>
<div id="root"><div class="center">Lädt…</div></div>
<div class="scrim" id="scrim" onclick="closeSide()"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
const sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
let user=null, isAdmin=false, channels=[], cur=null, unread={};

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.style.display='block'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3000); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ago(d){ const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return 'gerade eben'; if(s<3600)return Math.floor(s/60)+' Min'; if(s<86400)return Math.floor(s/3600)+' Std'; if(s<172800)return 'gestern'; return new Date(d).toLocaleDateString('de-DE',{day:'numeric',month:'short'}); }
function initials(n){ const p=(n||'?').trim().split(/\s+/); return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'?'; }
const AVC=['#DD0000','#14B8A6','#2DD4BF','#F59E0B','#7C3AED','#0EA5E9','#EC4899','#059669','#EA580C','#06403A'];
function avColor(n){ let h=0; for(const c of (n||'')) h=(h*31+c.charCodeAt(0))>>>0; return AVC[h%AVC.length]; }
function avatar(n,cls){ return `<div class="av ${cls||''}" style="background:${avColor(n)}">${esc(initials(n))}</div>`; }

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){
    document.getElementById('root').innerHTML = `<div class="gate"><div class="em">🔒</div>
      <h2 style="margin:12px 0 8px">Nur für Club-Mitglieder</h2>
      <p style="color:var(--soft);margin-bottom:18px">Melde dich an, um in die Community zu kommen — Fragen stellen, üben und dich mit anderen Deutschlernern austauschen.</p>
      <a class="btn btn-primary" href="live.html">Anmelden / Registrieren</a></div>`;
    return;
  }
  user = session.user;

  // Community-Zugang ist gratis, solange aktive Stunden vorhanden sind ODER ein Abo läuft.
  const { data: prof } = await sb.from('profiles').select('credits,pass_until,is_admin').eq('id', user.id).single();
  isAdmin = !!prof?.is_admin;
  const credits = prof?.credits || 0;
  const passActive = prof?.pass_until && new Date(prof.pass_until) > new Date();
  if (credits <= 0 && !passActive && !isAdmin){
    document.getElementById('root').innerHTML = `<div class="gate"><div class="em">⏳</div>
      <h2 style="margin:12px 0 8px">Dein Stundenguthaben ist aufgebraucht</h2>
      <p style="color:var(--soft);margin-bottom:18px">Der Community-Zugang ist gratis, solange du aktive Stunden hast. Such dir ein Stundenpaket aus, um deinen Zugang zu behalten.</p>
      <a class="btn btn-primary" href="/preise">Stundenpaket aussuchen</a></div>`;
    return;
  }

  const { data } = await sb.from('community_channels').select('*').eq('is_active', true).order('sort_order');
  channels = (data || []).filter(c => isAdmin || !c.team_only);
  cur = channels[0]?.slug || null;
  await refreshUnread();
  renderShell();
  if (cur){ await markRead(cur); loadFeed(); }
}

async function refreshUnread(){
  try{
    const { data } = await sb.rpc('community_unread');
    unread = {}; (data||[]).forEach(r => { unread[r.channel] = r.unread||0; });
  }catch(e){ unread = unread||{}; }
  paintBadges();
}
function totalUnread(){ return Object.values(unread).reduce((a,b)=>a+(b||0),0); }
function paintBadges(){
  channels.forEach(c=>{
    const el = document.getElementById('chan-'+c.slug); if(!el) return;
    const n = unread[c.slug]||0;
    el.classList.toggle('unread', n>0 && c.slug!==cur);
    const b = el.querySelector('.badge'); if(b) b.textContent = n>99?'99+':n;
  });
}
async function markRead(slug){
  try{ await sb.rpc('community_mark_read', { p_channel: slug }); }catch(e){}
  unread[slug] = 0; paintBadges();
}

function renderShell(){
  document.getElementById('root').innerHTML = `
  <div class="app">
    <aside class="side" id="side">
      <div class="side-head">
        <img src="logo.PNG" onerror="this.style.display='none'">
        <div class="t">deutschoderwas <span class="club">club</span><small>Community</small></div>
      </div>
      <div class="side-scroll">
        <h3># Kanäle</h3>
        ${channels.map(c=>`
          <div class="chan" id="chan-${c.slug}" onclick="switchChan('${c.slug}')">
            <span class="dot"></span>
            <span class="em">${c.emoji||'#'}</span>
            <span class="nm">${esc(c.name)}</span>
            <span class="badge">0</span>
          </div>`).join('')}
      </div>
      <div class="side-foot">
        <a href="/schuelerbereich">← Mein Schülerbereich</a>
      </div>
    </aside>
    <div class="scrim" id="scrim2" onclick="closeSide()"></div>
    <main class="main">
      <div class="mhead" id="mhead"></div>
      <div class="feed" id="feed"></div>
      <div class="composer" id="composer"></div>
    </main>
  </div>`;
  // sync active + badges after (re)render
  const a=document.getElementById('chan-'+cur); if(a) a.classList.add('active');
  paintBadges();
}
function openSide(){ document.getElementById('side')?.classList.add('open'); document.getElementById('scrim2')?.classList.add('open'); }
function closeSide(){ document.getElementById('side')?.classList.remove('open'); document.querySelectorAll('.scrim').forEach(s=>s.classList.remove('open')); }

async function switchChan(slug){
  if(slug===cur){ closeSide(); return; }
  document.getElementById('chan-'+cur)?.classList.remove('active');
  cur = slug;
  document.getElementById('chan-'+cur)?.classList.add('active');
  closeSide();
  await markRead(cur);
  loadFeed();
}

async function loadFeed(){
  const ch = channels.find(c=>c.slug===cur);
  const head = document.getElementById('mhead');
  const feed = document.getElementById('feed');
  const comp = document.getElementById('composer');
  head.innerHTML = `<button class="burger" onclick="openSide()">☰</button>
    <span class="hemo">${ch.emoji||'#'}</span>
    <div><h2>${esc(ch.name)}</h2><p>${esc(ch.description||'Tausch dich mit der Community aus')}</p></div>`;
  feed.innerHTML = `<div class="feedwrap"><div class="empty">Lädt…</div></div>`;

  const canPost = isAdmin || !ch.team_only;
  comp.innerHTML = canPost
    ? `<div class="inner">
         <textarea id="newPost" rows="1" placeholder="Nachricht an #${esc(ch.name)} …" oninput="autoGrow(this)" onkeydown="composerKey(event)"></textarea>
         <button class="send" onclick="post()" title="Senden">➤</button>
       </div>`
    : `<div class="note">📣 In diesem Kanal postet nur das Team.</div>`;

  const { data } = await sb.rpc('community_feed', { p_channel: cur });
  const posts = data || [];
  if(!posts.length){
    feed.innerHTML = `<div class="feedwrap"><div class="empty"><span class="em">${ch.emoji||'💬'}</span>Noch keine Beiträge in <b>${esc(ch.name)}</b> — sei die/der Erste! 🎉</div></div>`;
    return;
  }
  feed.innerHTML = `<div class="feedwrap" id="posts">${posts.map(postHtml).join('')}</div>`;
}

function postHtml(p){
  const tag = p.is_admin ? '<span class="tag">Julia</span>' : '';
  return `<div class="msg" id="post-${p.id}">
    ${avatar(p.author)}
    <div class="bd">
      <div class="top"><span class="who">${esc(p.author)}</span>${tag}<span class="time">${ago(p.created_at)}</span></div>
      <div class="txt">${esc(p.body)}</div>
      <div class="acts">
        <a onclick="toggleReplies('${p.id}')">💬 ${p.replies>0?p.replies+' Antworten':'Antworten'}</a>
        ${p.is_mine?`<a onclick="delPost('${p.id}')">🗑 Löschen</a>`:''}
      </div>
      <div class="replies" id="rep-${p.id}"></div>
    </div>
  </div>`;
}

function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,140)+'px'; }
function composerKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); post(); } }

async function post(){
  const t = document.getElementById('newPost'); if(!t) return;
  const body = t.value.trim(); if(!body) return;
  t.disabled = true;
  const { error } = await sb.from('community_posts').insert({ channel:cur, user_id:user.id, body });
  t.disabled = false;
  if (error) return toast('Fehler: '+error.message);
  t.value=''; autoGrow(t);
  await markRead(cur);
  await loadFeed();
  const f=document.getElementById('feed'); if(f) f.scrollTop=f.scrollHeight;
}
async function delPost(id){ if(!confirm('Beitrag löschen?'))return; await sb.from('community_posts').delete().eq('id',id); loadFeed(); }

async function toggleReplies(id){
  const box = document.getElementById('rep-'+id);
  if (box.classList.contains('open')){ box.classList.remove('open'); return; }
  box.classList.add('open'); box.innerHTML='<div class="reply"><div class="txt" style="color:var(--soft)">Lädt…</div></div>';
  const { data } = await sb.rpc('post_replies', { p_post: id });
  const reps = data || [];
  box.innerHTML = reps.map(r=>`<div class="reply">${avatar(r.author,'')}
      <div class="bd"><div class="top"><span class="who">${esc(r.author)}</span>${r.is_admin?'<span class="tag">Julia</span>':''}<span class="time">${ago(r.created_at)}</span></div>
      <div class="txt">${esc(r.body)}</div></div></div>`).join('')
    + `<div class="replybox"><input id="ri-${id}" placeholder="Antworten…" onkeydown="if(event.key==='Enter')reply('${id}')"><button class="btn btn-turq btn-sm" onclick="reply('${id}')">Senden</button></div>`;
}
async function reply(postId){
  const inp = document.getElementById('ri-'+postId);
  const body = inp.value.trim(); if(!body) return;
  inp.disabled=true;
  const { error } = await sb.from('community_replies').insert({ post_id:postId, user_id:user.id, body });
  inp.disabled=false;
  if (error) return toast('Fehler: '+error.message);
  inp.value='';
  const box=document.getElementById('rep-'+postId); box.classList.remove('open'); toggleReplies(postId);
}
init();
</script>
<script src="club-fx.js"></script>
</body>
</html>
