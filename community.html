<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — deutschoderwas club</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#DD0000;--primary-dark:#B30000;--secondary:#1A1A1A;--accent:#FFCE00;--turquoise:#2DD4BF;--cream:#FFFCF5;--bg:#FFF8E0;--text:#1A1A1A;--text-soft:#6B7280;--border:#F0E5D8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.55}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
.nav{position:sticky;top:0;z-index:50;background:rgba(255,249,242,.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;text-decoration:none;color:var(--secondary)}
.logo-icon{width:38px;height:38px;border-radius:50%;object-fit:cover}
.logo .club{color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:50px;text-decoration:none;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:#fff;color:var(--secondary);border:2px solid var(--border)}
.btn-sm{padding:7px 13px;font-size:12px}
.shell{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 63px)}
.side{background:#fff;border-right:1px solid var(--border);padding:20px 14px}
.side h3{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text-soft);margin-bottom:10px}
.chan{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;margin-bottom:3px}
.chan:hover{background:var(--bg)}
.chan.active{background:var(--secondary);color:#fff}
.chan small{display:block;font-weight:400;font-size:11px;color:var(--text-soft)}
.chan.active small{color:#cbd5d1}
.main{padding:24px 28px;max-width:760px}
.chead{margin-bottom:16px}
.chead h2{font-size:22px}
.chead p{color:var(--text-soft);font-size:14px}
.composer{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:14px;margin-bottom:20px}
.composer textarea{width:100%;border:0;resize:vertical;min-height:60px;font-family:inherit;font-size:15px;outline:none}
.composer .row{display:flex;justify-content:flex-end;margin-top:8px}
.post{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.post .meta{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-soft);margin-bottom:8px}
.post .who{font-weight:800;color:var(--secondary)}
.tag{font-size:10px;font-weight:800;background:var(--primary);color:#fff;border-radius:30px;padding:2px 7px;text-transform:uppercase}
.post .body{font-size:15px;white-space:pre-wrap;word-break:break-word}
.post .acts{display:flex;gap:14px;margin-top:10px;font-size:13px}
.post .acts a{color:var(--text-soft);text-decoration:none;font-weight:700;cursor:pointer}
.post .acts a:hover{color:var(--primary)}
.replies{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;display:none}
.reply{padding:8px 0;border-bottom:1px solid var(--bg)}
.reply .meta{font-size:12px;color:var(--text-soft);margin-bottom:3px}
.reply .who{font-weight:700;color:var(--secondary)}
.replybox{display:flex;gap:8px;margin-top:8px}
.replybox input{flex:1;padding:9px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px}
.empty{padding:50px 20px;text-align:center;color:var(--text-soft)}
.gate{max-width:460px;margin:80px auto;text-align:center;background:#fff;border:1px solid var(--border);border-radius:20px;padding:40px 30px}
.gate .em{font-size:54px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--secondary);color:#fff;padding:14px 24px;border-radius:50px;font-weight:600;font-size:14px;z-index:300;display:none}
@media(max-width:780px){.shell{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--border)}.main{padding:18px}}
</style>
<link rel="stylesheet" href="club-theme.css">
</head>
<body>
<nav class="nav">
  <a href="/" class="logo"><img src="logo.PNG" class="logo-icon" onerror="this.style.display='none'"><span>deutschoderwas <span class="club">club</span> · Community</span></a>
  <a class="btn btn-ghost btn-sm" href="/schuelerbereich">Mein Bereich</a>
</nav>
<div id="root"><div class="empty">Lädt…</div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
const sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
let user=null, channels=[], cur=null;
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.style.display='block'; setTimeout(()=>el.style.display='none',3000); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ago(d){ const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return 'gerade eben'; if(s<3600)return Math.floor(s/60)+' Min'; if(s<86400)return Math.floor(s/3600)+' Std'; return new Date(d).toLocaleDateString('de-DE',{day:'numeric',month:'short'}); }

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){
    document.getElementById('root').innerHTML = `<div class="gate"><div class="em">🔒</div>
      <h2 style="margin:12px 0 8px">Nur für Club-Mitglieder</h2>
      <p style="color:var(--text-soft);margin-bottom:18px">Melde dich an, um in die Community zu kommen — Fragen stellen, üben und dich mit anderen Deutschlernern austauschen.</p>
      <a class="btn btn-primary" href="live.html">Anmelden / Registrieren</a></div>`;
    return;
  }
  user = session.user;
  const { data } = await sb.from('community_channels').select('*').eq('is_active', true).order('sort_order');
  channels = data || [];
  cur = channels[0]?.slug;
  renderShell(); if (cur) loadFeed();
}

function renderShell(){
  document.getElementById('root').innerHTML = `
  <div class="shell">
    <aside class="side">
      <h3># Kanäle</h3>
      ${channels.map(c=>`<div class="chan ${c.slug===cur?'active':''}" onclick="switchChan('${c.slug}')">
        <span>${c.emoji||'#'}</span><div><div>${esc(c.name)}</div></div></div>`).join('')}
    </aside>
    <main class="main" id="feed"></main>
  </div>`;
}
function switchChan(slug){ cur=slug; renderShell(); loadFeed(); }

async function loadFeed(){
  const ch = channels.find(c=>c.slug===cur);
  const feed = document.getElementById('feed');
  const { data } = await sb.rpc('community_feed', { p_channel: cur });
  const posts = data || [];
  feed.innerHTML = `
    <div class="chead"><h2>${ch.emoji||'#'} ${esc(ch.name)}</h2><p>${esc(ch.description||'')}</p></div>
    <div class="composer">
      <textarea id="newPost" placeholder="Schreib etwas an die Community…"></textarea>
      <div class="row"><button class="btn btn-primary btn-sm" onclick="post()">Posten</button></div>
    </div>
    <div id="posts">${posts.length ? posts.map(postHtml).join('') : '<div class="empty">Noch keine Beiträge — sei die/der Erste! 🎉</div>'}</div>`;
}
function postHtml(p){
  return `<div class="post" id="post-${p.id}">
    <div class="meta"><span class="who">${esc(p.author)}</span>${p.is_admin?'<span class="tag">Julia</span>':''}<span>· ${ago(p.created_at)}</span></div>
    <div class="body">${esc(p.body)}</div>
    <div class="acts">
      <a onclick="toggleReplies('${p.id}')">💬 ${p.replies>0?p.replies+' Antworten':'Antworten'}</a>
      ${p.is_mine?`<a onclick="delPost('${p.id}')">Löschen</a>`:''}
    </div>
    <div class="replies" id="rep-${p.id}"></div>
  </div>`;
}
async function post(){
  const t = document.getElementById('newPost');
  const body = t.value.trim(); if(!body) return;
  const { error } = await sb.from('community_posts').insert({ channel:cur, user_id:user.id, body });
  if (error) return toast('Fehler: '+error.message);
  t.value=''; loadFeed();
}
async function delPost(id){ if(!confirm('Beitrag löschen?'))return; await sb.from('community_posts').delete().eq('id',id); loadFeed(); }

async function toggleReplies(id){
  const box = document.getElementById('rep-'+id);
  if (box.style.display==='block'){ box.style.display='none'; return; }
  box.style.display='block'; box.innerHTML='<div class="reply" style="color:var(--text-soft)">Lädt…</div>';
  const { data } = await sb.rpc('post_replies', { p_post: id });
  const reps = data || [];
  box.innerHTML = reps.map(r=>`<div class="reply"><div class="meta"><span class="who">${esc(r.author)}</span>${r.is_admin?' <span class="tag">Julia</span>':''} · ${ago(r.created_at)}</div><div>${esc(r.body)}</div></div>`).join('')
    + `<div class="replybox"><input id="ri-${id}" placeholder="Antworten…" onkeydown="if(event.key==='Enter')reply('${id}')"><button class="btn btn-primary btn-sm" onclick="reply('${id}')">Senden</button></div>`;
}
async function reply(postId){
  const inp = document.getElementById('ri-'+postId);
  const body = inp.value.trim(); if(!body) return;
  const { error } = await sb.from('community_replies').insert({ post_id:postId, user_id:user.id, body });
  if (error) return toast('Fehler: '+error.message);
  inp.value=''; toggleReplies(postId); toggleReplies(postId);
}
init();
</script>
<script src="club-fx.js"></script>
</body>
</html>
