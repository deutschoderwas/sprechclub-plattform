<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- PWA / Als App installierbar -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#DD0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="do club">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">

<title>Mein Bereich — deutschoderwas club</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#DD0000;--primary-dark:#B30000;--secondary:#1A1A1A;--accent:#FFCE00;--turquoise:#2DD4BF;--turquoise-soft:#A7F3D0;--cream:#FFFCF5;--bg:#FFF8E0;--text:#1A1A1A;--text-soft:#6B7280;--border:#F0E5D8;--green:#0a7a5c;--green-soft:#E8FAF3}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:clip;max-width:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.55}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:-.02em}
a{color:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:50px;text-decoration:none;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 6px 18px rgba(221,0,0,.28)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-ghost{background:#fff;color:var(--secondary);border:2px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.btn-turq{background:var(--turquoise);color:#063}
.btn-sm{padding:8px 14px;font-size:13px}
.btn[disabled]{opacity:.45;cursor:not-allowed}

/* ---------- Shell / Sidebar ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{width:236px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:16px;text-decoration:none;color:var(--secondary);padding:6px 8px 16px}
.brand img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.navlink{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;text-decoration:none;color:var(--text-soft);font-weight:600;font-size:14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.navlink .ic{font-size:17px;width:22px;text-align:center}
.navlink:hover{background:var(--bg);color:var(--secondary)}
.navlink.active{background:var(--secondary);color:#fff}
.navlink .badge{margin-left:auto;background:var(--primary);color:#fff;font-size:11px;font-weight:800;border-radius:20px;padding:1px 7px}
.navlink.active .badge{background:var(--accent);color:var(--secondary)}
.side-foot{margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}

.main{flex:1;min-width:0;padding:26px 30px 70px;max-width:920px;margin:0 auto;width:100%}
.view{display:none}
.view.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pagehead{margin-bottom:18px}
.pagehead h1{font-size:26px}
.pagehead p{color:var(--text-soft);font-size:14px;margin-top:2px}

/* ---------- Cards / generic ---------- */
.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center}
.stat .big{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;line-height:1}
.stat .lbl{font-size:12px;color:var(--text-soft);margin-top:4px;font-weight:600}
.level-pill{font-size:11px;font-weight:800;background:var(--bg);color:var(--primary);border-radius:30px;padding:4px 10px;text-transform:uppercase;letter-spacing:.4px}
.empty{background:#fff;border:1px dashed var(--border);border-radius:16px;padding:24px;text-align:center;color:var(--text-soft)}
h2.sec{margin:24px 0 12px;font-size:19px}
.muted{color:var(--text-soft);font-size:13px}

/* ---------- Dashboard hero ---------- */
.hero-card{background:linear-gradient(135deg,#FFF9F2,#FFF4D6);border:2px solid var(--accent);border-radius:22px;padding:22px 24px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
.hero-card h1{font-size:24px}
.streak-chip{display:inline-flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--primary);border-radius:50px;padding:8px 16px;font-weight:800;font-family:'Space Grotesk',sans-serif}
.rankbar{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:14px}
.rankbar .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.rankbar .rank{font-weight:800;font-family:'Space Grotesk',sans-serif}
.bar{height:12px;background:var(--bg);border-radius:20px;overflow:hidden}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:20px;transition:width .6s}
.next-hero{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.next-hero .when{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px}
.cd{display:inline-flex;gap:6px;font-size:12px;color:var(--text-soft);font-weight:700}

/* ---------- Lernpfad ---------- */
.path{position:relative;padding-left:8px}
.pstep{display:flex;gap:16px;align-items:flex-start;position:relative;padding-bottom:6px}
.pdot{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;border:3px solid var(--border);background:#fff;color:var(--text-soft);z-index:2}
.pstep.done .pdot{background:var(--turquoise);border-color:var(--turquoise);color:#053}
.pstep.current .pdot{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 0 0 5px rgba(221,0,0,.15)}
.pline{position:absolute;left:22px;top:46px;bottom:-6px;width:3px;background:var(--border);z-index:1}
.pstep.done .pline{background:var(--turquoise)}
.pstep:last-child .pline{display:none}
.pbody{flex:1;background:#fff;border:1px solid var(--border);border-radius:14px;padding:13px 16px;margin-bottom:12px}
.pbody b{font-size:15px}
.pbody .goal{font-size:11px;font-weight:800;color:var(--primary)}

/* ---------- Abzeichen ---------- */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.badge-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;position:relative}
.badge-card.locked{opacity:.45;filter:grayscale(.7)}
.badge-card .em{font-size:34px;line-height:1}
.badge-card b{display:block;font-size:13px;margin-top:8px}
.badge-card span{font-size:11px;color:var(--text-soft)}

/* ---------- Stunden / Phasen ---------- */
.head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.when{font-family:'Space Grotesk',sans-serif;font-weight:700;min-width:140px}
.what{flex:1;min-width:150px}.what b{display:block}.what span{font-size:13px;color:var(--text-soft)}
.phasen{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-top:14px}
.phase{border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center;font-size:13px;background:#fff}
.phase b{display:block;font-size:12px;margin-bottom:8px}
.phase.ready{border-color:var(--turquoise);background:var(--green-soft)}
.phase.done-ph{border-color:var(--turquoise)}
.phase .nope{color:var(--text-soft)}
.phase .doneflag{color:var(--green);font-weight:700;font-size:12px}

/* ---------- Flashcards ---------- */
.flashwrap{max-width:480px;margin:0 auto;text-align:center}
.flashcard{background:#fff;border:2px solid var(--border);border-radius:24px;min-height:190px;display:flex;align-items:center;justify-content:center;padding:28px;cursor:pointer;font-size:23px;font-weight:700;font-family:'Space Grotesk',sans-serif;box-shadow:0 14px 34px rgba(0,0,0,.06);user-select:none}
.flashcard .hint{display:block;font-size:12px;color:var(--text-soft);font-weight:500;font-family:'Inter',sans-serif;margin-top:14px}
.flashnav{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.vocab-list{margin-top:24px;text-align:left}
.vrow{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:8px;font-size:14px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.vrow b{color:var(--primary)}
.vrow .known{font-size:12px;color:var(--green);font-weight:700}

/* ---------- Übungs-Runner (Modal) ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(26,26,26,.55);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:22px;padding:24px;max-width:640px;width:100%;position:relative;margin:auto}
.modal .close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-soft)}
.cfm-bg{position:fixed;inset:0;background:rgba(26,26,26,.6);z-index:360;display:none;align-items:center;justify-content:center;padding:20px}
.cfm-bg.open{display:flex}
.cfm{background:#fff;border-radius:24px;padding:30px 26px;max-width:420px;width:100%;text-align:center;box-shadow:0 26px 64px rgba(0,0,0,.28);position:relative;animation:cfmIn .26s cubic-bezier(.2,.9,.3,1.2)}
@keyframes cfmIn{from{opacity:0;transform:translateY(14px) scale(.95)}to{opacity:1;transform:none}}
.cfm .ico{font-size:44px;line-height:1;margin-bottom:6px}
.cfm h3{font-size:22px;margin:0 0 4px}
.cfm .hint{color:var(--text-soft);font-size:13.5px;margin:8px 0 0;line-height:1.5}
.cfm .det{background:var(--bg);border-radius:14px;padding:14px 16px;margin:16px 0 4px;text-align:left}
.cfm .det b{display:block;font-size:16px;margin-bottom:2px}
.cfm .det span{color:var(--text-soft);font-size:13.5px}
.cfm .acts{display:flex;gap:10px;margin-top:20px}
.cfm .acts .btn{flex:1;justify-content:center}
.ex{border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.ex .q{font-weight:700;margin-bottom:10px}
.ex .opt{display:block;padding:9px 12px;border:2px solid var(--border);border-radius:10px;margin-bottom:7px;cursor:pointer;font-size:14px}
.ex .opt:hover{border-color:var(--secondary)}
.ex .opt.sel{border-color:var(--secondary);background:var(--bg)}
.ex .opt.right{border-color:var(--green);background:var(--green-soft)}
.ex .opt.wrong{border-color:var(--primary);background:#FDECEC}
.ex input.gap,.ex textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px}
.ex textarea{min-height:70px}
.ex select{padding:8px 10px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px}
.matchrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:14px}
.matchrow b{min-width:130px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.chip{background:var(--bg);border:2px solid var(--border);border-radius:30px;padding:7px 13px;font-size:14px;cursor:pointer;font-family:inherit}
.chip:hover{border-color:var(--secondary)}
.buildarea{min-height:42px;border:1.5px dashed var(--border);border-radius:10px;padding:8px;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:6px}
.fb{font-size:13px;margin-top:8px;font-weight:600}
.fb.ok{color:var(--green)}.fb.no{color:var(--primary)}
.tip-card{background:var(--green-soft);border:1px solid var(--turquoise);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.ptabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.ptab{border:none;background:none;padding:9px 12px;font-weight:700;font-size:13px;color:var(--text-soft,#5C5C5C);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit}
.ptab.active{color:var(--primary,#DD0000);border-bottom-color:var(--primary,#DD0000)}
.corr{background:#fff;border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:8px;font-size:14px}
.corr-w{color:#dc2626;text-decoration:line-through}
.corr-r{color:#16a34a;font-weight:700}
.live-notes{white-space:pre-wrap;min-height:80px;font-size:15px;line-height:1.6}
.live-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#dc2626;margin-right:6px;vertical-align:middle;animation:livePulse 1.2s infinite}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 7px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.tip-card b{display:block;margin-bottom:4px}
.score-banner{background:var(--secondary);color:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:14px}
.score-banner .big{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700}

/* ---------- Nachrichten ---------- */
.thread{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.msg{max-width:78%;padding:11px 14px;border-radius:16px;font-size:14px}
.msg.student{align-self:flex-end;background:var(--secondary);color:#fff;border-bottom-right-radius:4px}
.msg.teacher{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg small{display:block;opacity:.6;font-size:11px;margin-top:3px}
.composer{display:flex;gap:8px}
.composer input{flex:1;padding:12px 14px;border:2px solid var(--border);border-radius:14px;font-family:inherit;font-size:14px}

/* ---------- Profil ---------- */
.field{margin-bottom:14px}
.field label{display:block;font-weight:700;font-size:13px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:12px;font-family:inherit;font-size:14px}
.field textarea{min-height:70px}

/* ---------- Verlauf ---------- */
.log{background:#fff;border:1px solid var(--border);border-radius:12px;padding:11px 15px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:10px}
.log .delta{font-family:'Space Grotesk',sans-serif;font-weight:700}
.log .delta.plus{color:var(--green)}.log .delta.minus{color:var(--primary)}

.stars{font-size:22px;cursor:pointer;letter-spacing:2px;color:#d8d8d8}
.stars .on{color:var(--accent)}

.kauf-ok{background:var(--green-soft);border:2px solid var(--turquoise);border-radius:16px;padding:14px 18px;margin-bottom:16px;font-weight:600;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--secondary);color:#fff;padding:14px 24px;border-radius:50px;font-weight:600;font-size:14px;z-index:400;display:none}
.mobtop{display:none}

@media(max-width:860px){
  .shell{flex-direction:column}
  .sidebar{width:100%;height:auto;position:sticky;top:0;z-index:90;flex-direction:row;overflow-x:auto;gap:6px;padding:10px;border-right:none;border-bottom:1px solid var(--border)}
  .brand{display:none}
  .navlink{flex-direction:column;gap:3px;min-width:66px;padding:8px 6px;font-size:11px;text-align:center;border-radius:12px}
  .navlink .ic{font-size:18px}
  .navlink .badge{position:absolute;margin:0;top:2px;right:8px}
  .navlink{position:relative}
  .side-foot{display:none}
  .main{padding:18px 16px 80px}
  .grid2,.grid3{grid-template-columns:1fr}
  .mobtop{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:#fff}
}
/* Kalender im Schülerbereich */
.kal-pills{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.kpill{border:2px solid var(--border);background:#fff;border-radius:50px;padding:8px 15px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text-soft)}
.kpill.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.kal-levels{margin-top:2px}
.kpill.lvl{font-size:12px;padding:6px 12px}
.kal-week{display:flex;align-items:center;justify-content:center;gap:14px;margin:6px 0 16px}
.kal-week button{background:#fff;border:2px solid var(--border);border-radius:50px;padding:6px 14px;font-weight:700;cursor:pointer;font-family:inherit}
.kal-week span{font-weight:800;font-family:'Space Grotesk',sans-serif}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 16px}
.cal-legend .lg{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text-soft)}
.cal-legend .dot{width:12px;height:12px;border-radius:4px;display:inline-block}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(160px,1fr));gap:10px;overflow-x:auto;padding-bottom:6px}
.cal-day{background:#fff;border:1px solid var(--border);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:8px}
.cal-dayhead{text-align:center;padding:6px 0;border-bottom:1px solid var(--border)}
.cal-dayhead b{display:block;font-family:'Space Grotesk',sans-serif;font-size:15px;text-transform:capitalize}
.cal-dayhead span{font-size:12px;color:var(--text-soft)}
.cal-dayhead.today{border-bottom:2px solid var(--primary)}
.cal-dayhead.today b{color:var(--primary)}
.cal-empty{color:#e3e3e3;text-align:center;font-size:18px;padding:8px 0}
.ev{border-left:5px solid var(--c,#2DD4BF);background:var(--cream);border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:5px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ev-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.ev-time{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;white-space:nowrap}
.ev-club{font-size:9px;font-weight:800;letter-spacing:.3px;color:#fff;padding:2px 7px;border-radius:20px;text-transform:uppercase;white-space:nowrap;text-shadow:0 1px 1px rgba(0,0,0,.28)}
.ev-title{font-size:13px;font-weight:700;line-height:1.2}
.ev-meta{font-size:11.5px;color:var(--text-soft)}
.ev-lvlrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ev-lvl{font-size:10px;font-weight:800;letter-spacing:.3px;padding:1px 7px;border-radius:20px;background:#fff;white-space:nowrap}
.ev-btn{margin-top:2px;border:none;border-radius:20px;padding:7px 10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;display:block}
.ev-btn.book{background:var(--secondary);color:#fff}
.ev-btn.meet{background:var(--turquoise);color:#fff}
.ev-btn.mine{background:var(--green-soft);color:var(--green);font-weight:800}
.ev-btn.off{background:#f1f1f1;color:#aaa}
.ev-btn.mat{background:var(--accent);color:#5a4a00}
@media(max-width:820px){.cal-grid{grid-template-columns:1fr;overflow-x:visible}.cal-empty{display:none}.cal-day:has(.cal-empty){display:none}}

.agenda{display:flex;flex-direction:column;gap:14px}
.ag-row{display:flex;gap:14px;align-items:stretch;background:#fff;border:1px solid var(--border);border-radius:18px;padding:12px 14px;box-shadow:0 6px 18px rgba(0,0,0,.05);animation:agIn .45s ease both}
.ag-row:nth-child(2){animation-delay:.05s}.ag-row:nth-child(3){animation-delay:.1s}.ag-row:nth-child(4){animation-delay:.15s}.ag-row:nth-child(5){animation-delay:.2s}.ag-row:nth-child(6){animation-delay:.25s}.ag-row:nth-child(7){animation-delay:.3s}
@keyframes agIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ag-day{flex:0 0 104px;display:flex;flex-direction:column;justify-content:center;gap:2px;border-right:1px solid var(--border);padding-right:12px}
.ag-day b{font-family:'Space Grotesk',sans-serif;font-size:17px;text-transform:capitalize;line-height:1.1}
.ag-day span{font-size:12px;color:var(--text-soft)}
.ag-day em{margin-top:4px;align-self:flex-start;font-style:normal;font-size:10px;font-weight:800;letter-spacing:.04em;background:var(--primary);color:#fff;padding:2px 8px;border-radius:20px}
.ag-day.today b{color:var(--primary)}
.ag-events{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 6px;flex:1}
.ag-events .ev{flex:0 0 215px;transition:transform .2s ease,box-shadow .2s ease}
.ag-events .ev:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(0,0,0,.13)}

<script>
const CFG = window.SPRECHCLUB_CONFIG;
const DEMO = CFG.SUPABASE_URL.startsWith('HIER_');
const AMANDA_AGENT_ID = 'agent_8401kt4vq157espa2msk6c448s5x';
const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const RANKS = [
  {min:0,name:'Starter'},{min:200,name:'Sprachschüler'},{min:500,name:'Vielsprecher'},
  {min:1000,name:'Sprachprofi'},{min:2000,name:'Sprach-Held'},{min:3500,name:'Legende'}
];

let sb=null, user=null, profile={}, bookings=[], creditLog=[], messages=[], ratings=[];
let materials={}, progress={}, postNotes={};   // materials[class_id]=content ; progress[class_id+'|'+phase]=row ; postNotes[class_id]={notes,post_content}
let credits=0, stats={};

const _qp = new URLSearchParams(location.search);
if (_qp.get('kauf')==='ok') document.getElementById('kaufOk').style.display='block';
if (_qp.get('pass')==='ok'){ const k=document.getElementById('kaufOk'); k.textContent='🎉 Willkommen im All-Inclusive-Pass! 12 LIVE-Klassen pro Monat sind jetzt für dich freigeschaltet.'; k.style.display='block'; }
function passActive(){ return profile.pass_until && new Date(profile.pass_until) > new Date(); }
function bucheStunde(e){ if(e&&e.preventDefault)e.preventDefault(); if(credits>0||passActive()){ go('kalender'); } else { location.href='index.html#preise'; } return false; }

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.style.display='block'; clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3500); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmt(d){ return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }
function fmtShort(d){ return d.toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'}); }

// localStorage helpers (echte Website -> erlaubt)
const lsKey = k => 'sc_'+(user?user.id:'anon')+'_'+k;
function lsGet(k,def){ try{ return JSON.parse(localStorage.getItem(lsKey(k))) ?? def; }catch(e){ return def; } }
function lsSet(k,v){ try{ localStorage.setItem(lsKey(k), JSON.stringify(v)); }catch(e){} }

// ---------- Init ----------
async function init(){
  if (DEMO){ document.getElementById('v-dashboard').innerHTML='<div class="empty">Vorschau-Modus — verbinde Supabase, um deinen Schülerbereich zu sehen.</div>'; return; }
  sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href='index.html?login=1'; return; }
  user = session.user;
  await load();
  window.addEventListener('hashchange', routeFromHash);
  routeFromHash();
  requireBirthday();   // Pflicht: Geburtsdatum abfragen, falls noch nicht gesetzt
}

async function load(){
  const [{ data:prof }, { data:bk }, { data:cl }, { data:msg }, { data:rt }, { data:prog }] = await Promise.all([
    sb.from('profiles').select('credits,name,goal,target_level,native_language,pass_until,birthday').eq('id',user.id).single(),
    sb.rpc('my_bookings'),
    sb.from('credit_log').select('*').order('created_at',{ascending:false}),
    sb.from('messages').select('*').order('created_at'),
    sb.from('ratings').select('class_id,stars'),
    sb.from('exercise_progress').select('*')
  ]);
  profile = prof||{}; credits = profile.credits||0;
  bookings = (bk||[]).map(b=>{ if(b&&b.starts_at){ const s=String(b.starts_at).replace(' ','T'); b.starts_at=s.replace(/([+-]\d{2})$/,'$1:00'); } return b; }); creditLog = (cl||[]); messages = (msg||[]); ratings = (rt||[]);
  progress = {}; (prog||[]).forEach(p=>progress[p.class_id+'|'+p.phase]=p);

  // KI-Material für gebuchte Stunden
  const ids = [...new Set(bookings.filter(b=>b.status==='booked').map(b=>b.class_id))];
  materials = {}; postNotes = {};
  if (ids.length){
    const { data:mats } = await sb.from('class_materials').select('class_id,content').in('class_id', ids);
    (mats||[]).forEach(m=>materials[m.class_id]=m.content);
    const { data:cnotes } = await sb.from('class_notes').select('class_id,notes,post_content').in('class_id', ids);
    (cnotes||[]).forEach(n=>postNotes[n.class_id]=n);
  }
  // Vokabel-Fortschritt geräteübergreifend: DB <-> localStorage mergen
  try{
    const { data:vk } = await sb.from('vocab_known').select('term').eq('user_id', user.id);
    const dbTerms = (vk||[]).map(r=>r.term);
    const localTerms = lsGet('known',[]);
    lsSet('known', [...new Set([...dbTerms, ...localTerms])]);
    const missing = localTerms.filter(t=>!dbTerms.includes(t));
    if(missing.length) sb.from('vocab_known').upsert(missing.map(t=>({ user_id:user.id, term:t })), { onConflict:'user_id,term', ignoreDuplicates:true }).then(()=>{});
  }catch(e){}
  computeStats();
  renderMsgBadge();
  renderCommBadge();
}

// ---------- Statistik / Gamification ----------
function isoWeekIndex(d){ const ref=new Date(Date.UTC(1970,0,5)); return Math.floor((Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())-ref)/(7*86400000)); }
function levelBucket(lvl){ const m=String(lvl||'').match(/[ABC][12]/); return m?m[0]:null; }

function computeStats(){
  const now = new Date();
  const booked = bookings.filter(b=>b.status==='booked');
  const past = booked.filter(b=>new Date(b.starts_at)<now);
  const upcoming = booked.filter(b=>new Date(b.starts_at)>=now).sort((a,b)=>new Date(a.starts_at)-new Date(b.starts_at));

  // Streak: aufeinanderfolgende Wochen mit Stunde (rückwärts ab dieser Woche)
  const weeks = new Set(booked.map(b=>isoWeekIndex(new Date(b.starts_at))));
  const cw = isoWeekIndex(now);
  // finde jüngste Woche <= aktuelle Woche, dann zähle zusammenhängend rückwärts
  let start = cw; if(!weeks.has(cw)){ start = Math.max(...[...weeks].filter(w=>w<=cw), -1); }
  let streak = 0; if(start>=0){ let w=start; while(weeks.has(w)){ streak++; w--; } }

  const completedPhases = Object.values(progress).filter(p=>p.completed).length;
  const known = lsGet('known',[]).length;
  const points = past.length*50 + completedPhases*20 + ratings.length*10 + known*2;

  let rank=RANKS[0], next=null;
  for(let i=0;i<RANKS.length;i++){ if(points>=RANKS[i].min){ rank=RANKS[i]; next=RANKS[i+1]||null; } }
  const rankProg = next ? Math.round((points-rank.min)/(next.min-rank.min)*100) : 100;

  // Lernpfad-Daten
  const perLevel={}; LEVELS.forEach(l=>perLevel[l]=0);
  booked.forEach(b=>{ const lb=levelBucket(b.level); if(lb) perLevel[lb]++; });
  // aktuelles Niveau = höchstes mit gebuchten Stunden; sonst Zielniveau als Startpunkt
  let currentLevel = null;
  for(let i=LEVELS.length-1;i>=0;i--){ if(perLevel[LEVELS[i]]>0){ currentLevel = LEVELS[i]; break; } }
  if(!currentLevel) currentLevel = profile.target_level || null;

  stats = { now, booked, past, upcoming, streak, points, rank, next, rankProg,
            completedPhases, known, perLevel, currentLevel,
            vocabTotal: collectVocab().length };
}

function collectVocab(){
  const seen=new Set(), out=[];
  bookings.filter(b=>b.status==='booked').forEach(b=>{
    (Array.isArray(b.vocab)?b.vocab:[]).forEach(v=>{ const k=v.de; if(v.de&&!seen.has(k)){seen.add(k);out.push({...v,from:b.title});} });
    const m=materials[b.class_id];
    if(m&&Array.isArray(m.vocab)) m.vocab.forEach(v=>{ const k=v.de; if(v.de&&!seen.has(k)){seen.add(k);out.push({...v,from:b.title});} });
  });
  return out;
}

function drawByDate(items,q){

function phaseHtml(b, phase){
  const m=materials[b.class_id];
  if(phase==='post'){
    const ended = Date.now() > (new Date(b.starts_at).getTime() + 75*60000);
    const pn = postNotes[b.class_id];
    const hasPost = pn && pn.post_content && Array.isArray(pn.post_content.exercises) && pn.post_content.exercises.length;
    const pr = progress[b.class_id+'|post'];
    let inner;
    if(!ended){ inner='<span class="nope">folgt nach dem Unterricht</span>'; }
    else if(hasPost){
      inner = (pr&&pr.completed)
        ? `<span class="doneflag">✓ erledigt${pr.score!=null?' · '+pr.score+'/'+pr.total:''}</span><br><a href="#" onclick="openPost('${b.class_id}');return false" style="color:var(--primary);font-weight:700;font-size:12px">nochmal üben</a>`
        : `<button class="btn btn-turq btn-sm" onclick="openPost('${b.class_id}')">Übungen starten</button>`;
    } else { inner='<span class="nope">folgt in Kürze</span>'; }
    const ready = ended && hasPost && !(pr&&pr.completed);
    const donecls = (pr&&pr.completed)?'done-ph':'';
    return `<div class="phase ${ready?'ready':''} ${donecls}"><b>✍️ Nachbearbeitung</b>${inner}</div>`;
  }
  if(phase==='live'){
    const href = `klassenraum.html?stunde=${b.class_id}&titel=${encodeURIComponent(b.title||'')}&niveau=${encodeURIComponent(b.level||'')}`;
    // Keine Zeitsperre: der Klassenraum ist jederzeit betretbar.
    const inner=`<a class="btn btn-turq btn-sm" href="${href}" target="_blank" rel="noopener" style="text-decoration:none"><span class="live-dot"></span>🔴 Beitreten</a>`;
    return `<div class="phase ready"><b>🗣️ Im Unterricht</b>${inner}</div>`;
  }
  const hasKi = m && m[phase] && Array.isArray(m[phase].exercises) && m[phase].exercises.length;
  const link = phase==='pre'?b.material_pre:(phase==='post'?b.material_post:b.material_live);
  const label = phase==='pre'?'Vorbereitung':(phase==='post'?'Nachbearbeitung':'Im Unterricht');
  const emoji = phase==='pre'?'📖':(phase==='post'?'✍️':'🗣️');
  const pr = progress[b.class_id+'|'+phase];
  let inner;
  if (phase!=='live' && hasKi){
    if (pr && pr.completed) inner=`<span class="doneflag">✓ erledigt${pr.score!=null?' · '+pr.score+'/'+pr.total:''}</span><br><a href="#" onclick="openEx('${b.class_id}','${phase}');return false" style="color:var(--primary);font-weight:700;font-size:12px">nochmal üben</a>`;
    else inner=`<button class="btn btn-turq btn-sm" onclick="openEx('${b.class_id}','${phase}')">Übungen starten</button>`;
  } else if (link){
    inner = /^https?:\/\//.test(link) ? `<a href="${esc(link)}" target="_blank" style="color:var(--primary);font-weight:700">öffnen →</a>` : `<span>${esc(link)}</span>`;
  } else {
    inner = `<span class="nope">folgt</span>`;
  }
  const ready = phase!=='live' && hasKi && !(pr&&pr.completed);
  const donecls = pr&&pr.completed?'done-ph':'';
  return `<div class="phase ${ready?'ready':''} ${donecls}"><b>${emoji} ${label}</b>${inner}</div>`;
}

  else if(/A2\s*\/\s*B1/i.test(L)) cb=['A2','B1'];
  else if(/B1\s*\/\s*B2/i.test(L)) cb=['B1','B2'];
  else if(/B2\s*\/\s*C1/i.test(L)) cb=['B2','C1'];
  else { const m=L.match(/[ABC][12]/); cb=m?[m[0]]:[]; }
  return cb.includes(filter);
}

  if(pc.intro) html+=`<p class="muted" style="margin-bottom:10px">${esc(pc.intro)}</p>`;
  html+=`<div class="ptabs">
    <button class="ptab active" onclick="postTab(0)">🗒️ Mitschrift</button>
    <button class="ptab" onclick="postTab(1)">🔧 Fehlerkorrektur</button>
    <button class="ptab" onclick="postTab(2)">✏️ Übungen</button></div>`;
  // Tab 0: Freie Mitschrift
  html+=`<div class="ptab-c" data-t="0">`+((pn.notes&&pn.notes.trim())
    ?`<div class="tip-card" style="white-space:pre-wrap">${pn.notes}</div>`
    :`<p class="muted">Für diese Stunde gibt es keine freie Mitschrift.</p>`)+`</div>`;
  // Tab 1: Fehlerkorrektur + neue Wörter
  let t1='';
  if(Array.isArray(corr)&&corr.length){
    t1+=`<h4 style="margin:4px 0 8px">🔧 Häufige Fehler aus der Stunde</h4>`+corr.map(c=>{
      if(typeof c==='string') return `<div class="corr">${esc(c)}</div>`;
      const w=c.falsch||c.wrong||c.from||'', r=c.richtig||c.right||c.to||'', n=c.tipp||c.note||c.hinweis||'';
      return `<div class="corr">${w?`<span class="corr-w">${esc(w)}</span> → `:''}<span class="corr-r">${esc(r)}</span>${n?`<div class="muted" style="font-size:13px;margin-top:2px">${esc(n)}</div>`:''}</div>`;
    }).join('');
  }
  if(Array.isArray(pc.vocab)&&pc.vocab.length){
    t1+=`<h4 style="margin:14px 0 6px">🃏 Neue Wörter aus der Stunde</h4><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">`+
    pc.vocab.map(v=>`<div style="background:var(--bg);border-radius:10px;padding:8px 10px"><b style="display:block;font-size:14px">${esc(v.de)}</b><span class="muted" style="font-size:13px">${esc(v.info||'')}</span></div>`).join('')+`</div>`;
  }
  if(!t1) t1='<p class="muted">Keine Korrekturen oder neuen Wörter erfasst.</p>';
  html+=`<div class="ptab-c" data-t="1" style="display:none">${t1}</div>`;
  // Tab 2: Übungen
  html+=`<div class="ptab-c" data-t="2" style="display:none">`+(exs.length
    ?`<div id="exList">`+exs.map((e,i)=>renderExercise(e,i)).join('')+`</div><div id="exResult"></div><button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="checkEx()">Prüfen & abschließen</button>`
    :`<p class="muted">Für diese Stunde gibt es keine Übungen.</p>`)+`</div>`;
  openModal(html);
  exs.forEach((e,i)=>{ if(e.type==='order') initOrder(i,e); });
}
function postTab(i){
  document.querySelectorAll('#exBody .ptab').forEach((b,k)=>b.classList.toggle('active',k===i));
  document.querySelectorAll('#exBody .ptab-c').forEach(c=>{ c.style.display=(+c.dataset.t===i)?'':'none'; });
}

// ---------- Im Unterricht: LIVE mitverfolgen (Realtime + Präsentation) ----------
let liveChannel=null, livePoll=null;
function stopLive(){ try{ if(liveChannel){ sb.removeChannel(liveChannel); liveChannel=null; } }catch(e){} if(livePoll){ clearInterval(livePoll); livePoll=null; } }
function setLiveNotes(txt){ const el=document.getElementById('liveNotes'); if(el){ el.innerHTML=(txt&&String(txt).trim())?txt:'<span class="muted">Noch nichts geschrieben – es geht gleich los …</span>'; } const st=document.getElementById('liveStamp'); if(st) st.textContent='zuletzt aktualisiert '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
async function loadLiveNotes(classId){ try{ const {data}=await sb.from('class_notes').select('notes').eq('class_id',classId).maybeSingle(); setLiveNotes(data&&data.notes); }catch(e){} }
function openLive(classId){
  const m=materials[classId]||{};
  let html=`<h3 style="margin-bottom:4px"><span class="live-dot"></span>Im Unterricht – live</h3>
    <p class="muted" style="margin-bottom:12px">Die Tafel aktualisiert sich automatisch, während deine Lehrkraft mitschreibt.</p>`;
  if(m.lesson_url) html+=`<a class="btn btn-primary" href="${esc(m.lesson_url)}" target="_blank" rel="noopener" style="display:inline-block;margin-bottom:12px">📊 Präsentation öffnen</a>`;
  html+=`<div class="tip-card live-notes" id="liveNotes">lädt …</div><div class="muted" id="liveStamp" style="font-size:12px;margin-top:6px"></div>`;
  openModal(html);
  loadLiveNotes(classId);
  stopLive();
  try{
    liveChannel=sb.channel('live-'+classId)
      .on('postgres_changes',{event:'*',schema:'public',table:'class_notes',filter:'class_id=eq.'+classId},
          payload=>{ const n=payload.new&&payload.new.notes; setLiveNotes(n); })
      .subscribe();
  }catch(e){}
  // Fallback-Polling, falls Realtime mal hakt
  livePoll=setInterval(()=>loadLiveNotes(classId), 12000);
}

function renderExercise(e,i){
  const head=`<div class="q">${i+1}. ${exQ(e)}</div>`;
  if(e.type==='choice'){
    return `<div class="ex" data-i="${i}" data-type="choice">${head}${(e.options||[]).map((o,k)=>`<label class="opt" data-k="${k}" onclick="pickOpt(${i},${k})">${esc(o)}</label>`).join('')}<div class="fb" id="fb-${i}"></div></div>`;
  }
  if(e.type==='gap'){
    return `<div class="ex" data-i="${i}" data-type="gap">${head}<input class="gap" id="gap-${i}" placeholder="Antwort eintippen…" value="${esc((curEx.answers[i])||'')}">${e.hint?`<div class="muted" style="margin-top:6px">💡 ${esc(e.hint)}</div>`:''}<div class="fb" id="fb-${i}"></div></div>`;
  }
  if(e.type==='match'){
    const rights=(e.pairs||[]).map(p=>p.r); const shuffled=shuffle(rights.slice());
    return `<div class="ex" data-i="${i}" data-type="match">${head}${(e.pairs||[]).map((p,k)=>`<div class="matchrow"><b>${esc(p.l)}</b><select id="m-${i}-${k}"><option value="">— wählen —</option>${shuffled.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join('')}</select></div>`).join('')}<div class="fb" id="fb-${i}"></div></div>`;
  }
  if(e.type==='order'){
    return `<div class="ex" data-i="${i}" data-type="order">${head}<div class="buildarea" id="build-${i}"></div><div class="chips" id="chips-${i}"></div><button class="btn btn-ghost btn-sm" onclick="resetOrder(${i})">Zurücksetzen</button>${e.hint?`<div class="muted" style="margin-top:6px">💡 ${esc(e.hint)}</div>`:''}<div class="fb" id="fb-${i}"></div></div>`;
  }
  if(e.type==='write'){
    return `<div class="ex" data-i="${i}" data-type="write">${head}<textarea id="wr-${i}" placeholder="Schreib hier…">${esc((curEx.answers[i])||'')}</textarea>${e.sample?`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="document.getElementById('sample-${i}').style.display='block'">Beispiel zeigen</button><div id="sample-${i}" class="muted" style="display:none;margin-top:8px">✏️ <i>${esc(e.sample)}</i></div>`:''}</div>`;
  }
  return '';
}
function exQ(e){
  if(e.type==='choice') return esc(e.q||'Wähle die richtige Antwort:');
  if(e.type==='gap') return esc((e.text||'').replace('___','______'));
  if(e.type==='match') return esc(e.intro||'Ordne zu:');
  if(e.type==='order') return esc(e.hint?'Bring die Wörter in die richtige Reihenfolge:':'Satz bauen:');
  if(e.type==='write') return esc(e.prompt||'Schreibaufgabe:');
  return '';
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// choice
function pickOpt(i,k){ const ex=document.querySelector('.ex[data-i="'+i+'"]'); ex.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); ex.querySelector('.opt[data-k="'+k+'"]').classList.add('sel'); curEx.answers[i]=k; }
// order
const orderState={};
function initOrder(i,e){ const words=String(e.answer||'').split(/\s+/).filter(Boolean); orderState[i]={words,built:[],pool:shuffle(words.map((w,idx)=>({w,idx})))}; drawOrder(i); }
function drawOrder(i){ const st=orderState[i]; const build=document.getElementById('build-'+i), chips=document.getElementById('chips-'+i); if(!build)return;
  build.innerHTML=st.built.map((t,p)=>`<span class="chip" onclick="unpick(${i},${p})">${esc(t.w)}</span>`).join('')||'<span class="muted" style="font-size:13px">Wörter unten antippen…</span>';
  chips.innerHTML=st.pool.map(t=>`<span class="chip" onclick="pick(${i},${t.idx})">${esc(t.w)}</span>`).join('');
  curEx.answers[i]=st.built.map(t=>t.w).join(' ');
}
function pick(i,idx){ const st=orderState[i]; const p=st.pool.findIndex(t=>t.idx===idx); if(p<0)return; st.built.push(st.pool[p]); st.pool.splice(p,1); drawOrder(i); }
function unpick(i,p){ const st=orderState[i]; st.pool.push(st.built[p]); st.built.splice(p,1); drawOrder(i); }
function resetOrder(i){ const st=orderState[i]; st.pool=shuffle(st.words.map((w,idx)=>({w,idx}))); st.built=[]; drawOrder(i); }

function norm(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' ').replace(/[.!?,;]+$/,''); }
function checkEx(){
  let auto=0, correct=0;
  curEx.exs.forEach((e,i)=>{
    const fb=document.getElementById('fb-'+i);
    if(e.type==='choice'){ auto++; const a=curEx.answers[i]; const ok=a===e.answer;
      const ex=document.querySelector('.ex[data-i="'+i+'"]'); ex.querySelectorAll('.opt').forEach(o=>{const k=+o.dataset.k; o.classList.remove('sel'); if(k===e.answer)o.classList.add('right'); else if(k===a)o.classList.add('wrong');});
      if(ok)correct++; if(fb)fb.innerHTML=`<span class="${ok?'ok':'no'}">${ok?'✓ Richtig!':'✗ '+(e.explain?esc(e.explain):'Richtig: '+esc(e.options[e.answer]))}</span>`;
    }
    else if(e.type==='gap'){ auto++; const v=document.getElementById('gap-'+i).value; curEx.answers[i]=v;
      const ok=[e.answer,...(e.alts||[])].some(a=>norm(a)===norm(v)); if(ok)correct++;
      if(fb)fb.innerHTML=`<span class="${ok?'ok':'no'}">${ok?'✓ Richtig!':'✗ Richtig: '+esc(e.answer)}</span>`;
    }
    else if(e.type==='match'){ auto++; let all=true; (e.pairs||[]).forEach((p,k)=>{ const sel=document.getElementById('m-'+i+'-'+k); if(norm(sel.value)!==norm(p.r)) all=false; }); if(all)correct++;
      if(fb)fb.innerHTML=`<span class="${all?'ok':'no'}">${all?'✓ Alles richtig zugeordnet!':'✗ Schau nochmal — einige Paare stimmen noch nicht.'}</span>`;
    }
    else if(e.type==='order'){ auto++; const built=(orderState[i].built||[]).map(t=>t.w).join(' '); const ok=norm(built)===norm(e.answer); if(ok)correct++;
      if(fb)fb.innerHTML=`<span class="${ok?'ok':'no'}">${ok?'✓ Perfekt!':'✗ Richtig: '+esc(e.answer)}</span>`;
    }
    else if(e.type==='write'){ const v=document.getElementById('wr-'+i).value; curEx.answers[i]=v; }
  });
  const res=document.getElementById('exResult');
  res.innerHTML=`<div class="score-banner"><div class="big">${correct} / ${auto}</div><div>${correct===auto?'Top gemacht! 🎉':(correct>=auto*0.6?'Stark — kleine Lücken noch. 💪':'Übung macht den Meister. Schau dir die Lösungen an. 🙂')}</div></div>`;
  saveProgress(correct,auto);
}
async function saveProgress(score,total){
  if(!curEx) return;
  const classId=curEx.classId, phase=curEx.phase, answers=curEx.answers;  // Werte sichern (Modal könnte schließen)
  const { error }=await sb.from('exercise_progress').upsert({
    user_id:user.id, class_id:classId, phase, answers, score, total, completed:true, updated_at:new Date().toISOString()
  },{onConflict:'user_id,class_id,phase'});
  if(!error){ progress[classId+'|'+phase]={class_id:classId,phase,score,total,completed:true,answers}; computeStats(); toast('Gespeichert! +20 Punkte ⭐'); }
}

function renderVokabeln(){

  if(!deck.length){ el.innerHTML='<div class="pagehead"><h1>Vokabeltrainer</h1></div><div class="empty">Noch keine Vokabeln — sie erscheinen automatisch, sobald deine gebuchten Stunden Vokabeln haben (oder Amanda Material erstellt hat).</div>'; return; }
  deckIdx=0;flipped=false;
  el.innerHTML=`<div class="pagehead"><h1>Vokabeltrainer</h1><p>${deck.length} Vokabeln aus deinen Stunden · ${known.size} schon gelernt</p></div>
    <div class="flashwrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()"></div>
      <div class="flashnav">
        <button class="btn btn-ghost" onclick="prevCard()">← Zurück</button>
        <button class="btn btn-turq" onclick="markKnown()">✓ Kann ich</button>
        <button class="btn btn-primary" onclick="nextCard()">Weiter →</button>
      </div>

  showCard();

function showCard(){ const c=deck[deckIdx]; const known=new Set(lsGet('known',[]));
  document.getElementById('flashcard').innerHTML=flipped
    ?`<div style="font-size:18px;font-weight:500">${esc(c.info||'—')}<span class="hint">${deckIdx+1} / ${deck.length} · tippen zum Zurückdrehen</span></div>`
    :`<div>${esc(c.de)}${known.has(c.de)?' <span style="color:var(--turquoise);font-size:16px">✓</span>':''}<span class="hint">${deckIdx+1} / ${deck.length} · tippen für die Bedeutung</span></div>`;
}
function flipCard(){ flipped=!flipped; showCard(); }
function nextCard(){ deckIdx=(deckIdx+1)%deck.length; flipped=false; showCard(); }
function prevCard(){ deckIdx=(deckIdx-1+deck.length)%deck.length; flipped=false; showCard(); }
function markKnown(){ const k=lsGet('known',[]); const w=deck[deckIdx].de; if(!k.includes(w)){ k.push(w); lsSet('known',k); if(sb&&user) sb.from('vocab_known').upsert({ user_id:user.id, term:w }, { onConflict:'user_id,term', ignoreDuplicates:true }).then(()=>{}); } computeStats(); toast('Gelernt! 🧠 +2 Punkte'); nextCard(); }

    <div class="card" style="display:flex;gap:16px;align-items:center;background:linear-gradient(135deg,#E8FAF6,#D2F5EE);border-color:var(--turquoise)"><img src="amanda.png" alt="Amanda" style="width:96px;height:96px;border-radius:16px;object-fit:cover;object-position:top center;flex:none" onerror="this.style.display='none'"><p style="font-size:14px;color:#0a5;margin:0">Klick unten auf das Mikrofon und leg los. Amanda hört zu, korrigiert sanft und plaudert mit dir auf Deutsch. 🎤</p></div>
    <elevenlabs-convai agent-id="${AMANDA_AGENT_ID}"></elevenlabs-convai>${prompts}`;
  if(!document.getElementById('elevscript')){ const s=document.createElement('script'); s.id='elevscript'; s.src='https://unpkg.com/@elevenlabs/convai-widget-embed'; s.async=true; document.body.appendChild(s); }
}

// ---------- Profil ----------
function renderProfil(){
  document.getElementById('v-profil').innerHTML=`
    <div class="pagehead"><h1>Dein Profil</h1><p>Damit Amanda und deine Lehrerin dich besser unterstützen können.</p></div>
    <div class="card">
      <div class="field"><label>Name</label><input id="pName" value="${esc(profile.name||'')}" placeholder="Wie heißt du?"></div>
      <div class="field"><label>Mein Lernziel</label><textarea id="pGoal" placeholder="z.B. Ich will fließend im Job sprechen / die B2-Prüfung schaffen">${esc(profile.goal||'')}</textarea></div>
      <div class="field"><label>Mein Zielniveau 🎯</label><select id="pTarget"><option value="">— wählen —</option>${LEVELS.map(l=>`<option ${profile.target_level===l?'selected':''}>${l}</option>`).join('')}</select></div>
      <div class="field"><label>Meine Muttersprache</label><input id="pNative" value="${esc(profile.native_language||'')}" placeholder="z.B. Englisch, Arabisch, Ukrainisch"></div>
      <div class="field"><label>Mein Geburtstag 🎂</label><input id="pBday" type="date" value="${esc(profile.birthday||'')}"></div>
      <button class="btn btn-primary" onclick="saveProfil()">Speichern</button>
      <div class="field" style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px"><label>E-Mail</label><div class="muted">${esc(user.email)}</div></div>
    </div>`;
}
async function saveProfil(){
  const bday=document.getElementById('pBday').value||null;
  const { error }=await sb.rpc('update_my_profile',{
    p_name:document.getElementById('pName').value.trim(),
    p_goal:document.getElementById('pGoal').value.trim()||null,
    p_target_level:document.getElementById('pTarget').value||null,
    p_native_language:document.getElementById('pNative').value.trim()||null,
    p_birthday:bday
  });
  if(error){ toast('Konnte nicht speichern.'); return; }
  profile.name=document.getElementById('pName').value.trim();
  profile.goal=document.getElementById('pGoal').value.trim()||null;
  profile.target_level=document.getElementById('pTarget').value||null;
  profile.native_language=document.getElementById('pNative').value.trim()||null;
  profile.birthday=bday;
  computeStats(); toast('Profil gespeichert ✓');
}

// ---------- Geburtstag: Pflichtabfrage beim ersten Login ----------
function requireBirthday(){
  if(profile && profile.birthday) return;            // schon vorhanden -> nichts tun
  if(document.getElementById('bdayGate')) return;     // schon offen
  const ov=document.createElement('div');
  ov.id='bdayGate';
  ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(26,26,26,.55);display:flex;align-items:center;justify-content:center;padding:18px';
  ov.innerHTML=`
    <div style="background:#fff;border-radius:22px;max-width:380px;width:100%;padding:26px 24px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center;font-family:inherit">
      <div style="font-size:46px;line-height:1;margin-bottom:6px">🎂</div>
      <h2 style="margin:0 0 6px;font-size:21px;font-weight:800;color:#1A1A1A">Wann hast du Geburtstag?</h2>
      <p style="margin:0 0 16px;font-size:14px;color:#5C4E3E;line-height:1.5">Bitte trag dein Geburtsdatum ein – dann können wir dir an deinem Tag gratulieren. 💛</p>
      <input id="bdayGateInput" type="date" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;font-size:16px;margin-bottom:6px">
      <div id="bdayGateErr" style="color:#DD0000;font-size:13px;min-height:18px;margin-bottom:8px"></div>
      <button class="btn btn-primary" style="width:100%" onclick="saveBirthdayGate()">Speichern & weiter</button>
    </div>`;
  document.body.appendChild(ov);
}
async function saveBirthdayGate(){
  const val=document.getElementById('bdayGateInput').value;
  const err=document.getElementById('bdayGateErr');
  if(!val){ if(err) err.textContent='Bitte wähle ein Datum.'; return; }
  if(new Date(val) > new Date()){ if(err) err.textContent='Das Datum liegt in der Zukunft.'; return; }
  const { error }=await sb.rpc('set_my_birthday',{ p_birthday:val });
  if(error){ if(err) err.textContent='Konnte nicht speichern – bitte erneut versuchen.'; return; }
  profile.birthday=val;
  const ov=document.getElementById('bdayGate'); if(ov) ov.remove();
  toast('Danke! 🎂');
}

async function logout(){ await sb.auth.signOut(); location.href='index.html'; }
init();
</script>

window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;if(btn)btn.style.display='inline-flex';});
