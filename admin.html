<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sprechclub</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#DD0000;--secondary:#1A1A1A;--accent:#FFCE00;--cream:#FFFCF5;--bg:#FFF8E0;--text:#1A1A1A;--text-soft:#6B7280;--border:#F0E5D8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.wrap{max-width:920px;margin:0 auto;padding:30px 20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:50px;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{background:#fff;color:var(--secondary);border:2px solid var(--border)}
.tabs{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap}
.tabs button{border:2px solid var(--border);background:#fff;border-radius:30px;padding:8px 18px;font-weight:700;cursor:pointer;font-family:inherit}
.tabs button.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.card b.title{display:block}
.muted{color:var(--text-soft);font-size:13px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
th{background:var(--bg);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
input,select{padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px}
.formrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.pill{font-size:11px;font-weight:800;background:var(--bg);color:var(--primary);border-radius:30px;padding:3px 9px}
.tn{font-size:13px;margin:2px 0}
#gate{max-width:380px;margin:80px auto;text-align:center;background:#fff;border:1px solid var(--border);border-radius:20px;padding:30px}
/* ----- Lehrerplan (Agenda) ----- */
.plan-day{margin:20px 0 8px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;text-transform:capitalize}
.plan-day .cnt{font-size:12px;color:var(--text-soft);font-weight:600;text-transform:none}
.prow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-left:5px solid #ccc;border-radius:12px;padding:10px 12px;margin-bottom:7px}
.prow .ptime{font-weight:800;font-family:'Space Grotesk',sans-serif;min-width:108px;white-space:nowrap}
.prow.pmiss{background:#fff6f4}
.prow select.passign{padding:7px 9px;border-radius:9px;border:2px solid var(--border);font-size:13px;font-weight:600;cursor:pointer}
.prow select.passign.miss{border-color:#DD0000;color:#DD0000}
.plan-ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.tchip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;background:var(--bg);border-radius:30px;padding:4px 10px;margin:0 4px 4px 0}
.tchip i{width:11px;height:11px;border-radius:50%;display:inline-block}
</style>
<link rel="stylesheet" href="club-theme.css">
</head>
<body>
<div id="gate">
  <h2>Admin-Login</h2>
  <p class="muted" style="margin:8px 0 14px">Melde dich mit deiner Admin-E-Mail an.</p>
  <input type="email" id="adminEmail" placeholder="deine@email.de" style="width:100%;margin-bottom:10px">
  <button class="btn btn-primary" style="width:100%" onclick="login()">Anmelde-Link schicken</button>
  <p class="muted" id="gateMsg" style="margin-top:10px"></p>
</div>

<div class="wrap" id="app" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <h1>deutschoderwas club · Admin</h1>
    <div><a class="btn btn-primary" href="admin-kurse.html">🎓 Kurse verwalten</a> <a class="btn btn-ghost" href="index.html">Zur Seite</a> <button class="btn btn-ghost" onclick="logout()">Abmelden</button></div>
  </div>

  <div class="tabs">
    <button id="tabP" onclick="show('plan')">📅 Lehrerplan</button>
    <button id="tabK" class="active" onclick="show('klassen')">Stunden & Anwesenheit</button>
    <button id="tabN" onclick="show('neu')">Stunde anlegen</button>
    <button id="tabL" onclick="show('lehrer')">👩‍🏫 Lehrer</button>
    <button id="tabS" onclick="show('schueler')">Schüler & Guthaben</button>
    <button id="tabM" onclick="show('nachrichten')">Nachrichten</button>
    <button id="tabB" onclick="show('bewertungen')">Bewertungen</button>
    <button id="tabMat" onclick="show('material')">📚 Materialien</button>
    <button id="tabC" onclick="show('community')">💬 Community</button>
  </div>

  <div id="plan" style="display:none"></div>
  <div id="klassen"></div>
  <div id="lehrer" style="display:none"></div>
  <div id="nachrichten" style="display:none"></div>
  <div id="bewertungen" style="display:none"></div>
  <div id="community" style="display:none"><div id="v-community"></div></div>

  <div id="neu" style="display:none">
    <div class="card">
      <h3 style="margin-bottom:12px">Neue Stunde</h3>
      <div class="formrow">
        <input id="nTitle" placeholder="Titel, z.B. B1/B2 Unterricht" style="flex:2">
        <select id="nClub" title="Club"><option value="sprechclub">🗣️ Sprechclub</option><option value="grammatikclub">📐 Grammatikclub</option><option value="wortschatzclub">📚 Wortschatzclub</option><option value="ausspracheclub">🎧 Ausspracheclub</option></select>
        <select id="nLevel"><option>A2</option><option>B1/B2</option><option>B2/C1</option><option>ab B1</option></select>
        <select id="nTeacher" title="Lehrer"><option value="">— Lehrer —</option></select>
      </div>
      <div class="formrow">
        <input id="nTopic" placeholder="Thema (optional)" style="flex:2">
        <input id="nDate" type="datetime-local">
        <input id="nCap" type="number" value="5" min="1" max="20" style="width:80px" title="Plätze">
      </div>
      <div class="formrow">
        <input id="nZoom" placeholder="Google-Meet-Link" style="flex:1">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="nRepeat"> 8 Wochen wiederholen</label>
      </div>
      <div class="formrow">
        <input id="nPre" placeholder="Link: Übungen VOR dem Unterricht (optional)" style="flex:1">
        <input id="nLive" placeholder="Link: Material IM Unterricht (optional)" style="flex:1">
      </div>
      <div class="formrow">
        <input id="nPost" placeholder="Link: Nachbearbeitung (optional)" style="flex:1">
      </div>
      <div class="formrow">
        <textarea id="nVocab" placeholder="Vokabeln (eine pro Zeile):&#10;die Beschwerde — complaint, sich beschweren&#10;der Umtausch — exchange" style="flex:1;min-height:90px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px"></textarea>
      </div>
      <button class="btn btn-primary" onclick="createClass()">Anlegen</button>
      <span class="muted" id="neuMsg"></span>
    </div>
  </div>

  <div id="schueler" style="display:none"></div>

  <div id="material" style="display:none">
    <div class="card">
      <h3 style="margin-bottom:6px">PDFs hochladen</h3>
      <p class="muted" style="margin-bottom:12px">Neues Material sehen nur Schüler mit Guthaben oder gebuchter Stunde — die Sperre für Inaktive passiert automatisch.</p>
      <div class="formrow">
        <select id="matFolderSel" style="flex:1"></select>
        <input id="matFolderNew" placeholder="…oder neuen Ordner tippen, z.B. Juni 2026/Woche 3" style="flex:2">
      </div>
      <div class="formrow">
        <input type="file" id="matFiles" accept="application/pdf" multiple style="flex:1;border-style:dashed">
        <button class="btn btn-primary" onclick="uploadMaterials()">Hochladen</button>
      </div>
      <p class="muted" id="matMsg"></p>
    </div>
    <div id="matListAdmin"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
let sb=null, me=null;

async function init(){
  if (CFG.SUPABASE_URL.startsWith('HIER_')){ document.getElementById('gateMsg').textContent='Supabase noch nicht verbunden (config.js).'; return; }
  sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await enter(session.user);
  sb.auth.onAuthStateChange(async (_e,s)=>{ if (s && !me) await enter(s.user); });
}

let isAdminUser=false;
let myTeacherId=null;
async function enter(u){
  const { data } = await sb.from('profiles').select('is_admin,is_teacher').eq('id', u.id).single();
  if (!data || (!data.is_admin && !data.is_teacher)){ document.getElementById('gateMsg').textContent='Dieses Konto hat keine Admin- oder Lehrer-Rechte.'; return; }
  me = u; isAdminUser = !!data.is_admin;
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  await loadTeachers();
  const myT = TEACHERS.find(t=>t.profile_id===u.id);
  myTeacherId = myT ? myT.id : null;
  window.sb = sb; window.user = u;
  window.profile = { name: (myT && myT.name) || (isAdminUser ? 'Team' : 'Lehrkraft') };
  if (!isAdminUser){
    // Lehrer-Ansicht: keine Guthaben-Verwaltung, keine Bewertungen, Fokus auf eigenen Plan
    document.getElementById('tabS').style.display='none';
    document.getElementById('tabB').style.display='none';
    document.getElementById('tabN').style.display='none';
    document.getElementById('tabMat').style.display='none';
    document.getElementById('tabL').style.display='none';
    document.querySelector('h1').textContent='deutschoderwas club · Lehrkraft';
    show('plan');
  } else {
    loadKlassen();
  }
}

async function login(){
  const email = document.getElementById('adminEmail').value.trim();
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.href } });
  document.getElementById('gateMsg').textContent = error ? error.message : '✓ Link verschickt — Postfach checken.';
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

function show(id){
  ['plan','klassen','neu','lehrer','schueler','nachrichten','bewertungen','material','community'].forEach(x=>document.getElementById(x).style.display = x===id?'block':'none');
  document.getElementById('tabP').classList.toggle('active', id==='plan');
  document.getElementById('tabK').classList.toggle('active', id==='klassen');
  document.getElementById('tabN').classList.toggle('active', id==='neu');
  document.getElementById('tabL').classList.toggle('active', id==='lehrer');
  document.getElementById('tabS').classList.toggle('active', id==='schueler');
  document.getElementById('tabM').classList.toggle('active', id==='nachrichten');
  document.getElementById('tabB').classList.toggle('active', id==='bewertungen');
  document.getElementById('tabMat').classList.toggle('active', id==='material');
  document.getElementById('tabC').classList.toggle('active', id==='community');
  if (id==='plan') loadPlan();
  if (id==='klassen') loadKlassen();
  if (id==='lehrer') loadLehrer();
  if (id==='schueler') loadSchueler();
  if (id==='nachrichten') loadNachrichten();
  if (id==='bewertungen') loadBewertungen();
  if (id==='material') loadMaterial();
  if (id==='community' && window.renderCommunity) window.renderCommunity();
}

// ---------- Lehrer ----------
let TEACHERS=[];
const CLUBS=[{slug:'sprechclub',name:'🗣️ Sprechclub'},{slug:'grammatikclub',name:'📐 Grammatikclub'},{slug:'wortschatzclub',name:'📚 Wortschatzclub'},{slug:'ausspracheclub',name:'🎧 Ausspracheclub'}];
const CLUB_COLOR={sprechclub:'#2DD4BF',grammatikclub:'#DD0000',wortschatzclub:'#FFCE00',ausspracheclub:'#13A89A'};
const CLUB_EMOJI={sprechclub:'🗣️',grammatikclub:'📐',wortschatzclub:'📚',ausspracheclub:'🎧'};
// Niveau-Farben (Bänder klar unterscheidbar)
const LEVEL_COLOR={'A2/B1':'#15803D','B1/B2':'#0891B2','B2/C1':'#7C3AED','ab A2':'#B45309','ab B1':'#BE185D','ab A2/B1':'#15803D'};
async function loadTeachers(){
  const { data } = await sb.from('teachers').select('*').order('sort_order');
  TEACHERS = data || [];
  const sel = document.getElementById('nTeacher');
  if (sel) sel.innerHTML = teacherOptions('');
}
function teacherOptions(selId){
  return '<option value="">— Lehrer —</option>' + TEACHERS.filter(t=>t.active||t.id===selId).map(t=>`<option value="${t.id}" ${t.id===selId?'selected':''}>${esc(t.name)}</option>`).join('');
}
function clubOptions(selSlug){
  return CLUBS.map(c=>`<option value="${c.slug}" ${c.slug===selSlug?'selected':''}>${c.name}</option>`).join('');
}
function teacherName(id){ const t=TEACHERS.find(x=>x.id===id); return t?t.name:''; }
function teacherColor(id){ const t=TEACHERS.find(x=>x.id===id); return t?t.color:'#1A1A1A'; }

async function loadLehrer(){
  await loadTeachers();
  document.getElementById('lehrer').innerHTML =
    `<div class="card">
       <h3 style="margin-bottom:10px">👩‍🏫 Lehrer anlegen</h3>
       <div class="formrow">
         <input id="newTName" placeholder="Name, z.B. Anna" style="flex:2">
         <input id="newTColor" type="color" value="#2DD4BF" title="Farbe (optional)" style="width:54px;padding:4px;height:42px">
         <button class="btn btn-primary" onclick="addTeacher()">Hinzufügen</button>
       </div>
       <span class="muted" id="tMsg"></span>
     </div>` +
    (TEACHERS.length ? TEACHERS.map(t=>`
      <div class="card" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="width:16px;height:16px;border-radius:5px;background:${t.color||'#1A1A1A'};display:inline-block"></span>
        <input id="tn-${t.id}" value="${esc(t.name)}" style="flex:1;min-width:140px">
        <input id="tc-${t.id}" type="color" value="${t.color||'#1A1A1A'}" style="width:48px;padding:4px;height:40px">
        ${t.active?'<span class="pill" style="background:#e8f9f5;color:#13A89A">aktiv</span>':'<span class="pill" style="background:#f1f1f1;color:#999">inaktiv</span>'}
        <button class="btn btn-ghost" onclick="saveTeacher('${t.id}')">Speichern</button>
        <button class="btn btn-ghost" onclick="toggleTeacher('${t.id}',${t.active?'false':'true'})">${t.active?'Deaktivieren':'Aktivieren'}</button>
      </div>`).join('') : '<div class="card muted">Noch keine Lehrer angelegt.</div>');
}
async function addTeacher(){
  const name=document.getElementById('newTName').value.trim();
  const color=document.getElementById('newTColor').value;
  if(!name){ document.getElementById('tMsg').textContent='Bitte Namen eingeben.'; return; }
  const so=(TEACHERS.reduce((m,t)=>Math.max(m,t.sort_order||0),0))+1;
  const { error }=await sb.from('teachers').insert({name,color,sort_order:so});
  document.getElementById('tMsg').textContent = error? 'Fehler: '+error.message : '✓ angelegt';
  if(!error){ document.getElementById('newTName').value=''; loadLehrer(); }
}
async function saveTeacher(id){
  const name=document.getElementById('tn-'+id).value.trim();
  const color=document.getElementById('tc-'+id).value;
  const { error }=await sb.from('teachers').update({name,color}).eq('id',id);
  if(error) alert('Fehler: '+error.message); else loadLehrer();
}
async function toggleTeacher(id,active){
  const { error }=await sb.from('teachers').update({active}).eq('id',id);
  if(error) alert('Fehler: '+error.message); else loadLehrer();
}

// ---------- Materialien (PDF-Bibliothek) ----------
let matRows=null;
function matSan(s){ return s.normalize('NFC').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/Ä/g,'Ae').replace(/Ö/g,'Oe').replace(/Ü/g,'Ue').replace(/ß/g,'ss').replace(/[^a-zA-Z0-9._/-]+/g,'_').replace(/_+/g,'_'); }
async function loadMaterial(){
  const { data, error } = await sb.from('materials').select('storage_path,title,folder,size_bytes,created_at').order('created_at',{ascending:false});
  if (error){ document.getElementById('matListAdmin').innerHTML='<div class="card">Fehler beim Laden.</div>'; return; }
  matRows = data||[];
  const folders=[...new Set(matRows.map(m=>m.folder))].sort();
  document.getElementById('matFolderSel').innerHTML =
    '<option value="">— Ordner wählen —</option>'+folders.map(f=>`<option>${f.replace(/</g,'&lt;')}</option>`).join('');
  const newest=matRows.slice(0,30);
  document.getElementById('matListAdmin').innerHTML =
    `<div class="card"><b>Bibliothek: ${matRows.length} Dateien</b><p class="muted" style="margin-bottom:8px">Die 30 neuesten:</p>`+
    newest.map(m=>`<div class="tn" style="display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);padding:5px 0">
      <span style="flex:1">📄 <b>${m.title.replace(/</g,'&lt;')}</b> <span class="muted">· ${m.folder.replace(/</g,'&lt;')} · ${new Date(m.created_at).toLocaleDateString('de-DE')}</span></span>
      <button class="btn btn-ghost" style="padding:4px 12px;font-size:12px" onclick="viewMaterial('${m.storage_path}')">Ansehen</button>
      <button class="btn btn-ghost" style="padding:4px 12px;font-size:12px;color:var(--primary)" onclick="deleteMaterial('${m.storage_path}')">Löschen</button>
    </div>`).join('')+'</div>';
}
async function viewMaterial(path){
  const { data } = await sb.storage.from('materials').createSignedUrl(path,600);
  if (data?.signedUrl) window.open(data.signedUrl,'_blank');
}
async function uploadMaterials(){
  const files=[...document.getElementById('matFiles').files];
  const folder=(document.getElementById('matFolderNew').value.trim()||document.getElementById('matFolderSel').value).replace(/^\/+|\/+$/g,'');
  const msg=document.getElementById('matMsg');
  if (!files.length){ msg.textContent='Bitte PDF-Datei(en) auswählen.'; return; }
  if (!folder){ msg.textContent='Bitte Ordner wählen oder neuen Ordner eintippen.'; return; }
  let ok=0, fail=0;
  for (const f of files){
    msg.textContent=`Lade hoch… ${ok+fail+1}/${files.length}: ${f.name}`;
    try{
      const key=matSan(folder)+'/'+matSan(f.name);
      const { error:e1 } = await sb.storage.from('materials').upload(key, f, { contentType:'application/pdf', upsert:true });
      if (e1) throw e1;
      const { error:e2 } = await sb.from('materials').upsert({ storage_path:key, title:f.name.replace(/\.pdf$/i,''), folder:folder, size_bytes:f.size, source:'admin' }, { onConflict:'storage_path' });
      if (e2) throw e2;
      ok++;
    }catch(e){ fail++; console.error('Upload-Fehler', f.name, e); }
  }
  msg.textContent=`✅ ${ok} hochgeladen`+(fail?` · ⚠️ ${fail} fehlgeschlagen`:'')+'. Schüler mit Guthaben sehen sie sofort.';
  document.getElementById('matFiles').value='';
  loadMaterial();
}
async function deleteMaterial(path){
  if (!confirm('Diese Datei wirklich aus der Bibliothek löschen?')) return;
  await sb.storage.from('materials').remove([path]);
  await sb.from('materials').delete().eq('storage_path', path);
  loadMaterial();
}

function fmt(d){ return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }

// ---------- Lehrerplan (Agenda-Übersicht: wer unterrichtet wann mit wem) ----------
let planWeekStart=null;
let planTeacherFilter='';
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
function fmtTime(d){ return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }
function fmtDayHdr(d){ return d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}); }

async function loadPlan(){
  const box=document.getElementById('plan');
  const isT = !isAdminUser; // reine Lehrer-Ansicht
  if(!planWeekStart){
    const { data:firstC } = await sb.from('classes').select('starts_at').eq('is_cancelled',false).gte('starts_at', new Date().toISOString()).order('starts_at').limit(1);
    planWeekStart = mondayOf(firstC && firstC[0] ? new Date(firstC[0].starts_at) : new Date());
  }
  const tFilter = isT ? (myTeacherId||'__self') : planTeacherFilter;
  const from=new Date(planWeekStart);
  const to=new Date(from); to.setDate(to.getDate()+7);
  const { data:cls } = await sb.from('classes').select('*').gte('starts_at',from.toISOString()).lt('starts_at',to.toISOString()).eq('is_cancelled',false).order('starts_at');
  let list=cls||[];
  if(tFilter==='__none') list=list.filter(c=>!c.teacher_id);
  else if(tFilter==='__self') list=[]; // Lehrer ohne verknüpften Account
  else if(tFilter) list=list.filter(c=>c.teacher_id===tFilter);

  const ids=list.map(c=>c.id);
  let parts={};
  if(ids.length){
    const { data:bk } = await sb.from('bookings').select('class_id,profiles(name,email)').in('class_id',ids).eq('status','booked');
    (bk||[]).forEach(b=>{ (parts[b.class_id]=parts[b.class_id]||[]).push(b.profiles); });
  }

  const weekLabel = from.toLocaleDateString('de-DE',{day:'numeric',month:'short'})+' – '+new Date(to.getTime()-1).toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'});
  let html='';
  if(!isT){
    html += `<div class="plan-ctrl">
      <button class="btn btn-ghost" onclick="planNav(-1)">←</button>
      <button class="btn btn-ghost" onclick="planNav(0)">Diese Woche</button>
      <button class="btn btn-ghost" onclick="planNav(1)">→</button>
      <b style="font-family:'Space Grotesk',sans-serif">${weekLabel}</b>
      <select id="planFilter" onchange="planFilterChange()" style="margin-left:auto">
        <option value="">Alle Lehrer</option>
        <option value="__none" ${planTeacherFilter==='__none'?'selected':''}>⚠️ Ohne Lehrer</option>
        ${TEACHERS.filter(t=>t.active||t.id===planTeacherFilter).map(t=>`<option value="${t.id}" ${t.id===planTeacherFilter?'selected':''}>${esc(t.name)}</option>`).join('')}
      </select>
    </div>`;
    const counts={}; (cls||[]).forEach(c=>{ if(c.teacher_id) counts[c.teacher_id]=(counts[c.teacher_id]||0)+1; });
    const missing=(cls||[]).filter(c=>!c.teacher_id).length;
    const chips = TEACHERS.filter(t=>counts[t.id]).map(t=>`<span class="tchip"><i style="background:${t.color||'#888'}"></i>${esc(t.name)}: ${counts[t.id]}</span>`).join('')
      + (missing?`<span class="tchip" style="background:#fff6f4;color:#DD0000">⚠️ Ohne Lehrer: ${missing}</span>`:'');
    if(chips) html += `<div style="margin-bottom:6px">${chips}</div>`;
  } else {
    html += `<div class="plan-ctrl">
      <button class="btn btn-ghost" onclick="planNav(-1)">←</button>
      <button class="btn btn-ghost" onclick="planNav(0)">Diese Woche</button>
      <button class="btn btn-ghost" onclick="planNav(1)">→</button>
      <b style="font-family:'Space Grotesk',sans-serif">${weekLabel}</b>
    </div>
    <p class="muted" style="margin-bottom:8px">Dein Stundenplan — wann du welchen Unterricht mit wem hast.</p>`;
  }

  if(!list.length){
    const why = isT && tFilter==='__self'
      ? 'Dein Lehrer-Account ist noch nicht mit einem Stundenplan verknüpft. Julia schaltet das frei.'
      : 'Keine Stunden in dieser Woche'+(tFilter&&tFilter!=='__none'?' für diese Auswahl':'')+'.';
    box.innerHTML = html + `<div class="card muted">${why}</div>`;
    return;
  }

  let curDay='';
  list.forEach(c=>{
    const d=new Date(c.starts_at);
    const dayKey=d.toDateString();
    if(dayKey!==curDay){
      curDay=dayKey;
      const dayCount=list.filter(x=>new Date(x.starts_at).toDateString()===dayKey).length;
      html += `<div class="plan-day">📆 ${fmtDayHdr(d)} <span class="cnt">· ${dayCount} Stunde${dayCount>1?'n':''}</span></div>`;
    }
    const end=new Date(d.getTime()+(c.duration_min||60)*60000);
    const col=CLUB_COLOR[c.club]||'#888';
    const p=parts[c.id]||[];
    const miss=!c.teacher_id;
    const names=p.map(x=>esc((x&&(x.name||x.email))||'')).filter(Boolean);
    const free=(c.capacity||0)-p.length;
    const freeHtml = free>0 ? `· <b style="color:#13A89A">${free} frei</b>` : '· <b style="color:#DD0000">ausgebucht</b>';
    const teacherCell = isT
      ? `<span class="tchip"><i style="background:${teacherColor(c.teacher_id)}"></i>${esc(teacherName(c.teacher_id)||'—')}</span>`
      : `<select class="passign ${miss?'miss':''}" onchange="assignTeacher('${c.id}',this.value)" title="Lehrer einteilen">
           <option value="">⚠️ Ohne Lehrer</option>
           ${TEACHERS.filter(t=>t.active||t.id===c.teacher_id).map(t=>`<option value="${t.id}" ${t.id===c.teacher_id?'selected':''}>${esc(t.name)}</option>`).join('')}
         </select>`;
    html += `<div style="margin-bottom:7px">
      <div class="prow ${miss?'pmiss':''}" style="margin-bottom:0;border-left-color:${miss?'#DD0000':col}">
        <span class="ptime">${fmtTime(d)}–${fmtTime(end)}</span>
        <span class="pill" style="background:${col};color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.25)">${CLUB_EMOJI[c.club]||''} ${esc((c.club||'').replace('club',''))}</span>
        <span class="pill">${esc(c.level||'')}</span>
        <span style="flex:1;min-width:130px"><b>${esc(c.title||'')}</b>${c.topic?` <span class="muted">· ${esc(c.topic)}</span>`:''}</span>
        ${teacherCell}
        <span class="muted" title="${names.join(', ')}">👥 ${p.length}/${c.capacity||0} ${freeHtml}${names.length?' · '+names.slice(0,3).join(', ')+(names.length>3?' …':''):''}</span>
        <a class="btn" href="klassenraum.html?stunde=${c.id}&titel=${encodeURIComponent(c.title||'')}&niveau=${encodeURIComponent(c.level||'')}" target="_blank" rel="noopener" style="padding:5px 12px;font-size:12px;text-decoration:none;background:#DD0000;color:#fff;font-weight:700;border:none">🔴 Unterricht starten</a>
        <button class="btn btn-ghost" style="padding:5px 12px;font-size:12px" onclick="planAtt('${c.id}')">✅ Anwesenheit</button>
      </div>
      <div id="patt-${c.id}" style="display:none;margin:4px 0 0 4px"></div>
    </div>`;
  });
  box.innerHTML=html;
}

// Teilnehmer + Anwesenheit direkt in der Agenda (für Lehrer & Admin)
async function planAtt(id){
  const box=document.getElementById('patt-'+id);
  if(box.style.display==='block'){ box.style.display='none'; return; }
  box.style.display='block';
  box.innerHTML='<span class="muted">lädt…</span>';
  const { data, error } = await sb.rpc('class_attendance',{ p_class_id:id });
  if(error){ box.innerHTML='<span class="muted" style="color:#c00">Fehler: '+error.message+'</span>'; return; }
  const rows=data||[];
  if(!rows.length){ box.innerHTML='<div class="muted" style="background:var(--bg);border-radius:10px;padding:10px 12px">Für diese Stunde hat noch niemand gebucht.</div>'; return; }
  box.innerHTML = `<div style="background:var(--bg);border-radius:10px;padding:10px 12px">
    <b style="font-size:13px">✅ Anwesenheit — wer war da?</b>
    <p class="muted" style="margin:3px 0 8px">Diese Schüler haben die Stunde gebucht. Tippe „Da" oder „Fehlt".</p>
    ${rows.map(r=>`<div class="tn" style="display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);padding:5px 0">
      <span style="flex:1">👤 ${esc(r.name||'')} <span class="muted">${esc(r.email||'')}</span></span>
      <button class="btn ${r.attendance==='present'?'btn-primary':'btn-ghost'}" style="padding:4px 12px;font-size:12px;${r.attendance==='present'?'background:#13A89A':''}" onclick="markAttP('${id}','${r.user_id}',true)">Da</button>
      <button class="btn ${r.attendance==='absent'?'btn-primary':'btn-ghost'}" style="padding:4px 12px;font-size:12px" onclick="markAttP('${id}','${r.user_id}',false)">Fehlt</button>
    </div>`).join('')}
  </div>`;
}
async function markAttP(classId,userId,present){
  const { error }=await sb.rpc('mark_attendance',{ p_class_id:classId, p_user_id:userId, p_present:present });
  if(error){ alert('Fehler: '+error.message); return; }
  const box=document.getElementById('patt-'+classId); box.style.display='none'; planAtt(classId);
}
function planNav(dir){
  if(dir===0){ planWeekStart=mondayOf(new Date()); }
  else { const x=new Date(planWeekStart); x.setDate(x.getDate()+dir*7); planWeekStart=x; }
  loadPlan();
}
function planFilterChange(){ planTeacherFilter=document.getElementById('planFilter').value; loadPlan(); }
async function assignTeacher(id,val){
  const { error } = await sb.from('classes').update({ teacher_id: val||null }).eq('id',id);
  if(error){ alert('Einteilen fehlgeschlagen: '+error.message); return; }
  loadPlan();
}

let KL_ALL=[], KL_PARTS={}, klTeacher=null, klClub='', klLevel='', klWeekStart=null, klOpenId=null;
function clubLabel(slug){ const m={sprechclub:'🗣️ Sprechclub',grammatikclub:'📐 Grammatikclub',wortschatzclub:'📚 Wortschatzclub',ausspracheclub:'🎧 Ausspracheclub',sprachspielclub:'🎲 Sprachspiele'}; return m[slug]||slug; }
function klFilterChange(){ klTeacher=document.getElementById('klTeacher').value; klClub=document.getElementById('klClub').value; klLevel=document.getElementById('klLevel').value; renderKlassen(); }
function klReset(){ klTeacher=''; klClub=''; klLevel=''; renderKlassen(); }

async function loadKlassen(){
  if(!klWeekStart){
    // Standard: Woche der ersten kommenden Stunde (= ab 29.06.), nicht die evtl. leere aktuelle Woche
    try{
      const { data:firstC } = await sb.from('classes').select('starts_at').eq('is_cancelled',false).gte('starts_at', new Date().toISOString()).order('starts_at').limit(1);
      klWeekStart = mondayOf(firstC && firstC[0] ? new Date(firstC[0].starts_at) : new Date());
    }catch(e){ klWeekStart = mondayOf(new Date()); }
  }
  const from = new Date(klWeekStart);
  const to = new Date(from); to.setDate(to.getDate()+7);
  const { data: cls } = await sb.from('classes').select('*').gte('starts_at', from.toISOString()).lt('starts_at', to.toISOString()).eq('is_cancelled', false).order('starts_at');
  const ids = (cls||[]).map(c=>c.id);
  let parts = {};
  if (ids.length){
    const { data: bk } = await sb.from('bookings').select('class_id, status, profiles(name,email)').in('class_id', ids).eq('status','booked');
    (bk||[]).forEach(b=>{ (parts[b.class_id]=parts[b.class_id]||[]).push(b.profiles); });
    const { data: mats } = await sb.from('class_materials').select('class_id').in('class_id', ids);
    const matSet = new Set((mats||[]).map(m=>m.class_id));
    (cls||[]).forEach(c=>{ c._hasMat = matSet.has(c.id); });
  }
  KL_ALL = cls||[]; KL_PARTS = parts;
  // Standard: Lehrkräfte sehen sofort NUR ihre eigenen Stunden
  if (klTeacher===null) klTeacher = (!isAdminUser && myTeacherId) ? myTeacherId : '';
  renderKlassen();
}

function renderKlassen(){
  const cls = KL_ALL, parts = KL_PARTS;
  // Filter anwenden
  let view = cls.filter(c=>{
    if (klTeacher==='__none__'){ if (c.teacher_id) return false; }
    else if (klTeacher){ if (c.teacher_id!==klTeacher) return false; }
    if (klClub && c.club!==klClub) return false;
    if (klLevel && c.level!==klLevel) return false;
    return true;
  });
  // Filter-Leiste aufbauen
  const levels = [...new Set(cls.map(c=>c.level))].sort();
  const clubs = [...new Set(cls.map(c=>c.club))];
  const teacherOpts = `<option value="">Alle Lehrer</option>`
    + TEACHERS.filter(t=>t.active||t.id===klTeacher).map(t=>`<option value="${t.id}" ${t.id===klTeacher?'selected':''}>${esc(t.name)}</option>`).join('')
    + `<option value="__none__" ${klTeacher==='__none__'?'selected':''}>⚠️ Ohne Lehrer</option>`;
  const clubOpts = `<option value="">Alle Bereiche</option>` + clubs.map(s=>`<option value="${s}" ${s===klClub?'selected':''}>${clubLabel(s)}</option>`).join('');
  const levelOpts = `<option value="">Alle Niveaus</option>` + levels.map(l=>`<option value="${l}" ${l===klLevel?'selected':''}>${esc(l)}</option>`).join('');
  const noTeach = cls.filter(c=>!c.teacher_id).length;
  const filterBar = `<div class="card" style="background:#FFFCF5;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">
    <b style="white-space:nowrap">📅 Wer hat wann Unterricht?</b>
    <select id="klTeacher" onchange="klFilterChange()" style="min-width:150px">${teacherOpts}</select>
    <select id="klClub" onchange="klFilterChange()">${clubOpts}</select>
    <select id="klLevel" onchange="klFilterChange()">${levelOpts}</select>
    <button class="btn btn-ghost" onclick="klReset()">↺ Alle anzeigen</button>
    <span class="muted" style="margin-left:auto">${view.length} Stunde${view.length===1?'':'n'}${noTeach?` · ⚠️ ${noTeach} ohne Lehrer`:''}</span>
  </div>`;

  const keyFmt = new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Berlin'});
  const timeFmt = new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',hour:'2-digit',minute:'2-digit'});
  const cardHtml = (c)=>{
    const p = parts[c.id]||[];
    const lc = LEVEL_COLOR[c.level]||'#6B7280';
    const full = p.length >= c.capacity;
    return `<div class="card" style="border-left:5px solid ${lc}">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;align-items:flex-start">
        <div style="min-width:200px">
          <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
            <b class="title" style="font-size:19px">${timeFmt.format(new Date(c.starts_at))}</b>
            <span style="font-size:16px;font-weight:700">${esc(c.title)}</span>
          </div>
          <div style="margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${c.teacher_id?`<span class="tchip" style="font-weight:700"><i style="background:${teacherColor(c.teacher_id)}"></i>👩‍🏫 ${esc(teacherName(c.teacher_id))}</span>`:'<span class="pill" style="background:#FCE5E3;color:#c00;font-weight:700">⚠️ Lehrer fehlt</span>'}
            <span class="pill" style="background:#fff;border:1.5px solid ${lc};color:${lc};font-weight:700">${esc(c.level)}</span>
            <span class="pill" style="background:var(--bg);color:#555">${clubLabel(c.club)}</span>
          </div>
          ${c.topic?`<div class="muted" style="margin-top:5px">📖 ${esc(c.topic)}</div>`:''}
        </div>
        ${full?'<span class="pill" style="background:#DD0000;color:#fff;white-space:nowrap">🔒 Ausgebucht</span>':`<span class="muted" style="white-space:nowrap">👥 ${p.length} gebucht</span>`}
      </div>
      ${p.length?'<div style="margin-top:8px">'+p.map(x=>`<div class="tn">👤 ${esc(x.name||'')} <span class="muted">${esc(x.email)}</span></div>`).join('')+'</div>':''}
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="toggleAtt('${c.id}')">✅ Anwesenheit</button>
        <a class="btn btn-ghost" href="tafel.html?id=${c.id}" target="_blank" rel="noopener">🖊️ Live-Tafel</a>
        <button class="btn btn-ghost" onclick="editClass('${c.id}')">Bearbeiten · Material</button>
        <button class="btn btn-ghost" onclick="cancelClass('${c.id}')">Stunde absagen</button>
      </div>
      <div id="att-${c.id}" style="display:none;margin-top:10px"></div>
      <div id="edit-${c.id}" style="display:none;margin-top:10px">
        <div class="formrow">
          <select id="eClub-${c.id}" style="flex:1">${clubOptions(c.club)}</select>
          <select id="eTeacher-${c.id}" style="flex:1">${teacherOptions(c.teacher_id)}</select>
        </div>
        <div class="formrow"><input id="ePre-${c.id}" placeholder="Übungen VOR dem Unterricht (Link)" value="${c.material_pre||''}" style="flex:1"><input id="eLive-${c.id}" placeholder="Material IM Unterricht (Link)" value="${c.material_live||''}" style="flex:1"></div>
        <div class="formrow"><input id="ePost-${c.id}" placeholder="Nachbearbeitung (Link)" value="${c.material_post||''}" style="flex:1"><input id="eZoom-${c.id}" placeholder="Google-Meet-Link" value="${c.zoom_link||''}" style="flex:1"></div>
        <div class="formrow"><textarea id="eVocab-${c.id}" placeholder="Vokabeln (eine pro Zeile): Wort — Bedeutung" style="flex:1;min-height:80px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px">${(c.vocab||[]).map(v=>v.de+' — '+(v.info||'')).join('\n')}</textarea></div>
        <button class="btn btn-primary" onclick="saveClass('${c.id}')">Speichern</button> <span class="muted" id="eMsg-${c.id}"></span>
        <div style="margin-top:12px;border-top:1px dashed var(--border);padding-top:12px">
          <b style="font-size:14px">🤖 Amanda erstellt Übungen</b>
          <p class="muted" style="margin:4px 0 8px">Generiert passend zu Niveau &amp; Thema: Lückentexte, Multiple Choice, Zuordnen, Satzbau, Schreibaufgaben, Grammatik-Tipp &amp; Vokabeln. Schüler sehen die Übungen interaktiv im Schülerbereich.</p>
          <button class="btn btn-ghost" onclick="genMaterial('${c.id}')">${c._hasMat?'🔄 Neu generieren':'✨ KI-Material erstellen'}</button>
          <span class="muted" id="genMsg-${c.id}">${c._hasMat?'✓ Material vorhanden':''}</span>
          <div id="genPrev-${c.id}" style="margin-top:8px"></div>
        </div>
      </div>
    </div>`;
  };
  // ===== Wochen-Navigation =====
  const ws = klWeekStart || mondayOf(new Date());
  const wEnd = new Date(ws); wEnd.setDate(wEnd.getDate()+6);
  const rngFmt = new Intl.DateTimeFormat('de-DE',{day:'numeric',month:'short'});
  const weekNav = `<div class="card" style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;flex-wrap:wrap">
    <button class="btn btn-ghost" onclick="klWeekNav(-1)">◀ Vorige</button>
    <b style="font-family:'Space Grotesk',sans-serif;font-size:16px">${rngFmt.format(ws)} – ${rngFmt.format(wEnd)}</b>
    <button class="btn btn-ghost" onclick="klWeekNav(1)">Nächste ▶</button>
    <button class="btn btn-primary" onclick="klWeekNav(0)" style="padding:7px 14px">📅 Heute</button>
  </div>`;

  // ===== Wochen-Raster (Mo–So) =====
  const todayKey = keyFmt.format(new Date());
  const wd = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const dnFmt = new Intl.DateTimeFormat('de-DE',{timeZone:'Europe/Berlin',day:'numeric',month:'numeric'});
  const byDay = {};
  view.forEach(c=>{ const k=keyFmt.format(new Date(c.starts_at)); (byDay[k]=byDay[k]||[]).push(c); });
  let cols='';
  for(let i=0;i<7;i++){
    const d=new Date(ws); d.setDate(d.getDate()+i);
    const k=keyFmt.format(d);
    const isToday=(k===todayKey);
    const dayCards=(byDay[k]||[]).map(c=>{
      const p=parts[c.id]||[]; const lc=LEVEL_COLOR[c.level]||'#6B7280'; const full=p.length>=c.capacity;
      const tch=c.teacher_id?`<div class="klc-t" style="color:${teacherColor(c.teacher_id)}">👩‍🏫 ${esc(teacherName(c.teacher_id))}</div>`:`<div class="klc-t miss">⚠️ Lehrer fehlt</div>`;
      return `<button class="klcard ${klOpenId===c.id?'open':''}" style="border-left-color:${lc}" onclick="openKl('${c.id}')">
        <div class="klc-time">${timeFmt.format(new Date(c.starts_at))}</div>
        <div class="klc-title">${esc(c.title)}</div>
        <div class="klc-lvl" style="color:${lc}">${esc(c.level)}</div>
        ${tch}
        <div class="klc-b ${full?'full':''}">${full?'🔒 Ausgebucht':'👥 '+p.length}</div>
      </button>`;
    }).join('') || '<div class="klc-empty">—</div>';
    cols += `<div class="klcol ${isToday?'today':''}"><h4>${wd[i]}<span class="d">${dnFmt.format(d)}${isToday?' · heute':''}</span></h4>${dayCards}</div>`;
  }
  const grid = `<div class="klgrid">${cols}</div>`;

  // ===== Detailbereich (volle Verwaltung der angeklickten Stunde) =====
  const openC = view.find(c=>c.id===klOpenId);
  const detail = `<div id="klDetail" style="margin-top:14px">${openC?cardHtml(openC):'<div class="card muted">👆 Tippe oben auf eine Stunde, um Anwesenheit, Material, Lehrer & Co. zu verwalten.</div>'}</div>`;

  const style = `<style>
    .klgrid{display:grid;grid-template-columns:repeat(7,minmax(140px,1fr));gap:8px;overflow-x:auto;padding-bottom:6px}
    .klcol{background:#fff;border:1px solid var(--border);border-radius:14px;padding:8px;min-width:140px}
    .klcol.today{border-color:#13A89A;box-shadow:0 0 0 2px rgba(19,168,154,.25);background:#F2FBFA}
    .klcol h4{font-size:13px;margin:2px 0 8px;text-align:center;font-family:'Space Grotesk',sans-serif}
    .klcol h4 .d{display:block;font-size:11px;color:#888;font-weight:600}
    .klcard{display:block;width:100%;text-align:left;border:1px solid var(--border);border-left:4px solid #ccc;background:#FFFCF5;border-radius:10px;padding:7px 9px;margin-bottom:7px;cursor:pointer;font-family:inherit}
    .klcard:hover{background:#FFF4D6}
    .klcard.open{outline:2px solid #13A89A;background:#FFF4D6}
    .klc-time{font-weight:800;font-size:13px}
    .klc-title{font-size:13px;font-weight:700;margin:2px 0;line-height:1.2}
    .klc-lvl{font-size:11px;font-weight:800}
    .klc-t{font-size:11px;font-weight:600;margin-top:2px}
    .klc-t.miss{color:#DD0000}
    .klc-b{font-size:11px;color:#666;margin-top:3px}
    .klc-b.full{color:#DD0000;font-weight:700}
    .klc-empty{color:#ccc;text-align:center;font-size:12px;padding:6px 0}
  </style>`;

  document.getElementById('klassen').innerHTML = style + filterBar + weekNav + grid + detail;
  if(openC){ const el=document.getElementById('klDetail'); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function openKl(id){ klOpenId = (klOpenId===id ? null : id); renderKlassen(); }
function klWeekNav(dir){
  if(dir===0){ klWeekStart = mondayOf(new Date()); }
  else { const d=new Date(klWeekStart||mondayOf(new Date())); d.setDate(d.getDate()+dir*7); klWeekStart=d; }
  klOpenId=null; loadKlassen();
}

async function cancelClass(id){
  if (!confirm('Stunde absagen? Gebuchte Teilnehmer bekommen ihr Guthaben zurück.')) return;
  const { error } = await sb.rpc('teacher_cancel_class', { p_class_id: id });
  if (error) alert('Absagen fehlgeschlagen: '+error.message);
  loadKlassen();
}

function parseVocab(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const m = l.split(/\s+[—–-]\s+/);
    return { de: m[0].trim(), info: (m[1]||'').trim() };
  });
}

function editClass(id){
  const el = document.getElementById('edit-'+id);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

async function saveClass(id){
  const vocab = parseVocab(document.getElementById('eVocab-'+id).value);
  const { error } = await sb.from('classes').update({
    club: document.getElementById('eClub-'+id).value,
    teacher_id: document.getElementById('eTeacher-'+id).value || null,
    material_pre: document.getElementById('ePre-'+id).value.trim() || null,

async function createClass(){
  const t = document.getElementById('nTitle').value.trim();
  const dt = document.getElementById('nDate').value;
  if (!t || !dt){ document.getElementById('neuMsg').textContent='Titel + Datum nötig.'; return; }
  const vocab = parseVocab(document.getElementById('nVocab').value);
  const base = {
    title: t, level: document.getElementById('nLevel').value,
    club: document.getElementById('nClub').value,
    teacher_id: document.getElementById('nTeacher').value || null,
    topic: document.getElementById('nTopic').value.trim() || null,
    capacity: parseInt(document.getElementById('nCap').value||'5',10),
    zoom_link: document.getElementById('nZoom').value.trim() || null,
    material_pre: document.getElementById('nPre').value.trim() || null,
    material_live: document.getElementById('nLive').value.trim() || null,
    material_post: document.getElementById('nPost').value.trim() || null,
    vocab: vocab.length ? vocab : null,
  };
  const weeks = document.getElementById('nRepeat').checked ? 8 : 1;
  const rows = [];
  for (let w=0; w<weeks; w++){
    const d = new Date(dt); d.setDate(d.getDate()+w*7);
    rows.push({ ...base, starts_at: d.toISOString() });
  }
  const { error } = await sb.from('classes').insert(rows);
  document.getElementById('neuMsg').textContent = error ? 'Fehler: '+error.message : `✓ ${rows.length} Stunde(n) angelegt.`;
}

async function sendNachricht(){
  const body=(document.getElementById('nachrBody').value||'').trim();
  const msgEl=document.getElementById('nachrMsg');
  if(!body){ msgEl.textContent='Bitte Text eingeben.'; return; }
  const mode=document.querySelector('input[name=rcpt]:checked').value;
  let ids = mode==='all' ? NACHR_STUDENTS.map(s=>s.id) : [...document.querySelectorAll('.nachr-cb:checked')].map(c=>c.value);
  if(!ids.length){ msgEl.textContent='Bitte mindestens einen Schüler wählen.'; return; }

  msgEl.textContent='Sende…';
  const rows = ids.map(uid=>({ user_id:uid, sender:'teacher', body }));
  const { error } = await sb.from('messages').insert(rows);

function renderSchuelerTable(){
  const q = (document.getElementById('schuelerSuche')?.value||'').toLowerCase().trim();
  const mode = document.getElementById('schuelerSort')?.value||'name';
  const stf = document.getElementById('schuelerStatus')?.value||'';
  const lowOnly = document.getElementById('schuelerLowOnly')?.checked;
  let rows = SCHUELER.filter(p => !q || (p.name||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q));
  if (stf) rows = rows.filter(p => (p.status||'aktiv')===stf);
  if (lowOnly) rows = rows.filter(p => p.credits<=1);
  rows = [...rows];
  if (mode==='credits') rows.sort((a,b)=> a.credits-b.credits || nameKey(a).localeCompare(nameKey(b),'de'));
  else if (mode==='credits-desc') rows.sort((a,b)=> b.credits-a.credits || nameKey(a).localeCompare(nameKey(b),'de'));
  else if (mode==='bday') rows.sort((a,b)=> (a.birthday?a.birthday.slice(5):'zz').localeCompare(b.birthday?b.birthday.slice(5):'zz') || nameKey(a).localeCompare(nameKey(b),'de'));
  else rows.sort((a,b)=> nameKey(a).localeCompare(nameKey(b),'de',{sensitivity:'base'}));
  const low = SCHUELER.filter(p=>p.credits<=1).length;
  const bdayToday = SCHUELER.filter(p=>p.birthday && p.birthday.slice(5)===todayMMDD()).length;
  const info = document.getElementById('schuelerInfo');
  if (info) info.textContent = `${rows.length} von ${SCHUELER.length} · ${low} mit ≤ 1 Stunde${bdayToday?` · 🎂 ${bdayToday} heute Geburtstag`:''}`;
  const byName = (mode==='name');
  let lastLetter = '';
  const statusLabel = (st)=>{ const o=STATUS_OPT.find(x=>x[0]===st)||STATUS_OPT[0]; return `<span class="pill" style="background:${STATUS_BG[st]||'#eee'};color:#1A1A1A;font-weight:700">${o[1]}</span>`; };
  const rowsHtml = rows.map(p=>{
    const st = p.status||'aktiv';
    const staff = p.is_admin||p.is_teacher;
    let head = '';
    if (byName){
      const L = (nameKey(p)[0]||'#').toUpperCase();
      if (L !== lastLetter){ lastLetter = L; head = `<tr class="alpha"><td colspan="5" style="background:#FFF8E0;font-weight:800;color:#DD0000;letter-spacing:.05em;padding:8px 10px">${esc(L)}</td></tr>`; }
    }
    const nivo = p.level || p.target_level || '';
    return head + `<tr onclick="openStudentCard('${p.id}')" style="cursor:pointer${p.credits<=1?';background:#FFF1C2':''}" onmouseover="this.style.outline='2px solid #2DD4BF'" onmouseout="this.style.outline='none'">
      <td><b>${esc(p.name||'–')}</b>${staff?' <span class="pill">Team</span>':''}</td>
      <td class="muted">${esc(p.email)}</td>
      <td>${nivo?`<span class="pill" style="background:#Eef;color:#2563EB;font-weight:700">${esc(nivo)}</span>`:'<span class="muted">–</span>'}</td>
      <td>${statusLabel(st)}${((st==='pause'||st==='urlaub')&&p.inactive_until)?` <span class="muted" style="font-size:11px">bis ${p.inactive_until.split('-').reverse().join('.')}</span>`:''}</td>
      <td><b style="font-size:16px">${p.credits}</b> <span class="muted" style="font-size:12px">Std.</span>${p.credits<=1?' <span class="pill">niedrig</span>':''}</td></tr>`;
  }).join('');
  document.getElementById('schuelerTable').innerHTML = `<p class="muted" style="margin:0 0 6px">Tipp: Auf einen Schüler klicken, um die Schülerkarte zu öffnen.</p><table><tr><th>Name</th><th>E-Mail</th><th>Niveau</th><th>Status</th><th>Guthaben</th></tr>` + rowsHtml + '</table>';
}

        <div class="field" id="cInactiveWrap" style="margin:0;display:${(st==='pause'||st==='urlaub')?'block':'none'}"><label>Pause/Urlaub bis</label><input id="cInactive" type="date" value="${esc(p.inactive_until||'')}"></div>
      </div>
      <datalist id="levellist"><option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option></datalist>
      <div class="muted" style="margin:8px 0 14px;font-size:13px">🎂 Geburtstag: ${bdayLabel(p)} · 🎯 Ziel: ${esc(p.target_level||'—')} · 🗣️ Muttersprache: ${esc(p.native_language||'—')}</div>

      <div style="background:#FFF8E0;border-radius:14px;padding:14px 16px;margin-bottom:14px">
        <b>🎟️ Guthaben</b>
        <div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap;margin-top:8px">
          <div class="field" style="margin:0;max-width:140px"><label>Guthaben setzen</label><input id="cCredits" type="number" min="0" value="${p.credits}"></div>
          <button class="btn btn-primary" onclick="saveCardCredits('${p.id}')">Guthaben speichern</button>
          <span class="muted" id="cCreditMsg" style="margin-bottom:8px"></span>
        </div>
        <div id="cCreditLog" class="muted" style="margin-top:8px;font-size:12px">Verlauf lädt…</div>
      </div>

      <div class="field" style="margin:0 0 14px"><label>Notizen / Vermerke zum Schüler</label><textarea id="cNotes" style="min-height:90px" placeholder="z.B. Lernziele, Besonderheiten, Vereinbarungen …">${esc(p.notes||'')}</textarea></div>

      <div style="margin-bottom:8px"><b>✅ Erledigte Übungen</b><div id="cExercises" class="muted" style="margin-top:6px">lädt…</div></div>
    </div>
    <div style="padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap">
      <button class="btn ${(p.is_admin||p.is_teacher)?'':'btn-ghost'}" ${(p.is_admin||p.is_teacher)?'disabled style="opacity:.4"':'style="color:#DD0000"'} onclick="deleteStudent('${p.id}')">🗑 Schüler löschen</button>
      <div><span class="muted" id="cSaveMsg" style="margin-right:8px"></span><button class="btn btn-primary" onclick="saveStudentCard('${p.id}')">Speichern</button></div>
    </div>
  </div>`;
  document.body.appendChild(ov);

  // Guthaben-Verlauf laden
  sb.from('credit_log').select('change,reason,created_at').eq('user_id',id).order('created_at',{ascending:false}).limit(12).then(({data})=>{
    const el=document.getElementById('cCreditLog'); if(!el) return;
    if(!data||!data.length){ el.textContent='Noch keine Guthaben-Buchungen.'; return; }
    el.innerHTML = data.map(r=>`<div>${r.change>0?'➕':'➖'} ${Math.abs(r.change)} · ${esc(r.reason||'')} · ${new Date(r.created_at).toLocaleDateString('de-DE')}</div>`).join('');
  });
  // Erledigte Übungen laden
  sb.from('exercise_progress').select('phase,score,total,completed,updated_at,classes(title,level,starts_at)').eq('user_id',id).order('updated_at',{ascending:false}).then(({data})=>{
    const el=document.getElementById('cExercises'); if(!el) return;
    const done=(data||[]).filter(r=>r.completed);
    if(!done.length){ el.textContent='Noch keine Übungen erledigt.'; return; }
    el.innerHTML = `<div style="font-weight:700;color:#1A1A1A;margin-bottom:4px">${done.length} erledigt</div>` + done.map(r=>{
      const phaseLbl={pre:'Vorbereitung',live:'im Unterricht',post:'Nachbereitung'}[r.phase]||r.phase||'';
      const t=r.classes?.title||'Übung';
      return `<div style="border-bottom:1px solid var(--border);padding:4px 0">📘 ${esc(t)} <span class="muted">· ${esc(phaseLbl)}${(r.score!=null&&r.total!=null)?` · ${r.score}/${r.total}`:''} · ${new Date(r.updated_at).toLocaleDateString('de-DE')}</span></div>`;
    }).join('');
  });
}
async function saveStudentCard(id){
  const msg=document.getElementById('cSaveMsg'); if(msg) msg.textContent='⏳ …';
  const level=document.getElementById('cLevel').value.trim()||null;
  const started=document.getElementById('cStarted').value||null;
  const notes=document.getElementById('cNotes').value.trim()||null;
  const status=document.getElementById('cStatus').value;
  const inactive=(status==='pause'||status==='urlaub')?(document.getElementById('cInactive').value||null):null;
  const e1=(await sb.rpc('admin_set_student_card',{ p_user_id:id, p_level:level, p_notes:notes, p_started_at:started })).error;
  const e2=(await sb.rpc('admin_update_student',{ p_user_id:id, p_status:status, p_inactive_until:inactive })).error;
  const p=SCHUELER.find(x=>x.id===id); if(p){ p.level=level; p.started_at=started; p.notes=notes; p.status=status; p.inactive_until=inactive; }
  renderSchuelerTable();
  if(msg) msg.textContent=(e1||e2)?('⚠️ '+((e1||e2).message)):'✓ gespeichert';
}
async function saveCardCredits(id){
  const val=parseInt(document.getElementById('cCredits').value,10);
  const msg=document.getElementById('cCreditMsg');
  if(!Number.isFinite(val)||val<0){ if(msg) msg.textContent='⚠️ Zahl ≥ 0'; return; }
  const { error }=await sb.rpc('admin_set_credits',{ p_user_id:id, p_new_total:val, p_reason:'admin_set' });
  if(error){ if(msg) msg.textContent='⚠️ '+error.message; return; }
  const p=SCHUELER.find(x=>x.id===id); if(p) p.credits=val;
  if(msg) msg.textContent='✓ gespeichert';
  renderSchuelerTable();
  sb.from('credit_log').select('change,reason,created_at').eq('user_id',id).order('created_at',{ascending:false}).limit(12).then(({data})=>{
    const el=document.getElementById('cCreditLog'); if(el&&data) el.innerHTML=data.map(r=>`<div>${r.change>0?'➕':'➖'} ${Math.abs(r.change)} · ${esc(r.reason||'')} · ${new Date(r.created_at).toLocaleDateString('de-DE')}</div>`).join('');
  });
}

async function createStudent(){
  const name=(document.getElementById('newName').value||'').trim();
  const email=(document.getElementById('newEmail').value||'').trim();
  const credits=parseInt(document.getElementById('newCredits').value||'0',10)||0;
  const birthday=document.getElementById('newBday').value||null;
  const msg=document.getElementById('createMsg');
  if(!email||!email.includes('@')){ if(msg) msg.textContent='⚠️ Bitte eine gültige E-Mail eingeben.'; return; }
  const btn=document.getElementById('btnCreate'); if(btn){ btn.disabled=true; btn.textContent='⏳ Lege an …'; }
  try{
    const r=await fetch('/api/admin-create-student',{ method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+await authToken()}, body:JSON.stringify({name,email,credits,birthday}) });
    const j=await r.json().catch(()=>({}));
    if(j&&j.ok){
      if(msg) msg.innerHTML = `✅ ${esc(name||email)} angelegt.${j.existed?' (E-Mail existierte schon – Profil aktualisiert)':''} ${j.mailed?'📧 Einladungs-Mail verschickt.':'⚠️ Mail nicht verschickt (Brevo prüfen).'}`;
      document.getElementById('newName').value=''; document.getElementById('newEmail').value=''; document.getElementById('newCredits').value='0'; document.getElementById('newBday').value='';
      await loadSchueler();
    } else { if(msg) msg.textContent='⚠️ Fehler: '+((j&&(j.detail||j.error))||'unbekannt'); }
  }catch(e){ if(msg) msg.textContent='⚠️ Konnte nicht anlegen (ist die Seite live deployt?)'; }
  finally{ if(btn){ btn.disabled=false; btn.textContent='Anlegen & einladen'; } }
}

async function setStatus(id, status){
  const p = SCHUELER.find(x=>x.id===id);
  let until = null;
  if(status==='pause'||status==='urlaub'){
    const cur = p&&p.inactive_until ? p.inactive_until : '';
    const inp = prompt(`${status==='pause'?'Pause':'Urlaub'} bis welches Datum? (JJJJ-MM-TT, leer = offen)`, cur);
    if(inp===null){ renderSchuelerTable(); return; } // abgebrochen
    until = inp.trim() || null;
  }
  await sb.rpc('admin_update_student', { p_user_id:id, p_status:status, p_inactive_until:until });
  if(p){ p.status=status; p.inactive_until=until; }
  renderSchuelerTable();
}

async function deleteStudent(id){
  const _p=SCHUELER.find(x=>x.id===id); const label=_p?(_p.name||_p.email):'';
  if(!confirm(`Schüler „${label}" wirklich löschen?\n\nDamit werden Konto, Buchungen, Guthaben-Verlauf und Community-Beiträge unwiderruflich entfernt.`)) return;
  const r=await fetch('/api/admin-delete-student',{ method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+await authToken()}, body:JSON.stringify({user_id:id}) });
  const j=await r.json().catch(()=>({}));
  if(j&&j.ok){ SCHUELER=SCHUELER.filter(x=>x.id!==id); closeStudentCard(); renderSchuelerTable(); }
  else alert('⚠️ Konnte nicht löschen: '+((j&&(j.detail||j.error))||'unbekannt'));
}

async function sendCreditOffer(){
  const low = SCHUELER.filter(p=>p.credits<=1).length;
  if (!confirm(`Angebots-Mail an Schüler mit nur noch ≤ 1 Stunde senden?\n\nEs werden nur Schüler mit genau 1 Stunde angeschrieben, die in den letzten 30 Tagen noch keine bekommen haben. Aktuell ≤ 1 Stunde: ${low}.`)) return;
  const btn = document.getElementById('btnCreditOffer');
  const msg = document.getElementById('creditOfferMsg');
  if (btn){ btn.disabled = true; btn.textContent = '⏳ Sende …'; }
  try {
    const r = await fetch('/api/send-credit-offer', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const j = await r.json().catch(()=>({}));
    if (msg) msg.textContent = j && j.ok ? `✅ ${j.sent||0} Mail(s) verschickt${j.errors?` · ⚠️ ${j.errors} Fehler`:''}.` : `⚠️ ${j && j.skipped ? j.skipped : 'Fehler beim Senden'}`;
  } catch(e){
    if (msg) msg.textContent = '⚠️ Konnte nicht senden (ist die Seite live deployt?)';
  } finally {
    if (btn){ btn.disabled = false; btn.textContent = '💛 Angebots-Mail an Schüler mit ≤ 1 Stunde senden'; }
  }
}

async function adjust(id, n){
  await sb.rpc('admin_adjust_credits', { p_user_id: id, p_amount: n });
  const p = SCHUELER.find(x=>x.id===id); if (p) p.credits += n;   // lokal aktualisieren (Suche/Sortierung bleibt erhalten)
  renderSchuelerTable();
}

init();
</script>
