<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sprechclub</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#DD0000;--secondary:#1A1A1A;--accent:#FFCE00;--cream:#FFFCF5;--bg:#FFF8E0;--text:#1A1A1A;--text-soft:#6B7280;--border:#F0E5D8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.5}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.wrap{max-width:920px;margin:0 auto;padding:30px 20px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:50px;font-weight:700;font-size:13px;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-ghost{background:#fff;color:var(--secondary);border:2px solid var(--border)}
.tabs{display:flex;gap:8px;margin:20px 0}
.tabs button{border:2px solid var(--border);background:#fff;border-radius:30px;padding:8px 18px;font-weight:700;cursor:pointer;font-family:inherit}
.tabs button.active{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.card b.title{display:block}
.muted{color:var(--text-soft);font-size:13px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
th{background:var(--bg);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
input,select{padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px}
.formrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.pill{font-size:11px;font-weight:800;background:var(--bg);color:var(--primary);border-radius:30px;padding:3px 9px}
.tn{font-size:13px;margin:2px 0}
#gate{max-width:380px;margin:80px auto;text-align:center;background:#fff;border:1px solid var(--border);border-radius:20px;padding:30px}
</style>
</head>
<body>
<div id="gate">
  <h2>Admin-Login</h2>
  <p class="muted" style="margin:8px 0 14px">Melde dich mit deiner Admin-E-Mail an.</p>
  <input type="email" id="adminEmail" placeholder="deine@email.de" style="width:100%;margin-bottom:10px">
  <button class="btn btn-primary" style="width:100%" onclick="login()">Anmelde-Link schicken</button>
  <p class="muted" id="gateMsg" style="margin-top:10px"></p>
</div>

<div class="wrap" id="app" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <h1>deutschoderwas club · Admin</h1>
    <div><a class="btn btn-primary" href="admin-kurse.html">🎓 Kurse verwalten</a> <a class="btn btn-ghost" href="index.html">Zur Seite</a> <button class="btn btn-ghost" onclick="logout()">Abmelden</button></div>
  </div>

  <div class="tabs">
    <button id="tabK" class="active" onclick="show('klassen')">Stunden & Teilnehmer</button>
    <button id="tabN" onclick="show('neu')">Stunde anlegen</button>
    <button id="tabS" onclick="show('schueler')">Schüler & Guthaben</button>
    <button id="tabM" onclick="show('nachrichten')">Nachrichten</button>
    <button id="tabB" onclick="show('bewertungen')">Bewertungen</button>
    <button id="tabMat" onclick="show('material')">📚 Materialien</button>
  </div>

  <div id="klassen"></div>
  <div id="nachrichten" style="display:none"></div>
  <div id="bewertungen" style="display:none"></div>

  <div id="neu" style="display:none">
    <div class="card">
      <h3 style="margin-bottom:12px">Neue Stunde</h3>
      <div class="formrow">
        <input id="nTitle" placeholder="Titel, z.B. B1/B2 Unterricht" style="flex:2">
        <select id="nLevel"><option>A2</option><option>B1/B2</option><option>B2/C1</option><option>ab B1</option></select>
      </div>
      <div class="formrow">
        <input id="nTopic" placeholder="Thema (optional)" style="flex:2">
        <input id="nDate" type="datetime-local">
        <input id="nCap" type="number" value="5" min="1" max="20" style="width:80px" title="Plätze">
      </div>
      <div class="formrow">
        <input id="nZoom" placeholder="Google-Meet-Link" style="flex:1">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="nRepeat"> 8 Wochen wiederholen</label>
      </div>
      <div class="formrow">
        <input id="nPre" placeholder="Link: Übungen VOR dem Unterricht (optional)" style="flex:1">
        <input id="nLive" placeholder="Link: Material IM Unterricht (optional)" style="flex:1">
      </div>
      <div class="formrow">
        <input id="nPost" placeholder="Link: Nachbearbeitung (optional)" style="flex:1">
      </div>
      <div class="formrow">
        <textarea id="nVocab" placeholder="Vokabeln (eine pro Zeile):&#10;die Beschwerde — complaint, sich beschweren&#10;der Umtausch — exchange" style="flex:1;min-height:90px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px"></textarea>
      </div>
      <button class="btn btn-primary" onclick="createClass()">Anlegen</button>
      <span class="muted" id="neuMsg"></span>
    </div>
  </div>

  <div id="schueler" style="display:none"></div>

  <div id="material" style="display:none">
    <div class="card">
      <h3 style="margin-bottom:6px">PDFs hochladen</h3>
      <p class="muted" style="margin-bottom:12px">Neues Material sehen nur Schüler mit Guthaben oder gebuchter Stunde — die Sperre für Inaktive passiert automatisch.</p>
      <div class="formrow">
        <select id="matFolderSel" style="flex:1"></select>
        <input id="matFolderNew" placeholder="…oder neuen Ordner tippen, z.B. Juni 2026/Woche 3" style="flex:2">
      </div>
      <div class="formrow">
        <input type="file" id="matFiles" accept="application/pdf" multiple style="flex:1;border-style:dashed">
        <button class="btn btn-primary" onclick="uploadMaterials()">Hochladen</button>
      </div>
      <p class="muted" id="matMsg"></p>
    </div>
    <div id="matListAdmin"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
let sb=null, me=null;

async function init(){
  if (CFG.SUPABASE_URL.startsWith('HIER_')){ document.getElementById('gateMsg').textContent='Supabase noch nicht verbunden (config.js).'; return; }
  sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if (session) await enter(session.user);
  sb.auth.onAuthStateChange(async (_e,s)=>{ if (s && !me) await enter(s.user); });
}

let isAdminUser=false;
async function enter(u){
  const { data } = await sb.from('profiles').select('is_admin,is_teacher').eq('id', u.id).single();
  if (!data || (!data.is_admin && !data.is_teacher)){ document.getElementById('gateMsg').textContent='Dieses Konto hat keine Admin- oder Lehrer-Rechte.'; return; }
  me = u; isAdminUser = !!data.is_admin;
  if (!isAdminUser){
    // Lehrer-Ansicht: keine Guthaben-Verwaltung, keine Bewertungen
    document.getElementById('tabS').style.display='none';
    document.getElementById('tabB').style.display='none';
    document.querySelector('h1').textContent='Sprechclub — Lehrkraft';
  }
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  loadKlassen();
}

async function login(){
  const email = document.getElementById('adminEmail').value.trim();
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.href } });
  document.getElementById('gateMsg').textContent = error ? error.message : '✓ Link verschickt — Postfach checken.';
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

function show(id){
  ['klassen','neu','schueler','nachrichten','bewertungen','material'].forEach(x=>document.getElementById(x).style.display = x===id?'block':'none');
  document.getElementById('tabK').classList.toggle('active', id==='klassen');
  document.getElementById('tabN').classList.toggle('active', id==='neu');
  document.getElementById('tabS').classList.toggle('active', id==='schueler');
  document.getElementById('tabM').classList.toggle('active', id==='nachrichten');
  document.getElementById('tabB').classList.toggle('active', id==='bewertungen');
  document.getElementById('tabMat').classList.toggle('active', id==='material');
  if (id==='klassen') loadKlassen();
  if (id==='schueler') loadSchueler();
  if (id==='nachrichten') loadNachrichten();
  if (id==='bewertungen') loadBewertungen();
  if (id==='material') loadMaterial();
}

// ---------- Materialien (PDF-Bibliothek) ----------
let matRows=null;
function matSan(s){ return s.normalize('NFC').replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/Ä/g,'Ae').replace(/Ö/g,'Oe').replace(/Ü/g,'Ue').replace(/ß/g,'ss').replace(/[^a-zA-Z0-9._/-]+/g,'_').replace(/_+/g,'_'); }
async function loadMaterial(){
  const { data, error } = await sb.from('materials').select('storage_path,title,folder,size_bytes,created_at').order('created_at',{ascending:false});
  if (error){ document.getElementById('matListAdmin').innerHTML='<div class="card">Fehler beim Laden.</div>'; return; }
  matRows = data||[];
  const folders=[...new Set(matRows.map(m=>m.folder))].sort();
  document.getElementById('matFolderSel').innerHTML =
    '<option value="">— Ordner wählen —</option>'+folders.map(f=>`<option>${f.replace(/</g,'&lt;')}</option>`).join('');
  const newest=matRows.slice(0,30);
  document.getElementById('matListAdmin').innerHTML =
    `<div class="card"><b>Bibliothek: ${matRows.length} Dateien</b><p class="muted" style="margin-bottom:8px">Die 30 neuesten:</p>`+
    newest.map(m=>`<div class="tn" style="display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);padding:5px 0">
      <span style="flex:1">📄 <b>${m.title.replace(/</g,'&lt;')}</b> <span class="muted">· ${m.folder.replace(/</g,'&lt;')} · ${new Date(m.created_at).toLocaleDateString('de-DE')}</span></span>
      <button class="btn btn-ghost" style="padding:4px 12px;font-size:12px" onclick="viewMaterial('${m.storage_path}')">Ansehen</button>
      <button class="btn btn-ghost" style="padding:4px 12px;font-size:12px;color:var(--primary)" onclick="deleteMaterial('${m.storage_path}')">Löschen</button>
    </div>`).join('')+'</div>';
}
async function viewMaterial(path){
  const { data } = await sb.storage.from('materials').createSignedUrl(path,600);
  if (data?.signedUrl) window.open(data.signedUrl,'_blank');
}
async function uploadMaterials(){
  const files=[...document.getElementById('matFiles').files];
  const folder=(document.getElementById('matFolderNew').value.trim()||document.getElementById('matFolderSel').value).replace(/^\/+|\/+$/g,'');
  const msg=document.getElementById('matMsg');
  if (!files.length){ msg.textContent='Bitte PDF-Datei(en) auswählen.'; return; }
  if (!folder){ msg.textContent='Bitte Ordner wählen oder neuen Ordner eintippen.'; return; }
  let ok=0, fail=0;
  for (const f of files){
    msg.textContent=`Lade hoch… ${ok+fail+1}/${files.length}: ${f.name}`;
    try{
      const key=matSan(folder)+'/'+matSan(f.name);
      const { error:e1 } = await sb.storage.from('materials').upload(key, f, { contentType:'application/pdf', upsert:true });
      if (e1) throw e1;
      const { error:e2 } = await sb.from('materials').upsert({ storage_path:key, title:f.name.replace(/\.pdf$/i,''), folder:folder, size_bytes:f.size, source:'admin' }, { onConflict:'storage_path' });
      if (e2) throw e2;
      ok++;
    }catch(e){ fail++; console.error('Upload-Fehler', f.name, e); }
  }
  msg.textContent=`✅ ${ok} hochgeladen`+(fail?` · ⚠️ ${fail} fehlgeschlagen`:'')+'. Schüler mit Guthaben sehen sie sofort.';
  document.getElementById('matFiles').value='';
  loadMaterial();
}
async function deleteMaterial(path){
  if (!confirm('Diese Datei wirklich aus der Bibliothek löschen?')) return;
  await sb.storage.from('materials').remove([path]);
  await sb.from('materials').delete().eq('storage_path', path);
  loadMaterial();
}

function fmt(d){ return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}); }

async function loadKlassen(){
  const from = new Date(); from.setHours(0,0,0,0);
  const to = new Date(from); to.setDate(to.getDate()+14);
  const { data: cls } = await sb.from('classes').select('*').gte('starts_at', from.toISOString()).lt('starts_at', to.toISOString()).eq('is_cancelled', false).order('starts_at');
  const ids = (cls||[]).map(c=>c.id);
  let parts = {};
  if (ids.length){
    const { data: bk } = await sb.from('bookings').select('class_id, status, profiles(name,email)').in('class_id', ids).eq('status','booked');
    (bk||[]).forEach(b=>{ (parts[b.class_id]=parts[b.class_id]||[]).push(b.profiles); });
    const { data: mats } = await sb.from('class_materials').select('class_id').in('class_id', ids);
    const matSet = new Set((mats||[]).map(m=>m.class_id));
    (cls||[]).forEach(c=>{ c._hasMat = matSet.has(c.id); });
  }
  document.getElementById('klassen').innerHTML = (cls||[]).length ? cls.map(c=>{
    const p = parts[c.id]||[];
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><b class="title">${fmt(new Date(c.starts_at))} — ${c.title}</b>
        <span class="pill">${c.level}</span> <span class="muted">${c.topic||''}</span></div>
        <div class="muted">${p.length}/${c.capacity} gebucht</div>
      </div>
      ${p.length?'<div style="margin-top:8px">'+p.map(x=>`<div class="tn">👤 ${x.name||''} <span class="muted">${x.email}</span></div>`).join('')+'</div>':''}
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="editClass('${c.id}')">Material & Vokabeln</button>
        <button class="btn btn-ghost" onclick="cancelClass('${c.id}')">Stunde absagen</button>
      </div>
      <div id="edit-${c.id}" style="display:none;margin-top:10px">
        <div class="formrow"><input id="ePre-${c.id}" placeholder="Übungen VOR dem Unterricht (Link)" value="${c.material_pre||''}" style="flex:1"><input id="eLive-${c.id}" placeholder="Material IM Unterricht (Link)" value="${c.material_live||''}" style="flex:1"></div>
        <div class="formrow"><input id="ePost-${c.id}" placeholder="Nachbearbeitung (Link)" value="${c.material_post||''}" style="flex:1"><input id="eZoom-${c.id}" placeholder="Google-Meet-Link" value="${c.zoom_link||''}" style="flex:1"></div>
        <div class="formrow"><textarea id="eVocab-${c.id}" placeholder="Vokabeln (eine pro Zeile): Wort — Bedeutung" style="flex:1;min-height:80px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px">${(c.vocab||[]).map(v=>v.de+' — '+(v.info||'')).join('\n')}</textarea></div>
        <button class="btn btn-primary" onclick="saveClass('${c.id}')">Speichern</button> <span class="muted" id="eMsg-${c.id}"></span>
        <div style="margin-top:12px;border-top:1px dashed var(--border);padding-top:12px">
          <b style="font-size:14px">🤖 Amanda erstellt Übungen</b>
          <p class="muted" style="margin:4px 0 8px">Generiert passend zu Niveau &amp; Thema: Lückentexte, Multiple Choice, Zuordnen, Satzbau, Schreibaufgaben, Grammatik-Tipp &amp; Vokabeln. Schüler sehen die Übungen interaktiv im Schülerbereich.</p>
          <button class="btn btn-ghost" onclick="genMaterial('${c.id}')">${c._hasMat?'🔄 Neu generieren':'✨ KI-Material erstellen'}</button>
          <span class="muted" id="genMsg-${c.id}">${c._hasMat?'✓ Material vorhanden':''}</span>
          <div id="genPrev-${c.id}" style="margin-top:8px"></div>
        </div>
      </div>
    </div>`;
  }).join('') : '<div class="card muted">Keine Stunden in den nächsten 14 Tagen.</div>';
}

async function cancelClass(id){
  if (!confirm('Stunde absagen? Gebuchte Teilnehmer bekommen ihr Guthaben zurück.')) return;
  const { error } = await sb.rpc('teacher_cancel_class', { p_class_id: id });
  if (error) alert('Absagen fehlgeschlagen: '+error.message);
  loadKlassen();
}

function parseVocab(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const m = l.split(/\s+[—–-]\s+/);
    return { de: m[0].trim(), info: (m[1]||'').trim() };
  });
}

function editClass(id){
  const el = document.getElementById('edit-'+id);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

async function saveClass(id){
  const vocab = parseVocab(document.getElementById('eVocab-'+id).value);
  const { error } = await sb.from('classes').update({
    material_pre: document.getElementById('ePre-'+id).value.trim() || null,
    material_live: document.getElementById('eLive-'+id).value.trim() || null,
    material_post: document.getElementById('ePost-'+id).value.trim() || null,
    zoom_link: document.getElementById('eZoom-'+id).value.trim() || null,
    vocab: vocab.length ? vocab : null,
  }).eq('id', id);
  document.getElementById('eMsg-'+id).textContent = error ? 'Fehler: '+error.message : '✓ gespeichert';
}

async function createClass(){
  const t = document.getElementById('nTitle').value.trim();
  const dt = document.getElementById('nDate').value;
  if (!t || !dt){ document.getElementById('neuMsg').textContent='Titel + Datum nötig.'; return; }
  const vocab = parseVocab(document.getElementById('nVocab').value);
  const base = {
    title: t, level: document.getElementById('nLevel').value,
    topic: document.getElementById('nTopic').value.trim() || null,
    capacity: parseInt(document.getElementById('nCap').value||'5',10),
    zoom_link: document.getElementById('nZoom').value.trim() || null,
    material_pre: document.getElementById('nPre').value.trim() || null,
    material_live: document.getElementById('nLive').value.trim() || null,
    material_post: document.getElementById('nPost').value.trim() || null,
    vocab: vocab.length ? vocab : null,
  };
  const weeks = document.getElementById('nRepeat').checked ? 8 : 1;
  const rows = [];
  for (let w=0; w<weeks; w++){
    const d = new Date(dt); d.setDate(d.getDate()+w*7);
    rows.push({ ...base, starts_at: d.toISOString() });
  }
  const { error } = await sb.from('classes').insert(rows);
  document.getElementById('neuMsg').textContent = error ? 'Fehler: '+error.message : `✓ ${rows.length} Stunde(n) angelegt.`;
}

async function genMaterial(id){
  const msg = document.getElementById('genMsg-'+id);
  const prev = document.getElementById('genPrev-'+id);
  msg.textContent = '⏳ Amanda denkt nach… (10–20 Sek.)';
  const { data:{ session } } = await sb.auth.getSession();
  try {
    const r = await fetch('/api/generate-material', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token },
      body: JSON.stringify({ classId:id })
    });
    const j = await r.json();
    if (!r.ok || !j.ok){
      const map={anthropic_key_missing:'ANTHROPIC_API_KEY fehlt in Vercel.',not_admin:'Keine Admin-Rechte.',class_not_found:'Stunde nicht gefunden.'};
      msg.textContent = '❌ '+(map[j.error]||j.error||'Fehler')+(j.detail?(' — '+j.detail):''); return;
    }
    msg.textContent = '✓ Material erstellt!';
    const c=j.content;
    prev.innerHTML = `<div style="background:var(--bg);border-radius:10px;padding:10px 12px;font-size:13px">
      <b>Vorschau:</b> ${(c.vocab||[]).length} Vokabeln · ${(c.pre&&c.pre.exercises||[]).length} Übungen (Vorbereitung) · ${(c.post&&c.post.exercises||[]).length} Übungen (Nachbearbeitung)
      ${c.grammar_tip?'<br>📌 Grammatik: '+ (c.grammar_tip.title||'') :''}
      <br><span class="muted">Schüler sehen das jetzt im Schülerbereich unter „Übungen starten".</span></div>`;
  } catch(e){ msg.textContent='❌ Netzwerkfehler: '+e.message; }
}

async function loadNachrichten(){
  const { data } = await sb.from('messages').select('*, profiles(name,email)').order('created_at',{ascending:false});
  // gruppieren nach Schüler
  const byUser={};
  (data||[]).forEach(m=>{ (byUser[m.user_id]=byUser[m.user_id]||{p:m.profiles,msgs:[]}).msgs.push(m); });
  const ids=Object.keys(byUser);
  document.getElementById('nachrichten').innerHTML = ids.length ? ids.map(uid=>{
    const t=byUser[uid]; const msgs=t.msgs.slice().reverse();
    return `<div class="card">
      <b class="title">👤 ${t.p?.name||'–'} <span class="muted">${t.p?.email||''}</span></b>
      <div style="margin:8px 0;display:flex;flex-direction:column;gap:6px">
        ${msgs.map(m=>`<div style="align-self:${m.sender==='student'?'flex-start':'flex-end'};max-width:80%;background:${m.sender==='student'?'#fff':'var(--secondary)'};color:${m.sender==='student'?'var(--text)':'#fff'};border:1px solid var(--border);border-radius:14px;padding:8px 12px;font-size:14px">${esc(m.body)}<br><span style="font-size:11px;opacity:.6">${m.sender==='student'?'Schüler':'du'} · ${new Date(m.created_at).toLocaleDateString('de-DE')}</span></div>`).join('')}
      </div>
      <div class="formrow"><input id="reply-${uid}" placeholder="Antwort schreiben…" style="flex:1"><button class="btn btn-primary" onclick="reply('${uid}')">Senden</button></div>
    </div>`;
  }).join('') : '<div class="card muted">Noch keine Nachrichten von Schülern.</div>';
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function reply(uid){
  const inp=document.getElementById('reply-'+uid); const body=inp.value.trim(); if(!body)return;
  const { error }=await sb.from('messages').insert({user_id:uid,sender:'teacher',body});
  if(error){ alert('Fehler: '+error.message); return; }
  inp.value=''; loadNachrichten();
}

async function loadBewertungen(){
  const { data } = await sb.from('ratings').select('*, profiles(name,email), classes(title,starts_at,level)').order('created_at',{ascending:false});
  const rows=(data||[]);
  const avg = rows.length ? (rows.reduce((a,r)=>a+r.stars,0)/rows.length).toFixed(1) : '–';
  document.getElementById('bewertungen').innerHTML = `<div class="card"><b>Durchschnitt: ${avg} ★</b> <span class="muted">(${rows.length} Bewertungen)</span></div>` +
    (rows.length ? rows.map(r=>`<div class="card"><b class="title">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)} — ${esc(r.classes?.title||'')}</b>
      <span class="muted">${r.classes?.starts_at?new Date(r.classes.starts_at).toLocaleDateString('de-DE'):''} · ${esc(r.profiles?.name||r.profiles?.email||'')}</span>
      ${r.comment?`<p style="margin-top:6px">„${esc(r.comment)}"</p>`:''}</div>`).join('') : '<div class="card muted">Noch keine Bewertungen.</div>');
}

async function loadSchueler(){
  const { data } = await sb.from('profiles').select('id,name,email,credits').order('created_at',{ascending:false});
  document.getElementById('schueler').innerHTML = `<table><tr><th>Name</th><th>E-Mail</th><th>Guthaben</th><th></th></tr>` +
    (data||[]).map(p=>`<tr><td>${p.name||'–'}</td><td>${p.email}</td><td><b>${p.credits}</b></td>
    <td><button class="btn btn-ghost" onclick="adjust('${p.id}',1)">+1</button> <button class="btn btn-ghost" onclick="adjust('${p.id}',-1)">−1</button></td></tr>`).join('') + '</table>';
}

async function adjust(id, n){
  await sb.rpc('admin_adjust_credits', { p_user_id: id, p_amount: n });
  loadSchueler();
}

init();
</script>
