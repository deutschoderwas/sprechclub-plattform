<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nachbereitung · deutschoderwas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a; --muted:#6f6a62; --cream:#fdf8f1; --card:#ffffff;
    --red:#dd0000; --gold:#ffce00; --teal:#2bbfbf; --teal-dark:#138a8a;
    --teal-soft:#e7f6f3; --gold-soft:#fff6da; --line:#ece5d8; --green:#127a44;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',system-ui,sans-serif; color:var(--ink); background:var(--cream); line-height:1.55; padding-bottom:48px; -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.brand-name{font-family:'Space Grotesk','Inter',sans-serif;}
  header{background:#fff; border-bottom:1px solid var(--line); padding:0 22px 20px;}
  .accent-bar{height:5px; margin:0 -22px 18px; background:linear-gradient(135deg,var(--red),var(--gold));}
  .brand{display:flex; align-items:center; gap:11px; padding-top:16px;}
  .logo-dot{width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--red),var(--gold)); flex:none;}
  .brand-name{font-weight:700; font-size:1.05rem; letter-spacing:-.3px;}
  .brand-tag{font-size:.72rem; color:var(--muted);}
  .back{margin-left:auto; font-size:.8rem; font-weight:700; color:var(--teal-dark); text-decoration:none; border:1.5px solid var(--line); padding:6px 12px; border-radius:50px;}
  .handout-title{font-weight:700; font-size:1.5rem; margin-top:18px; letter-spacing:-.5px; line-height:1.15;}
  .handout-sub{color:var(--muted); font-size:.86rem; margin-top:5px; font-weight:500;}
  nav{position:sticky; top:0; z-index:50; display:flex; gap:8px; overflow-x:auto; padding:12px 16px; background:rgba(253,248,241,.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); scrollbar-width:none;}
  nav::-webkit-scrollbar{display:none;}
  nav button{flex:none; font-family:inherit; font-weight:700; font-size:.8rem; color:var(--ink); background:#fff; border:1.5px solid var(--line); padding:8px 15px; border-radius:50px; cursor:pointer; white-space:nowrap; transition:.12s;}
  nav button:hover{border-color:var(--red);}
  nav button.active{background:var(--red); border-color:var(--red); color:#fff;}
  .tab-content{display:none; max-width:720px; margin:0 auto; padding:22px 16px;}
  .tab-content.active{display:block;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px 20px; margin-bottom:16px; box-shadow:0 6px 20px rgba(50,35,10,.05);}
  .card h2{font-size:1.12rem; font-weight:700; letter-spacing:-.3px; margin-bottom:12px; display:flex; gap:9px; align-items:center;}
  .card p{font-size:.94rem;}
  .card.a-red{border-left:5px solid var(--red);}
  .card.a-teal{border-left:5px solid var(--teal);}
  .card.a-gold{border-left:5px solid var(--gold);}
  .card.a-ink{border-left:5px solid var(--ink);}
  .satz-list{list-style:none;}
  .satz-list li{background:#faf6ef; border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:10px; padding:11px 13px; margin-bottom:9px; font-size:.92rem;}
  .satz-list li strong{color:var(--teal-dark);}
  strong{font-weight:700;}
  .box{border-radius:14px; padding:14px 16px; margin-bottom:10px; border:1px solid var(--line);}
  .box.mint{background:var(--teal-soft); border-color:#cdeae5;}
  .box.sun{background:var(--gold-soft); border-color:#f3e4b0;}
  .box .box-label{font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--teal-dark); margin-bottom:6px;}
  .box.sun .box-label{color:#a9750a;}
  .box p{font-size:.9rem;}
  table{width:100%; border-collapse:separate; border-spacing:0; font-size:.88rem; border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  th{background:var(--ink); color:#fff; text-align:left; padding:10px 11px; font-weight:700; font-family:'Space Grotesk',sans-serif;}
  td{padding:9px 11px; border-top:1px solid var(--line); vertical-align:top;}
  tbody tr:nth-child(even){background:#faf6ef;}
  td strong{color:var(--red);}
  details{background:#fff; border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:12px; padding:13px 15px; margin-bottom:10px; cursor:pointer;}
  details summary{font-weight:700; font-size:.92rem; list-style:none; display:flex; justify-content:space-between; gap:12px; align-items:center;}
  details summary::after{content:"ansehen"; font-size:.72rem; font-weight:700; color:#fff; background:var(--teal); padding:3px 11px; border-radius:50px; white-space:nowrap;}
  details[open] summary::after{content:"zu"; background:var(--muted);}
  details .answer{margin-top:11px; padding-top:11px; border-top:1px dashed var(--line); font-size:.95rem; line-height:1.6;}
  .exercise{margin-bottom:20px;}
  .exercise p{font-weight:700; font-size:.92rem; margin-bottom:8px;}
  select{font-family:'Inter',sans-serif; font-size:.9rem; padding:6px 9px; border:1.5px solid #d8d2c6; border-radius:9px; background:#fff; color:var(--ink); font-weight:600; cursor:pointer;}
  select.correct{border-color:var(--green); background:#eafaf1;}
  select.wrong{border-color:var(--red); background:#fdeaea;}
  .fehler-card{background:#fff; border:1px solid var(--line); border-left:5px solid var(--red); border-radius:14px; padding:14px 16px; margin-bottom:12px;}
  .fehler-card .falsch{color:var(--red); font-weight:700; font-size:.92rem; margin-bottom:6px;}
  .fehler-card .falsch span{text-decoration:line-through; opacity:.6;}
  .fehler-card .richtig{color:var(--green); font-weight:700; font-size:.92rem; margin-bottom:6px;}
  .fehler-card .richtig .hl{background:#eafaf1; border-radius:5px; padding:1px 5px;}
  .fehler-card .erklaerung{color:#555; font-size:.84rem; font-style:italic; margin-top:6px; line-height:1.5;}
  .center{max-width:560px; margin:0 auto; text-align:center; padding:4rem 1.4rem; color:var(--muted);}
  .center a{color:var(--teal-dark); font-weight:700;}
  .vtrainer{display:block; text-align:center; margin:4px auto 0; max-width:720px; padding:0 16px;}
  .vtrainer a{display:inline-block; background:linear-gradient(135deg,var(--teal),var(--teal-dark)); color:#063b35; font-weight:800; text-decoration:none; padding:12px 22px; border-radius:50px; font-size:.92rem;}
</style>
</head>
<body>
<div id="app"><div class="center">Lädt …</div></div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CFG = window.SPRECHCLUB_CONFIG;
let sb;
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

async function init(){
  const app = document.getElementById('app');
  const id = new URLSearchParams(location.search).get('id');
  if(!id){ app.innerHTML='<div class="center">Keine Stunde angegeben.</div>'; return; }
  sb = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ app.innerHTML='<div class="center">Bitte zuerst einloggen, um deine Nachbereitung zu sehen.<br><br><a href="index.html?login=1">Zum Login →</a></div>'; return; }
  const [{ data:c }, { data:cn }] = await Promise.all([
    sb.from('classes').select('title,level,topic,starts_at').eq('id',id).maybeSingle(),
    sb.from('class_notes').select('post_content').eq('class_id',id).maybeSingle()
  ]);
  if(!c){ app.innerHTML='<div class="center">Stunde nicht gefunden.</div>'; return; }
  if(!cn || !cn.post_content){ app.innerHTML='<div class="center">📋 Die Nachbereitung für diese Stunde ist noch nicht fertig.<br>Schau später nochmal vorbei.<br><br><a href="konto.html#stunden">← Zu meinen Stunden</a></div>'; return; }
  render(id, c, cn.post_content);
}

function render(id, c, pc){
  const when = c.starts_at ? new Date(c.starts_at).toLocaleString('de-DE',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'})+' Uhr' : '';
  const tabs = [];

  // 1 · Zusammenfassung
  if(pc.thema || (pc.saetze && pc.saetze.length)){
    let h = '';
    if(pc.thema) h += `<div class="card a-red"><h2>⚡ Thema der Stunde</h2><p>${esc(pc.thema)}</p></div>`;
    if(pc.saetze && pc.saetze.length) h += `<div class="card a-teal"><h2>🗣️ Wichtige Sätze</h2><ul class="satz-list">`+pc.saetze.map(s=>`<li>${esc(s)}</li>`).join('')+`</ul></div>`;
    tabs.push({ label:'📋 Zusammenfassung', html:h });
  }
  // 2 · Vokabeln
  if(pc.vocab && pc.vocab.length){
    const rows = pc.vocab.map(v=>`<tr><td><strong>${esc(v.de)}</strong></td><td>${esc(v.info||v.en||'')}</td><td>${esc(v.example||'')}</td></tr>`).join('');
    tabs.push({ label:'📖 Vokabeln', html:`<div class="card a-teal"><h2>📖 Wortschatz der Stunde</h2><table><thead><tr><th>Wort</th><th>Bedeutung</th><th>Beispiel</th></tr></thead><tbody>${rows}</tbody></table></div>` });
  }
  // Dialoge
  if(pc.dialoge && pc.dialoge.length){
    const dl = pc.dialoge.map(d=>`<div class="card a-teal"><h2>💬 ${esc(d.titel||'Dialog')}</h2><div class="dialog" style="line-height:1.7">`+(d.zeilen||[]).map(z=>`<p style="margin:4px 0">${esc(z)}</p>`).join('')+`</div></div>`).join('');
    tabs.push({ label:'💬 Dialoge', html:dl });
  }
  // 3 · Grammatik
  if(pc.grammar && (pc.grammar.title || (pc.grammar.rows&&pc.grammar.rows.length) || (pc.grammar.tips&&pc.grammar.tips.length))){
    const g = pc.grammar; let h = '';
    let inner = '';
    if(g.rows && g.rows.length){
      const head = (g.headers&&g.headers.length)?`<thead><tr>${g.headers.map(x=>`<th>${esc(x)}</th>`).join('')}</tr></thead>`:'';
      inner += `<table>${head}<tbody>${g.rows.map(r=>`<tr>${r.map(c2=>`<td>${esc(c2)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }
    h += `<div class="card a-red"><h2>⚡ ${esc(g.title||'Grammatik')}</h2>${inner||'<p class="muted">Merkpunkte unten 👇</p>'}</div>`;
    if(g.tips && g.tips.length){
      h += `<div class="card a-gold"><h2>🔑 Merkpunkte</h2>`+g.tips.map((t,i)=>`<div class="box ${i%2?'sun':'mint'}"><div class="box-label">${esc(t.label||('Tipp '+(i+1)))}</div><p>${esc(t.text)}</p></div>`).join('')+`</div>`;
    }
    tabs.push({ label:'⚡ Grammatik', html:h });
  }
  // 4 · Übungen
  if(pc.exercises && pc.exercises.length){
    const ex = pc.exercises.map((e,i)=>{
      if(e.type==='choice' || e.type==='listen'){
        const correct = e.options[(typeof e.answer==='number')?e.answer:0];
        const opts = ['<option value="">— wählen —</option>'].concat(shuffle(e.options.slice()).map(o=>`<option>${esc(o)}</option>`)).join('');
        return `<div class="exercise"><p>${i+1}. ${esc(e.q)}</p><select onchange="checkSelect(this,'${esc(correct).replace(/'/g,"&#39;")}')">${opts}</select></div>`;
      }
      if(e.type==='gap'){
        return `<div class="exercise"><p>${i+1}. ${esc(e.text)}</p><details><summary>Lösung${e.hint?' · 💡 '+esc(e.hint):''}</summary><div class="answer">✅ ${esc(e.answer)}</div></details></div>`;
      }
      if(e.type==='order'){
        return `<div class="exercise"><p>${i+1}. Bring in die richtige Reihenfolge${e.hint?' · 💡 '+esc(e.hint):''}:</p><details><summary>Lösung</summary><div class="answer">✅ ${esc(e.answer)}</div></details></div>`;
      }
      if(e.type==='match'){
        const pairs = (e.pairs||[]).map(p=>`<li><strong>${esc(p.l)}</strong> → ${esc(p.r)}</li>`).join('');
        return `<div class="exercise"><p>${i+1}. ${esc(e.intro||'Ordne zu:')}</p><ul class="satz-list">${pairs}</ul></div>`;
      }
      return '';
    }).join('');
    tabs.push({ label:'✏️ Übungen', html:`<div class="card a-teal"><h2>✏️ Übungen</h2>${ex}</div>` });
  }
  // 5 · Sprechen
  if(pc.speaking && pc.speaking.length){
    const sp = pc.speaking.map((s,i)=>`<div class="exercise"><p>${i+1}. ${esc(s.task)}</p>${s.example?`<details><summary>Beispiel</summary><div class="answer">${esc(s.example)}</div></details>`:''}</div>`).join('');
    tabs.push({ label:'💬 Sprechen', html:`<div class="card a-teal"><h2>💬 Sprechen &amp; freie Übungen</h2>${sp}</div>` });
  }
  // 6 · Fehler
  if(pc.errors && pc.errors.length){
    const fc = pc.errors.map(e=>`<div class="fehler-card"><div class="falsch">❌ Falsch: <span>${esc(e.falsch)}</span></div><div class="richtig">✅ Richtig: <span class="hl">${esc(e.richtig)}</span></div>${e.erklaerung?`<div class="erklaerung">${esc(e.erklaerung)}</div>`:''}</div>`).join('');
    tabs.push({ label:'🔴 Fehler', html:`<div class="card a-red"><h2>🔴 Fehlerkorrektur</h2><p style="font-size:.85rem;color:var(--muted)">Häufige Fehler aus dieser Stunde — lern aus den Korrekturen!</p></div>${fc}` });
  }

  if(!tabs.length){ document.getElementById('app').innerHTML='<div class="center">Diese Nachbereitung enthält noch keine Inhalte.</div>'; return; }

  const navHtml = tabs.map((t,i)=>`<button class="${i===0?'active':''}" onclick="switchTab(${i})">${t.label}</button>`).join('');
  const panels = tabs.map((t,i)=>`<div class="tab-content ${i===0?'active':''}" id="tab${i}">${t.html}</div>`).join('');
  const vtrainer = (pc.vocab && pc.vocab.length) ? `<div class="vtrainer"><a href="konto.html#vokabeln">🎯 ${pc.vocab.length} Vokabeln im Trainer üben →</a></div>` : '';

  document.getElementById('app').innerHTML = `
    <header>
      <div class="accent-bar"></div>
      <div class="brand">
        <div class="logo-dot"></div>
        <div><div class="brand-name">deutschoderwas</div><div class="brand-tag">Deutsch lernen mit Spaß</div></div>
        <a class="back" href="konto.html#stunden">← Meine Stunden</a>
      </div>
      <h1 class="handout-title">Nachbereitung · ${esc(c.topic||c.title||'')}</h1>
      <p class="handout-sub">${esc(c.level||'')}${when?' · '+esc(when):''}</p>
    </header>
    <nav>${navHtml}</nav>
    ${vtrainer}
    <div class="panels">${panels}</div>`;
}

function switchTab(i){
  document.querySelectorAll('nav button').forEach((b,j)=>b.classList.toggle('active', j===i));
  document.querySelectorAll('.tab-content').forEach((p,j)=>p.classList.toggle('active', j===i));
  window.scrollTo({top:0, behavior:'smooth'});
}
function checkSelect(el, correct){ el.className = el.value===correct ? 'correct' : (el.value!=='' ? 'wrong' : ''); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

init();
</script>
</body>
</html>
